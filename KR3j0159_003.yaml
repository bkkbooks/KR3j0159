body:
  text: 六研齋筆記卷三明李日華撰涓子住世二千八百年著琴心三篇又天地人經四十八篇涓子周遊名山看望八海展轉六合無所羈束守形思真二千八百年實樂中仙不求聞達一朝被召上補天位為之惆悵絶氣薛旅愛嘯音鳯響𤣥絃之彈徽聲感神故神不墜落右英王夫人告許長史消磨之愈疾仙真並呼藥為消磨也紫㣲夫人論書云靈筆真手初不敢下交於肉人小有天王王褒云黄赤之道混氣之法是張陵施化為種子之一術耳濁生之下道壞真霄之正氣也三茅保命君告許侯金陵水色白都不學道居其土飲其水亦令人夀考是金津潤液之所溉中茅山山𤣥嶺獨高䖏司命君埋西胡玉門丹砂六千金於此山深二丈許埳上四面有小盤石鎮其上其山左右當水下流皆赤色飲之益人句曲山腹内空虚謂之洞臺仙府智者大師住天台常顧衆云俟三國為一即有一大勢人為立寺寺立而國清矣後隋文統一煬帝造寺賜額國清符其語也隋僧吉藏安息人止會稽嘉祥寺疏請智覬講法華經稱呉州會稽縣又范曄任延傳云延會稽都尉上任先詢延陵季子墓今延陵在金壇丹陽間可見古會稽即呉地也庾肩吾賚梨啟云睢陽東苑子圍三尺新豐箭谷枝懸六觔余在中州唯鄭州有六觔棃吴均與朱元思書云自富陽至桐廬一百許里竒山異水天下獨絶水皆縹碧干丈見底遊魚細石直視無礙急湍似箭猛浪若奔夾岸高山皆生寒樹負勢兢上互相軒邈争高直指千百成峰衆水激石泠泠作響好鳥相鳴嚶嚶成韻蟬則千囀不窮猿則百呌無絶鳶飛戾天者望峰息心經綸世務者窺谷忘返横柯上蔽在晝猶昏疎條交暎有時見日梁武帝與陶𢎞景論書云逸少迹無甚極細書樂毅論乃㣲粗健恐非真蹟𢎞景亦云樂毅論極勁利而非甚用意故有壞字南朝呼筆四管為一牀石􅎕一名紫􅎕一名紫􅡖一名決明即龜脚也春而吐葩有類草種東坡手鈎石鼓文一本篆籀特全音釋具備逺勝潘迪薛尚功鄭樵所錄阮氏七畧記張僧繇有山海圖圖山海經也墨子曰誦詩三百絃詩三百舞詩三百班固人物表以嫪毐與於陵仲子同居中下等一極清一極穢比而同之豈亦惡矯之甚耶揚補之子雲之後極擅詞學有逃禪老人詞一卷其寫梅特以寄意然亦妙絶秦檜求之不與楊升菴先生云請看麝煤鼠尾外猶有玉佩瓊琚詞唐劉賔客集有題棼絲瀑詩得句云含暈迎初旭翻光破夕曛餘波遶石去碎響隔溪聞棼絲言噴繞如亂絲也命名亦妙劉句又有桃花裙色艶桐子藥丸成七言眼前名利同春夢醉裏風情敵少年又三花秀色通書幌十字春波遶宅牆唐李咸用研詩云連澌光比鏡囚墨膩於䃜囚墨二字竒佩魚始唐永徽二年以鯉為李也武后天授二年改佩龜以龜為𤣥武也皇象曰雖見草漫漫落落宜得精豪菀筆委曲宛轉不叛散者紙當得滑密不沾汚者墨又須多膠紺黝者加逸豫之餘手調適而心佳娯正可以小展藎染朱之草忠藎即是忠赤今人知有四方二十八宿而不知有中宿然石氏星經云中宫黄帝其精為黄龍為軒轅首枕星張尾挂栁井體暎三台司四季司中岳司中土黄河江漢淮濟之水司黄帝之子孫司倮虫三百六十則固有所謂中宿也精字氣字皆從米是精氣資於米也辟穀以希長生何哉顧道書氣作炁以為先天之物别於後天則又有㣲㫖在也元朱萬初墨純用松煙葢取二三百年摧朽之餘精英之不可泯者非常松也虞奎章贈之詩云霜雪摧殘澗壑非深根千嵗斧斤違寸心不逐飛煙化還作𤣥雲遶紫㣲仇池筆記云真松煤逺煙自有龍麝氣郭熙不獨善畫亦工塑壁令圬者以手搶泥成凸乾則以墨隨其形迹暈成峰巒林谷加之人物樓閣宛然天成謂之影壁海蟾弟子山元翁號碧天高郵魏景得其道著書萬餘言名太沖子太沖子曰道者盜也釋者識也盜天地陰陽之機謂之盜識萬物之理謂之釋甚矣人心之神也雖造化亦無加焉今夫天地之生物煦之以陽肅之以陰然後乃成人心則不然一舉而物已生矣一舉而物已生者即所謂愧而生汗羨而生涎淫而生精悲而生淚之謂也釀酒必以糯其品非一粒長而釀酒多者曰金釵糯色白而性軟五月種十月熟曰羊脂糯芒長而穀多白粰四月種九月熟曰胭脂糯色斑五月種十月熟曰虎皮糯粒最長白粰有芒四月種七月熟曰趕陳糯粒大而色白芒長而熟最晚其色易變釀酒最佳曰蘆黄糯粒圓白而粰黄大暑即可刈其色難變不宜於酒曰秋風糯可以代粳輸官又曰謾官糯不耐風水四月種八月熟曰小娘糯芒如馬鬃而赤色曰馬鬃糯范忠宣蓄江都王馬李伯時假觀摹之累日不能似但以粉牌標其旁云神妙上上品江都王馬米元章就觀不與言但遶屋狂呌而已劉須溪過大秀洞道人魯雲窠年七十五延客坐讀易堂拾炭煑泉焚香供茗明日須溪欲徃郁木道人曰香未消且住此兩日了一卦氣了一卦氣者雲窠妙語也宋王齊叟者善畫梅影形影相值毫釐不差又作萬荷圖狀極纖細生意各殊唐掌禹錫編證類本草方術之精者然又能詩有句云風定落花深一寸日髙啼鳥度千聲宋宣和三年正月廿四日方臘將七佛者引衆十萬攻秀州統軍王子武聚兵與州民登城固守屬大兵至開門表裏合擊斬首九千築京觀五賊退據杭康棣字子華學畫於松雪公得其華潤森鬱之趣余有其秋山行旅一幀倣郭河陽者子華又善詩有味外味稿蘭亭刻宋理宗集成一百十七本裭為十冊内有安吉古苔真草本霅斷石本劉無言臨本趙菊坡本此四本俱在吴興其他又有沈存中家楮撫本趙子昂十三跋本趙子固覆水本獨孤僧靳借本文衡山先生洗兒詩年二十有八時所作也為𢎞治丁巳第不知所舉兒是夀承否人傳夀承前生乃一繪士在宜興畫一土神廟壁未竟而卒托生文家前所未了之壁耿耿在念後偶過廟遂為了之顧夀承自擅書名世不見其畫夀承臨終時囈語作衡老狀云天曹發下許多誥軸徴書甚急須大郎去一助藉令果有之則翰墨文人斷然自為一流出入瑤階寶地為玉霄侍書之職不浪隨五濁轆轤也洗兒詩云三十相將始洗兒百年回首即非遲祖書敢謂今堪托父道方慙我未知願魯難憑蘇子論勝無聊詠樂天詩人間切事唯應此對客那無酒一巵又云春風一笑錦綳兒共道頭顱較我竒門户闗心能不喜賢愚有命可容期百年正賴培來乆萬事誰言足自兹五十老親遺世網從今多是弄孫時僧恵崇人知其繪事精妙超凡不知詩句亦清逺有氷雪松霞之韻嘗作句圖書其所最得意如嶺暮春猿急江寒白鳥稀掩門青桂老出定白髭長鳥歸杉墮雪僧定石沈雲空潭聞鹿飲疎樹見僧行磬斷蟲聲出峰迴鶴影沈䌓霜衣上積殘月馬前低移家臨醜石租地得靈泉殘月楚山曉孤煙江廟春松風吹髪亂巖溜濺碁寒雲殘僧掃石風動鶴歸松禽寒時動竹露重忽翻荷野人傳相鶴山吏學彈琴地遙羣馬小天濶一雕平王安國作詩好用酒樓字嘗謂呉䖏厚曰子詩有幾酒樓吴曰有二酒樓其一夜泊尋陽宿酒樓琵琶亭畔荻花秋雲沈鳥沒事已徃月白風清江自流其二若耶溪畔醉秋風獵獵船旗照水紅後夜錢唐酒樓上夢魂應遶浙江東安國曰足矣然不如錢昭度長憶錢唐江上望酒樓人散雨絲絲更有情味錢明逸每宿戒必詰其謁者是喫酒是筵席客無數一巡酒一味食筵席也客不過三五人酒數斗甆盞一隻青鹽數粒藉地而坐終日不交一言恐當酒氣也不食恐分酒地也翌日問其旨否徃徃不知志不在味也終日傾注無涓滴揮灑始可謂之酒徒是名喫酒其視揖讓飲酒如牢獄耳本草著糯米為稻米累朝釋略千言無一字言堪釀酒者正如魏史鍾繇傳不言其工書也馬仲塗家藏蔡忠恵書金花牋十六幅每幅四字玩其波畫令人起敬題云梅三馬五蔡大皇祐壬辰中春寒食前一日會飲於普照院仲塗和墨聖俞按紙君謨揮翰過南都試呈杜公歐陽九評之當䖏在何等馬五諾我精婢潤筆皆是快事張南軒跋云蔡端明此書大得顔平原浯巖有法度而不廢其操縱運用妙䖏老子道徳經有𤣥師楊真人手書張鎮南本鎮南即漢天師三代系師魯魏武表為鎮南將軍者也所謂五千文者五千字也許玉斧之子黄民既傳楊許南真經法因避亂齎入剡寄藏馬朗家朗同弟罕寶秘看奉恒令有心二奴司香火一名白首一名平頭灑掃拂拭室中常有神光靈氣居士婁恵明先以在剡甚樂經法而扄鑰嚴固覽觀無方景和元年乃出都令嘉興殳季真啟宋主勑就馬家取經及經至都殳呈景和勑於華林暫開以付後堂道士陸修静茅山舊志前元四十五代宗師劉大彬編句曲外史張伯雨手書刻之甚精國初燬於火許掾去世後不欲顯名自稱幽人茅山有金陵館主殳遵祖宗陽館主張元之皆嘉興人張又於菌山澗上築室以居時有白鶴來止遂名鶴臺秦良常洞立石頌徳李斯書文曰始皇聖徳平章山河巡狩蒼川勒銘素璧其文埋地不顯於世宋政和初道士莊慎質發陶隱居丹井得一圓研徑九寸許列十一趾滌之朱色爛然旁有丹一粒如芡實取之輒墮井中宋元祐中有中貴羅淳一者學道華陽意隱居之藏有丹砂異書一日穴墓唯鐵繩懸一空棺内有一劔并盂鏡各一而已其壙甃環遶相次成文曰華陽隱居幽館勝力菩薩捨身釋迦佛陀弟子太上道君之臣修上乗之六道缺三字之三真憩靈岳以逶迤遊太空以棲神書蹟神妙是隱居手書墓既開遂摹此文以傳元祐六年林希子中所傳如此蹟未得見女仙張㣲子常服霧氣云霧者是山澤水火之華金石盈氣服之能散形入空與雲霧合體葛洪第三子善畫常於雪中就翟希真家素壁上圖三人一白鹿二樹一藥笈二人手執𤣥芝一似采藥之狀樹似松栢皆傍幽巖為風雨所敗枯朽之狀不知何意宋常州天慶觀道士傅霄善書尤精𨽻古亦字子昂右軍書千古絶技然在梁時尚受人排抑如陶隱居所評樂毅論極勁健而非甚用意太師箴大雅吟用意甚至更成拘束張伯雨内名嗣真號貞居所著有外史山居集三卷碧巖𤣥㑹錄二卷尋山志十五卷余嘗手抄其澗阿詩稿二卷又得購藏其小楷手蹟二方每一展舒覺松雲雪瀑之氣爽然逼人真仙品也虞道園寄伯雨詩云獨抱長鑱管白雲琴心誰錄内篇文清齋三日秋仍痩徧禮羣真夜每分石記恐妨塵外事山經聊許世人聞已從司馬求真籙更為通章九老君伯雨酬道園詩云一圅真籙是遺書想為焚香謝紫虚海上安期分食棗人間長史合縣車泥丸日月存恩否華葢煙嵐筆扎餘絶嘆清詩不埋沒解隨霜葉墮山居茅山詩多矣唯宋楊至質七言一律獨備山中典故非虚語者而句自雄蒨云玉胏空浮己字山五門不鎖洞天寛紫花可餌秋尋术紅焰難埋夜見丹畫得一牛方水草飛來三鵠各峰巒仙蹤寂寞高風逺誰為先生指額瘢郭熙言畫山水數百里間必有精神聚䖏乃足畫散地不足畫也黄華老人刻雲溪堂法帖有李贊皇真蹟傳燈錄載僧問多福院長老曰如何是多福一叢竹多福曰一莖兩莖斜曰不會曰三莖四莖曲余家藏梅花道人一葉竹題云誰云古多福三莖四莖曲涼陰生研池清風滿淇澳觀者不解其語不知沙彌引此一則公案真以畫説法者也天目山神形如白鹿每嵗五月與震澤龍會多暴風雨杭煙霞洞僧雄鑑號瘦石善畫杭北闗大覺寺有東坡鼎趙松雪書十可軒參寥書覺路二大字杭安溪大遮山東明寺有建文君遺像想從亡諸臣所潜留也中峰禪師是無門洞法師慧開道人再來杭州北山玉泉院池水曽置局作紙甚佳以擾民尋罷上天竺藏戴文進十八羅漢像余兒時猶及見下竺有王叔明畫壁保叔塔院有叔明畫海天落照圖在左壁上層然皆剝落矣今乃絶蹤宋杭廣化院僧了性精醫善草書東坡為作六觀堂老人草書歌曰物生有象乃有滋夢幻無根成斯須方其夢時了非無泡影一失俯仰殊清露未晞電已驅此滅滅盡乃真吾云如死灰實不枯逢場作戲三昩俱化身為醫忘其軀草書須學聊自娱落筆已喚周越奴蒼鼠奮髯飲松腴剡藤玉版開雪膚遊龍天飛萬人呼莫作羞澁羊氏姝蘇子瞻寶成院賞牡丹詩云春風小院却來時壁間唯見使君詩應問使君何䖏去憑君説與春風知年年嵗嵗何窮已花似去年人老矣去年崔䕶若重來前度劉郎在千里詩鑱石壁筆法甚遒武林潮鳴寺有宋思陵賜統制劉漢臣詩云野寺參差落漲痕疎林欹倒露霜根扁舟一棹向何䖏家在江南黄葉村此蘇子瞻句也起句第二字是水字今只改一寺字遂掩而有之思陵博雅斷不如是當由一時在寺中偶御筆書之遂以賜劉而寺中欲假以為重乃改字勒石以侈榮觀耳不然豈子瞻以詩得罪易世之後猶沒其警句竟充支賜之用耶一笑王仲山先生畫極蒼古曽見其看泉圖一幀題句云幽泉未出山潜與元氣結霏霏散為雲谷口薜衣濕石田草草拾片紙作春社醉歸圖一老傲兀牛背有天際想牛止露角身毛俱渴筆拖就彌有神氣題句云老夫自是騎牛漢一蓑一笠春江岸白髪生來七十年落日青山牛背看酷憐牛背穩於車社飲陶陶夜到家村中無虎豚犬閙平地小徑穿桑麻也無漢書掛牛角聊挂一壺春酒濁南山白石不必歌功名富貴如雲薄成化己巳沈周姜太常立綱世傳其楷法嚴整未嘗知其善畫余偶得其一幀蕭疎聳秀全以黄鶴山樵為宗特筆意稍未化耳題句云功名已見繡為衫萬里青雲入笑譚囘首九峰天際碧可能無夢到江南倪雲林寫寒梢二樹又一小虬松低巒一層露白見沙影下層淺瀨砂礫極荒寒之趣題云寓館風雨秋閒門草苔蘙懷人思奮飛攜書此留滯玉琴和幽吟竹牖聊静憩八月二日寫懶瓉又一幀寫疎林逺岫題云已從漚鳥狎雲深老我無機似漢陰采采菊花猶滿地蕭蕭霜髪不勝簮南遊阻絶傷多壘北望艱危折寸心家在呉淞江水上清猿啼䖏有楓林癸丑七月既望子素徴君以此索畫因寫以贈十八日瓚顔魯公餌道士陶八八刀圭碧霞丹自此不衰陶云公於七十後有大厄當會我於羅浮山盧杞陷公遣使李希烈行至氾水遇陶曰吉吉指嵩少而去公死賊中啟棺狀如金色爪髪俱長如生人葢尸解云吴興向氏宋時三世好古多蓄法書名畫古器有名明者為嘉興推官騃而誕長城人劉暄字淵道以計取其籍獻之賈似道遂按圖盡索之皆六朝神品弁陽老人周密曽至其家傑閣五間悉貯書畫竒玩佳硯百餘古玉印數十盒有雪白靈璧石高數尺卧沙水道悉具而聲尤清越景定間其祖若水墓為賊所發棺上有一槅所貯皆平日所愛法書名畫也多為屍氣所蝕惜哉今世以白衣冠為諱考古惟戰國燕丹送荆卿入秦渡易水送者皆白衣冠葢白者金色所以助兵氣非為哀喪而然也隋志宋齊之間天子燕私著白高帽士庶以烏太子在上省則以烏在永福省則白紗隋時以白㡊通慶弔之服國子生亦服白紗巾晉著白接䍦竇萃白譜曰接䍦巾也南齊垣崇祖守夀春著白紗絹帽肩輿上城人以為怪樂府白苧詞曰質如輕雲色如銀制以為袍餘作巾唐六典天子服有白紗帽其下服裙襦韈皆以白世傳明皇幸蜀圖山谷間老叟皆著白巾或云為諸葛武侯服此不知古今者也元僧仁一初隱富陽妙智寺楊廉夫與之善廉夫鐵篴惟一初能吹楊贈之詩云一初闍黎諸法解吹得道人雙劍簫大道不知宗北秀看山直欲盡南條新城縣有咽水洞人至洞口揖曰請仙官恩澤即洞中閧閧作聲噴出泉水魚鰕亦隨水跳躍人又揖曰水足矣隨復返流而洞外田萬畆藉此灌溉無乏有邑令范姓者徃觀鳴鑼放砲揖之不應令怒訶責里胥妄報晚宿旁寺夢有黄衣白首數老人來見曰吾皆秦人也避亂至此不識漢官威儀畏聞車馬聲故潜伏不動明府何責於里胥耶不然請姑留再試之范嘵復請水流如故此元人記錄語也晉人桃源避秦事正言其上世來此傳流子孫不與外通耳今乃云仙官主司泉源施噏任意又能見夢於令何其幻耶豈又有一種避秦人能服餌得道如採藥毛女類耶潤州鶴林寺以米元章為伽藍杭梵天講寺以蘇東坡為伽藍證果於翰墨文章者何患無香火地哉徑山明大禪禪師秀州人勝果寺無著禪師名文喜嘉興朱氏子又僧浄梵嘉禾人姓笪氏石田綾地傅色山水筆意倣董源極雄秀苕客持來議易余雪卵研已而不果然此幀耿耿常在余懷也石田書所作春歸曲於上方云今朝三月三十日問春果是明日歸春歸當向何䖏去春亦不言花亂飛東家蝴蝶已無賴强逐遊絲揚落暉青樓粉暗女子嫁朱門鳥啼賔客稀春一去萬事非臨岐更把一巵酒愁見牆頭梅子肥退之以呉綾索作傅采山水殘紅綠陰偶似春暮因省去嵗山行作春歸曲一篇乃填空方以實其景退之勿訝其現成也己亥沈周米元暉大姚村圖澄心堂紙所畫墨樹三攅屋四五間雲氣與岡阜相抱四面空濶皆水石角㣲作逺巒以大姚在太湖中故也米有自題句云廣文當日官雖冷可奈才名振世何他日君家須炙手而今聊復雀堪羅老來尚喜管城子更愛好山江上青武林秋高曉欲雨正若此畫青冥冥三茅别有洞中天我欲居山屏世緣累行積功多悦氣玉宸欣有地行仙紹興戊午季春十一日書於大姚五湖田舍元暉此卷元時為王雲浦者所得已失之又復得因手題云大姚去姑蘇城南三十里臨諸江湖江則呉淞江姚城江白蜆江小龍江湖則陳湖葉宅湖車坊漾獨墅淹大姚地可百畆浮諸水之間有小山高不滿數丈上有古刹依山之顛曰文殊院正殿有文殊坐獅子像甚竒古周圍有深渠數匝乃誦經行道之跡也唐宋名公留題甚多皆刻石以置于壁間米南宫弟兄嘗游於此其地舊址猶可考余别業數椽在笠澤姚澄江之北與大姚隔小龍江相望咫尺時復徃來焉至正甲申余在燕京忽得此卷因拾以歸呉丙申之變余避地入閩丁酉歸家業一空而此卷僅存戊申呉復兵燹余流離濠梁己酉復歸田里故居浮蕩荒榛瓦礫不堪舉目又復得此卷於野人家事物之遇豈偶然哉辛亥秋七月暇日展卷太息用識於後以紀嵗月云爾雲浦道人倪元鎮有次韻詩云喟然㸃也宜吾與不利虞兮奈若何鴻鴈欲來風嫋嫋庭前樹子落娑羅呉淞江只葡萄綠林屋山仍縹緲青説與弋人何慕我高飛鴻鵠各冥冥大姚湖水自生煙長物都除絶世緣笙鶴不為歸鶴怨王仙真是勝丁仙雲浦老人亂後復得此卷感慨今昔觀其題可見辛亥八月來謁雲浦出以見示戲走筆追和米公三詩以寫懷云倪瓉國初此卷入沈汝融家有諸公題詠吾昔風流聞米老沈家今日覩真形千金散盡還來復此幅君須比四靈成化癸巳正月廿四日偶得觀沈氏所藏米老書畫不覺神情清暢故賦此以致景仰之意𤓰涇徐源題米敷文既遊清都遺蹟之在人間者日少至若貌江山之勝槩發詞藻之精英翰墨淋灕聚成卷軸者則又加少矣此卷其易得耶王雲浦再失而再獲之所以為至喜耳然萬有無常竟又歸諸沈氏沈氏世為良醫而日章尤知玩古嘗締余交今亡矣子𤣥出以徴題見之令人凄斷洪武庚午二月澹如王行嵗癸巳余得觀米敷文真蹟後十年癸夘奸人乗時射利搜索竒玩至以進獻託名騷擾一境而沈氏故物遂去矣未幾奸人敗露明正典刑而此卷不知竟落何手汝融痛惜故物乃以所嘗錄卷中稿請予重書一過葢覩影思形之意嗚呼物理有聚散故蘇子有雲煙過眼之論然則亦何用深惜也哉後二嵗孟夏朔旦源在懷賢樓再識成化年有王􅀢者挾中人以檢括進奉為名此卷掠去沈石田追憶補圖氣韻亦雄渾自恣譬稧帖之有唐臨亦天地間罕物也小米大姚村圖澄心堂紙所作詩句藻逸書畫遒潤得乃父風不易得之物為吾蘇沈汝融氏之世藏成化末王􅀢刮貨江東此卷屬其鷹攫汝融日惄若廢飲食者以余嘗觀求追寫其所記憶久亦付之茫然矣近過徐甥出元暉大行書三詩即其副本耳遂臨一過復漫補此圖歸汝融始塞其意且謂之曰物之聚散自有數正不使人容心其間譬之此卷在王雲浦所兩得兩失而轉至子家子家方一失已安知他日不復得乎余請以拙惡為死馬骨以媒之𢎞治壬子九日長州沈周跋大姚山水如故固不改其真彼元暉之陳迹沈君既不足戀而石田所倣更得其似且有似人之喜矣元暉有女弟家大姚故常徃來其地詩畫所由以作葢今陳大理汝玉亦嘗得其二幅上有題識是以知之呉寛米氏父子本襄陽人而寓居呉中昔張句曲傳海岳翁云其晚年愛潤州山水之勝乃卜居北固及觀海岳表吾鄉朱樂圃墓云余昔居郡與先生遊此可見其久寓於呉而女因嫁大姚敷文大姚村圖所為作也作宋史者直云呉人而後之論撰者遂以為呉縣人胥失之矣庚申十月廿一日觀石翁臨敷文本偶題呉都穆元暉大姚村圖於吾蘇大有闗渉王雲浦之獲自燕京再徙沈氏為吴中光賁者葢又百年是宜永鎮兹土不復他適可也何神物不䕶竟取檢括之厄使其果得登清都入左藏則亦不失為此物之蒙幸然今又不知流落人間何許也汝融昔藏家時有人以米三十斛求售不許而竟為烏有其痛惜之情自不可釋然石翁臨本宛然故吾雖一再傳寫亦如梅花照水格度具存使人觀之更有想像不盡之餘味然則舊物之存不存可無恨也汝融自失此以來嘆惋累年可謂好古之篤者姑以此慰之南峰山人楊循吉沈氏藏石田先生所榻大姚村圖歌重山凝逺陰江雲暎林濕淋漓六尺素滿手潑秋色糢糊似是溟海圖何乃目之曰五湖圖窮更聞清響接百顆歴歴驪龍珠米家風流照眼新細玩始知身外身虎頭能傳阿堵物虎賁尚入中郎神當時得失屬王郎邇來又復遷東陽得耶失耶孰主張茫茫宇宙悲弓亡神物不可久静䖏能走四海生暉光奎宫玉府眇何許夢寐似聞歸故鄉五湖田舍清風逺元暉睂目不可見嗚呼元暉睂目不可見五湖之水清如練𢎞治六年八月一日祝允明春空沈雲山有無眼明見此姚江圖圖窮爛熳得題字照人百顆驪龍珠平生雅識敷文書紹興嵗月仍不誣豈知尤物能媒禍繭紙蘭庭已非故石翁信是學行人能使邯鄲還故歩憶昔憸人賄為囿瀆財更假狂閹手千里竒珍歸檢括故家世物那容守沈氏藏兹二百年一朝掣去心芒然誰言物聚必有散手澤相闗常累嘆未能一笑付亡弓且喜百年還舊觀豈余鈍眼錯顔標抵掌真成孫叔敖區區不獨形模在更收風骨驪黄外一時㸃筆迥通神故應小米是前身從來藝事闗人品敢謂今人非古人後學文徴明題竹懶曰米元章畫余嘗見維摩詰王右軍及天女諸像如春蠶吐絲虚無縹緲之極所謂不令一筆入吳生者又見其著色細潤山水如王右丞李營丘者又見其寫松枝針鬛纖勁可數而偃仰取態者皆精工入㣲無一毫自恣若世人所指稱米畫特其潑墨一種耳然其用意亦自有别蒼辣者以峭蒨取竒綿聨者以起伏盡態大都寫意中出沒或然或不然之趣耳元暉雖祖家法神而明之不盡拘塗轍較南宫務加明秀時於峭蒨之下或厚培其基綿聨之中或獨據其勝余所見海岱樓清淮羣峰諸圖及余購藏姚山秋霽圖斷乎藍田營丘一派非家山也此大姚山圖余不得見見石田本微參其神蓋於滃濛大水寥廓太虚中閃出孤雲片雨銜抱樹石而獨徃所以氣象竒妙耳良工心苦可令俗子漫議耶雪舟僧喜藏雲林畫暇日出觀余得一一錄其題語時一玩之以當過屠之嚼其一贈陳雲洲我愛陳君賢父子逺將舟楫寄孤村三薫三沐敬愛客能述能承慈孝門水影雲容歸畫笥松醪术酒瀉陶尊淹留竟日無塵雜坐受涼風汀樹根十六日為明逺戲寫并詩太丘遺澤被諸孫東蔡深居雨外村濁水牟尼因見地好山罨畫政當門得錢賽買書千卷留客時沽酒一尊名利區區等春夢貪夫未覺古槐根曲江老人喜雲林之畫與詩不徒作蓋其人之賢故次其韻以發清賞許元白雲洲隱者元龍裔家住吳淞江上村九朶峰高雲遶屋百花洲近水迎門焚香對月彈琴譜投轄留人醉酒尊長欲乗風到蓬島相尋山老問天根嘉言次韻贈雲洲生又一幅贈郯九成吳山春雨浄江渚暮潮平解纜欣初霽開帆已到城郯君有高趣尊酒慰閒情醉吐真丘壑毫端一笑成郯君九成每見輒求作畫至正五年二月八日泊舟江渚而九成出素紙苦徴畫時已憊甚只得勉應請大痴老師見之必大笑也戲墨重看十七年闔閭樓閣蕩飛煙簡村蘭若風波外坐對湖山一啟軒辛亥十一月九日雲林子復覽因題又一幅浦城春色遜學親契其先世居閩之浦城為寫浦城春色圖并賦詩云七閩嵐翠合山勢浦城高春靄浮青壁晴曛醉碧桃吟猿儔木客飛瀑亂松濤夢入千峰裡雲霄一羽毛倪瓉甲寅二月又一幅贈寓齋先生渚蒲岸栁望秋零桂樹懸香月影清野水浮舟歸未得酒杯到手句還成雲松眠鶴夢方逺露草寒蛩鳴不平南郭先生𤣥黙久時收歌詠寫閒情瓉為寓齋先生畫并賦竹懶曰倪元鎮書學楊義和黄素黄庭詩清逺真率畫宗營丘蕭條簡澹則所自出生平極敬張句曲楊鐵崖黄子久必云大癡老師同時吳仲圭深隱卜肆王叔明高卧黄鶴峯徃來既簡聲氣稍疎有諧謔䖏必曰王蒙未夢見也而梅花菴曽未齒及要之此四老人自是勝國一時巨老同得曹溪一滴水各自開堂説法照曜千古者也有友人欲編雲林詩集託以采拾故余遇即錄之王叔明倣董北苑風雨蕭寺圖氣韻掀簸物象俱備不知較北苑所作相去幾何顧叔明自是寫圖手逺近位置歴然不為山林煙靄之所汩沒余又見其為陶宗儀寫南村圖鳬鴨猫犬紡車舂確家人器具一一畢備若子久渾厚雲林疎簡雖各極所擅而施之圖似終遜黄鶴矣元雲間沈良者題曰墨雲擁高山頃刻風雨至劃然海潮聲草木争偃地曠野少人行山僧獨歸去衲衣盡沾濕敲户何急事倉皇前村民乗屋一何亟一婢已抱甕一婦更持器重茅惜被卷破屋家所寄戴笠者漁郎理網屈雙臂老翁若望家擔物終不棄陸走尚甚危水行可無畏前溪風雨惡篙折水流駛行者當蚤歸居者不豫備北苑為此圖黄鶴師其意想見晚來晴雲浄山横翠始信翣時間真宰特相戲予家有董北苑風雨蕭寺圖是思陵所題筆法高古精絶叔明相訪出以示之稱賞不置予輒以贈之叔明為臨此卷予展賞題此俚言時至正庚寅秋七夕次日也華溪沈良俞焯題云郎娘屋破葺茅茨風雨谿山樹欲飛出世不知休歇去緇郎何事始知歸俞焯題于都城寓舍張逺題云吾師一峰道人曽有模董元風雨蕭寺圖今見此可謂雙劔神物須合子中其藏之以俟雲間張逺竹懶曰余憾不得見一峰作合參兩家筆法元有兩閒閒吳閒閒名全節係羽流趙閒閒名秉文官禁近或云金正大間人俱善書法有辭藻而趙尤横溢余得其擘窠書自作和東坡赤璧詞稿雄快震動有渴驥怒猊之勢而詞亦壯偉不羈視大江東去信在伯仲間可謂詞翰兩絶者詞曰清光一片問蒼蒼桂影其中何物一葉扁舟波萬頃四顧粘天無璧叩枻長歌姮娥欲下萬里揮冰雪京塵千丈可能容此人傑囘首赤璧磯邊騎鯨人去幾度山花發澹澹長空千古夢祇有歸鴻明滅我欲乗雲從公歸去散此麒麟髪三山安在玉簫吹斷明月正大五年重九前一日書於玉堂之署秉文元遺山題云夏口之戰古今喜備道之東坡赤璧詞殆戲以周郎自況也詞才百許言而江山人物之勝無復餘藴宜其號樂府中絶唱閒閒公以仙語追和之非特詞氣放逸絶去翰墨畦畛其字畫亦無媿也辛亥夏五月來太原借宿大悲僧舍田侯唐臣出此軸見示閒閒年七十有四以壬辰嵗下世今此十二日其諱日也感念疇昔悵然久之因題門生元好問謹書商挺題云東坡赤璧詞閒閒公追和書於玉堂之署遺山謂坡詞樂府中絶唱閒閒詞為仙語題評已竟欲復何言前代風流可敬可慕遺山野史亭夜雨感懷詩云私錄闗告赴求野或有取秋兔一寸毫盡力未易舉棲遲私自惜憂思誰與語轉展天未明幽窻響疎雨每讀至此不覺老淚盈睫東坡之後而有閒閒閒閒之後而有遺山未卜他日知遺山者復何人耶晚生商挺敬跋上海下沙鎮有鶴坡或云鶴窠乃陸機養鶴䖏宋沈約云鶴惟鶴村出者為得地餘皆凡格孫恬詩云歸舟傍南坡坡樹雜嵐氣上有胎禽巢不知育雛未舜祠東廡下有杜康泉世傳杜康以此泉釀酒揚子江心水與恵麓水秤之俱一升重二十四銖此水重二十三銖東坡北海十二石記稱登州下臨大海目力所及沙門鼉磯牽牛大竹小竹凡五島唯沙門最近兀然焦枯其餘皆紫翠巉嵲出波濤中真神仙所宅也上生石芝草木皆竒偉多不識名者又多美石五采斑斕或作金色熙寧己酉嵗李天章為登守吳子野徃從之遊使人入島取石得十二株皆秀色燦然適有舶將轉海至潮子野請於解公盡得十二石以歸置所居嵗寒堂下近世好事能致石者多矣未有取北海而置南海者也觀此記知東坡到䖏弄石不獨米顛在無為軍而已東坡不獨以石供參寥其在高宻又於珠璣巖下取小石如彈丸嵗久為海浪所磨瑩可愛者數百枚養昌陽置盆盎作詩供慈堂老人詩曰蓬萊海上峰玉立色不改孤根捍滔天雲骨有破碎陽侯殺廉角陰火發光采纍纍彈丸間瑣細成珠琲閻浮一漚耳真妄果安在我持此石歸袖中有東海垂慈老人眼俯仰了大塊置之盆盎中日與山海對明年菖蒲根聨絡不可解儻有蟠桃生旦暮猶可待丙寅閏六月鬱蒸異常風雨飄迅所藏書畫法帖俱不敢出曝每日與方牀竹枕取蕉陰荷氣轉徙䃲礴以消之又賴鬻古者間以舫子泊河下持雜蹟來看十百中一二有足繫余心者雖不成售亦得姑錄其副時自玩焉有定武真搨蘭亭一卷視余舊藏係一石而搨手不佳且磨泐去十之五云從新安舊姓得之跋云蘭亭修稧序世相傳以定武本為最佳予家所藏不過是也丙午冬予官于廷直今淮東漕王公順伯丞于棘司每公餘相與繙弄簡冊順伯出其家金石刻百餘古文竒字多所未見暨出蘭亭本十餘讎校之筆瞭然飛動其卓然傑出者則曰定武也順伯誇曰行半天下所得推此今君詩所出又加順伯之所誇安得與吾順伯拊掌一笑共此清賞己酉長至日西昌李大性伯和又此帖入石定武才屬耳石圯畫蠧吾意墨本在人間殆不啻百千萬本今一紙之價如拱璧寸珠踰千金而弗售豈非懼於終盡耶俯仰之間已為陳迹其可慨嘆若此況稧事哉嘉定甲申中春月湖老漁定之又雙井黄犖觀於檢正直舍開讀數過不知吏氣之汚人也嘉定改元九月一日書又題名者十餘人金陵何剡霅川丁端祖東陽喬行簡汴人趙崇憲東陽滕强恕睂山楊汝明三山陳貴謙富沙真徳秀嘉定庚午十月廿二日同觀于羣玉堂江原張鈞建安劉爚睂山任希夷晉陵薛極漢嘉薛紱廬陵胡榘祥符趙希昔嘉定辛未同觀于西湖舟中又宋搨本蘭亭經王弇洲先生鑒定題者甚多悉錄之以備參訂歐陽永叔嘗跋蘭亭謂真本已歸昭陵世所傳本尤多而皆不同蓋唐數家所臨也其真偽優劣覽者當自擇焉今觀此刻與尋常所見者亦異永叔信矣于文傳題止止齋蘭亭帖不問刻之精否見者無不愛玩為其流風餘韻猶可挹也蘇人錢良祐蘭亭詩序為書家六經而善本絶難得茍能彷彿其次者亦勝於學世俗書也近日吳興趙魏公書法遍海㝢學者僅得其形似而古意皆無如啖蔗徒咀嚼其餘全不見其味耳孤蓬倦客陳方題世謂修稧帖實書法之楷正者然太宗得之以為珍玩則出蕭御史之計及歸昭陵雖數百年間而御史之盜名為未泯噫與温韜輩同可恥也今觀此本亦未敢擬於定武恐亦定武之别派歟淮陽焦燦蘭亭叙自昭陵葬後為温韜所發泯沒不知所存唯留定武刻本傳世尚有典刑後之好事者轉相傳倣翻刻則有肥本瘦本三字五字損本之異以偽雜真縱横論説去古逾逺余不諳字學景文持此卷徴余評可謂求道於盲者也諸公皆賞鑒之士既已審定僕亦確信其為善本至元六年後庚辰嵗十月望日吳江用拙道人張淵清夫時年七十又七嵗也賺書那知翼與詢人人牽引説昭陵阿菟書法能參透不問行間一字僧俞焯昭陵千載啟古刻石已殘鋒芒久自滅如出拙筆端臨池幾人誤詎識筆之完貞觀賜搨本尚或傳衣冠兹實兵火餘分派非殊源妙用無隱迹神明當復還秘藏懼不廣摹勒金石刋庶幾將墜法可續後世觀來者儻䕶持何止敵璵璠右薛道祖題修稧叙詩辛巳良月吳陳深書題蕭翼賺蘭亭圖笑談相對各歡顔那信蘭亭去不還千古昭陵遺恨在忍將真本落人間檇李釋若舟蘭亭稧事帖右軍得意書也唐太宗酷愛之蕭翼為時言官不能廻人主玩好之癖以計取之辯才卒以從葬昭陵辯才佛者以物留礙固為可鄙而昭陵之殉又不能免王孫之譏來者可觀感焉至正七年四月十三日番陽釋廷俊為景文先生題賺蘭亭圖帖後世傳蘭亭繭紙已葬昭陵迺蕭御史詭取僧辯才者人主之所好不當爾也文皇思以貞明治天下是必不然故余以為好事者為之若然則異日温韜之事亦佛氏所為報緣者耶此定武本也因觀以及之谷生鄭元善字書為六藝之一前無古人後無來者蘭亭帖其一也當右軍燕集時書以紀一時之事初不計其傳逺與否也自定武墨本散落人間孰不取法焉然以天下之廣嵗月之既多無一人能及之者已徃不可見其來不可知藝之至於至善無可加矣世之堅良者莫貴於黄金白玉萬毁萬滅淪於瓦礫者何可勝數而此墨紙也後人寶之者則曰此吳景文家所藏某字闕某字損千載如昨日則其所謂堅良者不知幾成毁矣一藝之精可傳不朽況其大者乎張遜題右軍真蹟入昭陵後沿唐至宋舉世摹本刻石不下什百雖其才情筆力非復晉人風流然猶庶幾右軍雄秀之氣仲敏出吳君景文所藏善本弋陽樗散者李纉識不知蠶客是朝紳邂逅全無一語真賺得玉書天上去老僧方識世間人梅屋道人書蘭亭佳者誠絶世之寶歴世逾逺則逾難得定武本余獨於秘府數見之人間蓋未嘗見也非獨定武此本世亦未易得矣仲玉尚寶之哉廬陵楊士竒題昭陵玉匣去人間定武王孫未易攀留得雲仍隆準在不教惆悵憶龍顔吳郡王世貞此宋榻稧帖也前有長沙李文正公題額後則元杜本鄭元祐張淵陳深諸名勝及明楊文貞公跋皆許為定武佳派跋語似尚有蕭翼賺蘭亭圖今失之矣紙色如栗玉墨如純漆古雅可愛考之宋刻復州豫章番陽石氏諸本皆闕前會字及周邸所摹第五本結法盡同惟督䇿一二小不如此本乃知周邸絶愛重之與兩定武禇摹賜本合為五耳莫雲卿云海虞有賺蘭亭圖妙甚文太史鑒以為閻中令筆而稧刻不稱後歸趙太史汝師今春晒書見之因舉以歸汝師未敢遽謂延津之劍庶幾中郎之虎賁耳萬厯丙子王世貞題六研齋筆記卷三
