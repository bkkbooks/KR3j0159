body:
  text: 六研齋筆記雜家類三雜說之屬提要臣等謹案六研齋筆記四卷二筆四卷三筆四卷明李日華撰日華字君寔嘉興人萬厯己丑進士官至太僕寺少卿工于書畫故是編所記論書畫者十之八詞㫖清雋其體皆類題跋葢錦褫玉軸流覽既久意與之化故出筆輙肖之也其他所記襍事亦楚楚有致而每一真跡必備録其題詠跋語年月姓名尤足以資考証王士禎嘗譏其以韓愈山石詩為白居易陸游作以唐莊宗如夢令詞為李白作以韋應物西澗詩為杜牧作以林逋為與文同李公麟同時以趙秉文為元人皆譏為舛謬其他如以蘇若蘭與渤海髙氏並列于能書婦人中不知何據又文徵明詩竹符調水沙泉活句乃用蘇軾詩語今見東坡集中而以為吳中諸公遣力往寳雲取泉先以竹作籌子付山僧為質其事未經人用亦殊疎漏大抵工于賞鑑而疎于考証人各有能有不能取其所長可矣是書分三集集各四卷明史藝文志作十二卷葢總而言之其寔即此三集也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
