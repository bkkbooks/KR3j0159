body:
  text: 六研齋二筆卷二明李日華撰文衡山先生詩有極似陸放翁者如煑茶句云竹符調水沙泉活瓦鼎燒松翠鬛香吳中諸公遣力往寳雲取泉恐其近取他水以紿乃先以竹作籌子付山僧候力至隨水運出以為質此未經人道者衡老拈得可補茗社故實李白得許氏奩資極厚在維揚不逾一年散三十餘萬又與東嚴子隱岷山養竒禽千計皆就掌取食了無驚猜兖豫間多樹棗有方術者教以專守一樹自生果至果熟不令人動一枚但人勿損鳥亦自不敢啄也一日頓收之又精心細檢之必有一枚極大而無核者味竒美拜日心存日中天子赤玉冠佩明景長離之劍指揮赤童握棗見授口吞嚼而嚥之大補精髓得啖六七度即踰百歲不老矣李陽氷之子服之以科斗孝經貽韓退之退之又得衛宏官書二部皆古篆籀之精也退之云為古文辭亦須畧識字正謂識古字通六書意義耳張渥字叔厚元人畫工白描學梁風子見其冩陶元亮三徑圖神宇澄茂無藜藿氣所謂戰勝而肥者耶作亂菊於石際㸃葉如苔間露花蕋亦深有古韻石翁倣董元冩柳洲煙艇極有氣骨而蒼莾蕭淡處又似江貫道海岸觀者漫謂倣梅沙彌正未夢見此老脚跟也題云江上浮雲撥不開故人今雨却能來人生離合未容易起拂松花浸酒杯𢎞治己未四月八日惟寅扶憊能過我林屋余亦病起各不能事酒淺酌沾唇而已然談謔之樂不减劇飲時也時有雨作雨汎長卷識别云沈周山谷行書當三錢大計五百五十餘字皆禪翁淡慮任真翛然自得之語書法清遒超朗知其胷不挂一塵也後擘窠大書云元符三年七月涪翁自戎溯流上青衣廿四日宿廖致平牛口莊養正置酒弄芳閣荷衣未盡蓮實可登投壺奕棋燒燭夜歸後又大判一行云此字可令張法亨刻之山谷書只是沉着痛快平生以饑鷹渇驥自命所以剽去蘇米姿媚而獨全神骨此卷又其合作也戊辰正月晦日同秦心卿江邦玉與兒亨從西溪入四十里至横山之千丈崖蹲獅躍豹怪石離立飛瀑陡下上如縻綆下如竹箭修竹森森縁陂平處可班坐陳榼命飲日清雲白草木幽香不獨兩山所無匡衡亦不多見也倪雲林春雨野亭尋常作三四喬柯低巒一帶不作遠山亦無重沙茫茫然真雨中物色也題句云二月雨聲從子月三江舟檝住吳江春愁不醒如中酒浪着狂風撼客牕叔珪友契邀遊僧舍以此紙索畫戲冩春雨野亭并題舊詩右方戊申三月十日瓚米元暉潑墨妙處在作樹株向背取態與山勢相暎然後以濃淡積染分出層數其連雲合霧洶湧興没一任其自然而為之所以有高山大川之象若夫布置叚落視營丘摩詰輩入細之作更嚴也譬之祝公妙八風舞旋轉如鬼物而按其耳目鼻口與人不差分毫也今人効之類推而納之荒煙勃燒中豈復有米法哉東坡書畫記烏絲界紙字方一寸用李泰和行法而雄毅振掉處稍渉顔筆欵云元豐三年端陽月八日眉山蘇軾于淨因方丈書之䟦云東坡先生雄文直節高一世而其英偉秀傑之氣發為翰墨姿態横生鋒穎遒勁尤非時人之所能及此帖文簡意足不易得也好事者宜寳藏之至正十九年龍集己亥四月既望雙流宇文公諒謹題又一詩云急雨苕溪小繫船手披翰墨憶坡仙故家文物今煨燼撫卷題詩一慨然曲阜魯淵柯南宮晴竹一幀立竿亭亭枝葉皆疏散畧無堆垜蔽蘙處又不作枯木蔓草與陂麓沙礫只是行枝布葉合於生竹之數自然精采生動此非有成竹於胷中者不能也昔人論國色不藉鉛黛紈綺所謂西施毛嬙淨洗面與天下婦人闘美此地位未易到也南宮題句云歲寒有貞姿孤竹勁而直虚心足以容堅節不撓物可比君子人窮年交不易曄曄桃李花旦暮改顔色丹丘柯九思并題書法雄逸振動大得顔魯公坐位帖三昧較之平日倣歐整栗者大不侔矣戊辰二月雨中對此欣欣如有霽色趙松雪書光福重建塔銘結搆用薦福興福二碑稍鬆活耳觀者以為倣李泰和則失之矣梵隆十散聖衣紋用水荇描法氣韻古澹其人為逹磨誌公言法華長汀老子普化禪師寒山拾得善道和尚泉大道金華聖者鰕子和尚葢取佛法中神通遊戲諸聖者以配𤣥闗十子也作偈頌者為山陰王英孫英孫亦學佛而有得者余最喜其頌金華聖者云杖藜到處自悠然手托猪頭不是顛成佛若還因喫菜世間牛馬盡升天有人指此卷作龍眠羅漢余為胡盧而已蘇東坡乳泉賦文載全集其真蹟行楷在一友人處余得借觀秀朗華潤大約與公所書赤璧賦向得見於黄又𤣥中丞家者同一結搆皆公極得意筆也此卷乃為歐陽晦夫書者前有手柬一通云軾數日病痢不果往謁想起居佳勝餞行詩輒䟦尾匹紙亦作數百字餘皆馳納軾再行晦夫推官閣下七月十三日乳泉賦切勿示人切懇切懇趙京兆所藏此軸竒偉特甚以歲月驗之蘇公元符北歸所書也時方厄於章蔡之餘而人之貴重如此豈待百年而後定耶若夫筆老墨秀挾海上風濤之氣以平生所見論之當為海内蘇書第一紹定癸巳歲九月七日陵陽李心傳謹書天一生兮上浮羽人俟兮丹丘遡儋耳兮東注夾崑崙兮倒流嘉熈三年四月旦王遂題尤焴劉厚南蔡抗林希逸王璞趙時煥高斯得徐霖同觀于道山堂淳祐丙午季夏望日此卷舊藏霅川向澤民家澤民以遺施武子甲戌歲同醉白記歸三桂晦夫姓歐陽梅聖俞嘗有詩贈之作八分體東坡䟦數語於後今亦藏向氏云端平丙申暮春朔錫麓尤煓蘇公蚤聞道文章乃其戲乳泉出重海作賦聊紀異玉池嚥中夜挈瓶非小智氣者水之生此語可深味淳祐甲辰孟夏朔峴山王亞夫書於西湖孤山之陽坡翁謫海上人傳已仙去道逢章子厚遄復返塵路至言恐世驚猶閟乳泉賦遥憐嵩山丘千古不可駐是日仙居陳仁玉同書後萬籟既寂一氣孔神吸彼沆瀣沃此肺膺至陽之精天一所生欽哉此詞展也大成煓乳泉賦不待多贊特恨此軸尚有餘紙安得起坡翁書滿卷後耶天台謝奕修書于西湖淳祐甲辰首夏望後二日腥波暗天濁浪翻日蛟蜃黿鼉之所出没有兀其島清泉中發静涵太虚孤浸明月汲之無窮元氣所泄古今正理不可泯滅抑斯泉也為斯人設㑹稽孫子秀書蘇長公以紹聖四年丁丑二月責授瓊州别駕安置儋州六月渡海七月十三日至儋僑寄城南鄰於天慶觀觀有乳泉故公為援筆賦此元符三年庚辰公居儋已四年㑹正月祐陵登極大赦天下五月移公亷州六月還瓊復渡海至亷七月又以皇長子生國有大慶遷舒州團練副使量移永州七月終方自亷啓行賦後題云七月十三日書則正在亷時也十一月行至英州又復朝奉郎提舉成都玉局觀任便而居公遂度嶺南還明年為建中靖國元年辛巳五月至毘陵六月因疾告老以本官致仕七月廿八日遂薨公之書是賦時年已六十有五距其薨僅隔一歲實為晚年之筆李侍郎微之謂其筆老墨秀挾海上風濤之氣當為海内蘇書第一誠知言也哉濓嘗見漳水酈元輿跋公眉子石歌四十五字斷簡謂日百謁而弗之厭使其見此吾知其必日百拜而不止也然公之薨未㡬詞翰皆為世大禁而狗䑕之徒如霍漢英輩猶鳴吠不已磨剗焚炳無所不用其極而斯卷無纎毫不完豈公妙墨所在或有鬼物呵䕶之耶金華宋濓謹書此卷為蘇書第一前輩已有定衡其所著述亦第一等議論也予渡清淮望第一山盱眙陳質之出以見示不圖今日得數竒觀非平生第一快事耶𢎞治丙辰仲冬望後三日陜西按察司提學副使石淙楊一清元張憲字思亷號玉笥生與楊鐡崖高季迪諸公遊詩亦清妙有味其贈宋仲温一律云江南羽化張天雨海上神交宋仲温楷法鍾繇稱獨歩筆臨皇象已專門折釵未墜風前股漏屋先凝雨後痕寄語臨池諸俊彦蚓蛇雞鶩莫須論倪雲林贈仲温三詩有敘至正乙巳三月廿四日仲温高士與沈文舉共載訪余笠澤東渚之蝸牛廬中相從過王明宅煑茶留坐遂以永日但恨吾子儀遠在數十里外不得同此集也廿五日仲温别余他之漫成長句以冩余懐瓚三月將䦨春欲夏廵簷共看辛夷花階前瀹茗香照色坐上吹笙清不譁拄杖偶過公子宅班荆宛似山人家宋玉才情何可得肯抛塵土踏江沙江上欣逢宋仲温蕭條古道向君論我居笠澤已十載看竹唯君欵我門宋公天下士畫竹就鼓琴來我北渚下相從論古心許廓無豫章囘云於匡廬得見秦中老仙號無顛者年已百二十歲有竒指示採藥乃鄱湖濱一山其蹠浸水中五丈餘冬月水涸盡乃得就采其藥於亂石子中别之大都百斛石子止遇一二枚非誠心真懇者不一遇也藥以粗石包裹擘之内有紅白青諸種即真鉛真汞也得而煉之乃魏伯陽爐鼎中物許旌陽石函記单明此道所謂不遇真師莫浪猜者余强其倒篋相視石有細金沫如蜜陀僧世外竒事竒物竒理豈局凡者所能測耶戊辰三月八日竹嬾記元虞道園題柯敬仲竹木云吾先世住隆州隆州於宋為陵州州治之後山吾家焉文與可作守事簡時來就我家拾取故紙背作茅蘭竹木之屬所得頗多吾㓜時尚收得數紙今亦亡之丹丘生用文法冩竹木而陂石過之近又以新意作墨花甚妙觀此則虞之上世亦崇尚翰墨極意收藏故有紙背可拾而太守得時往隣近寓公之家作散懐事亦足徴宋法待士大夫之寛也元謝書巢遺虞道園瀘州石硯見元人冩生之妙不獨錢巽峰又有僧惠甄腐𤓰行蟻圖最竒蘇東坡手書蔡君謨夢中詩天際烏雲含雨重一絶及太守陳述古閣中壁上君謨書一絶綽約新嬌生眼底侵尋舊事上眉尖問君别後愁多少得似春潮日夜添又不知誰人和一絶云長垂玉筯殘粧臉肯為金釵露指尖萬斛春愁何日盡一分真態為誰添又杭妓周韶落籍詩及同輩胡楚龍倩二詩東坡乗興偶連書之字法婉麗含蓄真千古妙札也元時柯敬仲得以示虞奎章奎章試郭屺墨書跋其後益足重矣但不知誰人所和君謨之作聲調本凡幸經坡翁手筆若連茹之拔耳而奎章以為軒轅彌明之流則過當矣明金華王葯字子約善畫竹多用鈎勒與蘭溪徐良甫梅徐舜舉書號三絶蘇伯衡嘗為鈎勒竹歌以美之婺赤松溪在金華山地名玉壺金盆鹿田黄初平叱羊處初平號赤松子不言何代人一云初平兄弟三人兄初起與初平同仙次魯班班則春秋時人漢初張子房欲從赤松子遊其即此耶北宋張先吳江詩句云欲圖江色不上筆静覔鳥聲深在蘆江色空碧虚無兼之雲陰日爽開斂閃爍難以定取張子野形容至是知其妙於繪事恨未得其蹟一玩之也己巳三月在武林陸氏見張浮休書一方幅作林木數株隱隱止露枝梢如在波浪中一牛浮鼻而過餘則空濶荒遠有數人立沙磧邊際此真善描江色者浮休與江貫道同一畫法皆北宋士大夫賢者以此寓意所謂文章之餘溢而淡宕自恣耳豈習者之流哉唐皮陸漁具詩題凡十五物曰網曰罩曰􅞍曰釣車曰魚梁曰乂魚曰射魚曰鳴榔曰滬曰􅀢曰種魚曰藥魚曰舴艋曰笭箵今太湖漁人以三等網行湖中最下為鐡脚魚之善沉者遇之中為絲網上為浮網以截魚無遺秋風大發以舟載釣具繫餌沉之巨浪中取白魚謂之釣白淮河中用狹長小舠安白髹板一片夜以火照之魚視疑為決水踴躍而上謂之跳白唐牛竒章嗜石石分四品居甲乙者俱太湖也石根挿入湖底波濤撼擊遂成竅穴嵌空玲瓏極有竒狀質含津潤與雲氣開斂相為晦明叩之硜然兼有泗濱之韻所以為佳吳越錢氏元璙作鎮與外戚孫承祐極意搜剔竒秀者盡輦而置之園林矣宋宣和中又經朱勔羅致盤固侯既入艮岳諸零珍碎璧盡出人間今有弔竒者但當於昔人傾臺涸池之側以長钁從事不煩問之水濱越剡中山水竒絶然僻在江海之曲前代未有聞也自典午東渡王羲之謝𤣥許詢支遁孫綽阮思曠王子猷戴安道謝敷王坦之袁宏王濛殷融蔡系顧歡謝萬孔淳之前後來居競吐清麗藻韻激射以煥山川之光遂作千古勝地南宋王性之銍栖剡中友人亷宣仲作訪戴圖以貽之戴安道酒贊云醇醪之興與理不乖古人既陶至樂乃開有客乗之隗矣其頺唐顧逋翁剡紙歌云雲門路上山陰雪中有玉人持玉節宛委山上禹餘糧石中黄子黄金屑剡溪剡紙生剡藤噴水搗為蕉葉稜欲冩金人金口偈寄與山隂山裏僧手把山中紫羅筆思量㸃畫龍蛇出正是垂頭蹋翼時不免向君求此物唐薛能詩曰越毫逐厚俸剡紙得佳名注云近相傳以搗熟紙名硾雞林志云高麗紙治之𦂳滑不礙筆光白可愛名白硾紙一名玉葉紙古剡藤紙得名最舊其次苔箋今獨竹紙名天下他方效之不及遂掩藤紙矣竹紙上品有三曰姚黄曰學士曰邵公王荆公好用小竹紙士大夫書簡往來多用焉東坡海外歸買剡紙二千幅米元章著書史云予嘗硾越州竹紙光透如金版前輩貴竹紙於此可見米元章竹紙詩云越筠萬杵如金版安用溪藤與池繭高壓巴郡烏絲䦨平欺澤國清華練老無他物適心目天使殘年同筆研圖書滿室翰墨香劉向何時眼中見薛紹彭和之云書便瑩滑如碑版古來精紙唯聞繭杵成剡竹光零亂何用區區書素練細分濃淡可評墨副以溪藤難乏研世聞此語誰復知千里同風不相見宋姚弋仲夜砍粘罕營不中致宋鼎淪墜即夜遁去不知何往後五十年有見之青城山中者葢從方外養丹得仙也所師友者呂洞賓劉高尚陸放翁作詩題上清宫壁間以招之云天方覆中原殆非一木支脱身五十年世人識公誰但驚山澤間有此熊豹姿我亦志方外白頭未逢師年來幸放廢儻遂與世辭從公遊五嶽稽首餐靈芝蜀青城山中有孫太古畫碧落侍郎范長生舉手整貂蟬像特妙按佛氏五眼一曰肉眼二曰天眼三曰慧眼四曰法眼五曰佛眼其肉眼亦徹見一踰繕那踰繕那者四十里也人眼能見四十里豈尋常事今人動稱肉眼凡夫用以相誚亦太狼藉矣余偶閲時畫赤壁圖舟中類作一僧余戯筆加冠作道士形旁觀皆笑以為浪然耳余曰此實録也葢坡賦中所云客有吹洞簫者乃綿竹道士楊世昌也若佛印足跡未嘗一至黄徒以優塲中所見為據正矮人觀戲村漢説古耳閱倪雲林西神山圖題句云𤣥中真師在錫山東郭門立精舍號𤣥文舘幽密敞朗可以閒處至順壬申歲六月余處是兼旬謝絶塵事遊心淡泊清晨櫛沐竟至終日與古書古人相對形忘道接翛然自得也又西神山下有流水味甚甘寒與常水異舘至西神不五里得朝夕取水以資茗椀讀書談道之暇飲水自樂焉乃賦詩曰真舘何沉沉寥廓神明居陽庭宿敞朗丹林鬰扶疎睠言兹遊息脱屣榮利區檐榱初月麗池臺凉雨餘焚香破幽寐飲水聊舒徐潛心觀道妙諷詠古人書懐澄神自怡意愜理無遺誰言黄虞遠泊然天地初廻首撫八荒紛攘蚍蜉如願從逍遥遊何許崑崙墟蕭閒仙卿倪瓚竹懶曰𤣥中真師不知何人觀此稱呼必雲林所禮為師者元時𤣥教極盛吳全節張伯雨皆博極羣書高抗物外倪所尚貞潔其所尊事必非凡流又有樂圃林居圖題句云暮投齋舘静城郭似幽林落月半牀影凉風孤鶴音汀雲縈遠夢桐露濕青琴喧卑淨塵慮蕭爽集冲襟余來城郭而暑氣熾甚偶憇甘白先生樂圃林居不覺數日相與蔭茂樹臨清池誦羲文之象爻彈有虞之南風遂以永日成此一詩并冩小圖呈甘白以寓笑樂耳甲寅六月十五日倪瓚沈石田有寄竹鶴翁詩擘窠書極雄快詩亦真率有味詩曰道人種竹復養鶴鶴可看家竹䕶壇渡海借騎仙驥子題詩吝説冩琅玕風前掃葉碧雲亂月下聞聲白露寒終日閒縁消不盡墮毛為服籜為冠沈周寄題竹鶴以為他日相見資柳公權最喜青州研曰墨易冷墨之冷熱人所不解大抵硯質粗澁墨有沸沫纒筆者熱也其平行凝勻者冷也青州硯陶泥所成質細而膩故墨不作沸但燥滲不能停墨亦非佳品誠懸不能用宣城諸葛筆為老工所訶其鑒研又如此竟擅書名何哉嘉興人聞人滋字茂德老儒也喜留客食然不過蔬豆而已郡人求舘客者多就謀之又多蓄書喜借人看自言作門客牙充書籍行開豆腐羮店後為勅局刪定官出陸務觀老學菴筆記羣臣所服帶以玉犀金銀為次宋靖康中括金賂敵詔羣下服金帶者權以通犀代之葢敵人知取盈於金而不知貴犀也趙廣合肥人李伯時家小史伯時作畫每使侍左右乆之善畫尤工作馬建炎䧟敵敵使畫所掠婦人廣毅然辭以不能因斷右臂而廣平生實用左手亂定唯畫觀音大士見者皆以為伯時也南宋時餘姚有秘色磁麄樸而耐乆今人率以官窰目之不能别白也秦熺當其父檜執政十九年中無日不煆酒器無日不裱褙書畫碑版書畫碑版本學問清尚事入此輩手中只成豪縱之習不足多也黄魯直有日記謂之家乗至宜州猶不輟書高宗見其真本愛之日置御前丁謂既導上以神仙之事為玉清昭應宫使又自謂令威之後喜言仙鶴事人但稱為鶴相周益公遊山録云太湖東邊兩山對峙南曰胥山北曰香山中一水曰胥口即我郡之胥山也蘇州天平山亦有飛來峰高季迪詩云風吹峨眉雲來依此山住我來不敢登只恐還飛去宋陳純臣薦白雲泉於范仲淹意既超竒文亦高妙書曰粤自剖判融結其中傑然高岳巨浸不待標異固已聳動人耳目不幸出於幽隱之地必有名世君子發揮善價所以㑹稽平湖非賀知章不顯丹陽舊井非劉伯芻不振惟蘇臺古郡不三十里有山曰天平有泉曰白雲山高而深泉潔而清儻逍遥中人覽寂寞外景忽焉而來灑然忘懐碾北苑之一旗煑并州之新火可以醉陸羽之心激盧仝之思然後知康谷之靈惠山之英不足多尚天寳中白樂天出守吾鄉愛貴清泚以小詩詠題後之作者以樂天託諷雖遠而未盡是使品第泉目者寂寂無聞䝉莊有言重言十七今言而十有七為天下之信非閣下而誰歟恭維閣下性得泉之醇才得泉之濬仁禀泉之湧智體泉之動靄是四雅鍾於一德又豈吝陽春之詞以發揮善價純臣先人松檟置彼一隅歲時往還常媿文辭窘澁不足為來今之信儻閣下一漱齒牙之末擘箋發詠樂天如在當斂䇿避道不任惓惓之誠仲淹為作詩云靈泉在天半狂波不能侵神鮫穴其中渇虎不敢臨隱照涵秋碧泓然一勺深遊潤騰雲飛散作三日霖天造豈無意神化安可尋挹之如醍醐盡得清凉心聞之異絲竹不合哀樂音月明羣籟息涓涓度前林子晉罷雲笙伯牙輟玉琴徘徊不擬去復發滄浪吟乃云堯湯歲盈盈常若今萬里江海源千秋松桂陰兹焉如有價北斗量黄金杜瓊得朱長文樂圃東偏地結亭聚石號曰東原元陳維寅維允兄弟得朱勔園亭居之有來鴻軒清泠閣蘿徑極幽適之趣二君繪事特妙石田冩梅余於武林陸仲承處見一幅蕭灑歴落榦不數枝枝不數葩而有偃罩盈庭之勢知其入思深而下筆捷也忘其題語今見與史德徴一卷風格與前畧似題語云崑山士人多畫梅適與王理之論其用墨太重殊失清雅是有累於梅矣因短縑在案史德徴從容謂曰清雅果何似丈人當示一梢與梅吐氣何如遂妄弄此筆理之亦作錯刀數葉間於疎處仍題之以贈德徴𢎞治甲寅歲端午日沈周謝樗仙有莽蒼酣肆之筆大類石田一長卷乃其入楚往還舟中率意冩所見者煙峯沙樹水鳥客帆種種㑹意此如崔徽自臨鏡冩真豈有毫髪遺恨乎題語云明嘉靖廿六載丁未吳門六十老人謝時臣遠遊荆楚登太和次大别梯黄鶴渉匡廬下揚子舟中推蓬取興敢與谿山冩真積成長卷計三幅遥寄嘉禾少溪草堂少溪賞識名家此筆得所歸矣少溪者項司馬子長也石田又有冩梅一紙氣格簡古其題語亦甚得意乃知此老撮揑虚空無不成趣所謂海印發光真仙宫佛度中人也詩曰平生有眼厭桃李但託梅花是知己小橋初春帶淺水青鞋布襪從此始看花嚼蕊氷雪中清浹肺肝香沁齒歸來拈筆弄清真淡墨依稀春繞指花光補之今不作我欲師之竟誰是横梢的歴寄疎畧自我意為聊爾爾正如北人煑床簀筍味茫茫舉其似理之嫌我太草草斜補竹枝成玉倚要知君子德不孤勿謂畫圖而已矣文與可細竹二竿先用焦墨作攢針碎枝灣曲取態後以澹墨就勢加葉得紛披亞疊之趣上以行筆題鳳尾二字别標欵云錦江道人文同為雪岸先生作下有跋云此鳳尾君乃外祖錦江公之真跡為宋趙雪岸先生所作雪岸者諱仲佺字隱夫能篆籀亦寄興於丹青其鳳尾二字雪岸所題也雪岸與外祖交昌髫時嘗過湖州曽識其眉宇軒然王孫氣象所遺書畫種種貴重此圖友人魯茂之持來鑒定昌拜觀曰淡墨而掃超妙絶塵飄飄仙氣清風襲人請善藏之辛丑九月二日外孫張嗣昌謹識元錢良右字翼之行書高朗卓越風格不讓鮮于困學至治中奉勅書真西山大學衍義進御得官鄉校余見其書所作江村歌一卷不獨㸃畫之妍其語亦沉着雄邁陸放翁一流人也又書真西山題劉敏叔畫八大老像詩云劉子出江西訪我江之東何人與俱來函袖八鉅公韓歐開濟姿如晴月當空潞公山岳重文正霜檜同玉立東坡仙天遊匪涪翁凄其趙韓王小異凌煙中半山執抝面亦得傳無窮又題後云江西劉敏叔嘗自畫韓忠獻歐陽文忠文潞公范文正東坡山谷趙韓王舒王八公像謁西山先生請跋先生賦此詩於卷後敏叔名訥遊誠齋益公諸老之間文物風流槩可想見因過清真留觀復齋正字聞余誦出紙俾書之至治二年正月八日後學錢良右記沈石田倣雲林小筆雖樹石歴落終帶蒼勁而各行其天絶無規撫之意所以較之孟端終勝一籌其贈吳瑞卿一幀尤有竒趣題句云山中地貴何錢買水次幽居却儘强潦草杯盤無俗客清虚亭舘但湖光弱雲過雨不多㸃高木當風有許凉一詠一觴聊遣撥自家錯認是柴桑吳瑞卿能畫尚求小筆又愛余唐律言余畫似倪迂詩似陸放翁葢愛而忘其拙淺矣併識其言云沈周倪雲林著色山水余見五六幅各有意態戊辰三月在金陵王越石示余一幅乃為周南老作者雲嵐霞靄尤極鮮麗所冩松皆枯毫渇筆就意為之而天趣溢出周南老題云雲林小景着色者甚少嘗客寒齋間作一二觀其繪染深得古法殊不易也拙逸叟周南老題按南老北人之渡南者宋遺黎也學精三禮寓姑蘇行極高潔有重望以故元鎮往來其家豹隱紀談云楓橋舊名封橋後因張繼詩江楓漁火句改楓橋今天平寺藏經多唐人書背有封橋常住字唐時節度使入境州縣立節樓迎以鼓角稱鼓角樓宋淳化二年六月詔州府監所受詔勅並藏勅書樓即鼓角樓也其更鼓之節凡日之晡則吹角一疊撾鼓十數聲謂之小引申時換牌樓上立兩旗指外春曰青陽夏曰朱明秋曰白藏冬曰𤣥㝠各如方色黄昏吹角五人為三疊撾鼓者六人每角止撾鼓數千為三遍遍三撾六擂凡三角三鼓而止四更則奏角而不鼓亦謂之小引三㸃乃再發五更止謂之大角動嵐齋録云張摶為蘇州刺史木蘭堂花開大宴郡中詩客唯陸龜蒙後至摶聯酌浮之陸徑醉强執筆題二句云洞庭風浪𣺌無津日日征帆送遠人遂睡去搏令他客足之咸莫解其意俄而龜蒙稍醒援毫書云㡬度木蘭船上望不知原是此花身遂為絶唱宋提舉江州太平觀魏憲重修蘇州半塘寺稚兒塔記云按舊記晉義熈十一年名法華塔詔賜國財以建葢僧道生誦法華經有童子名稚兒日侍立聽法死塟此後有商人謝本者泊舟夜聞誦經聲旦尋之有青蓮花生冡上事聞建塔故名法華塔國初高啓詩云黄土但埋骨豈能埋性靈昔聞宿草間曽吐蓮花青身卧長夜臺口吐西方經尋迹殊窅窅聞聲每泠泠寒燈照孤塔時有山僧聽應使隣塜魂沉迷盡皆醒則稚兒本童子之名而塔亦尋常木石所建之塔也不知何時好事者飾之以稚兒為雉兒又取西僧所携瓦塔高尺餘大五六寸圍者云此是昔年塟雉之物吳下盛傳罔人施利無何又以塔歸王伯谷半偈菴士大夫皆相詫為竒事人之不多讀書而談今古與鬻古者繆指塵土間物曰此三代此秦漢皆雉兒塔之類也徐靈期衡岳記言紫葢雲密二峰皆高五十餘里雲密山有禹治水碑皆蝌蚪字祝融峯上有碧玉壇方五尺東有紫棃高三百尺乃禹所植實大如斗赤如日食之長生單以清常熟元陽觀道士也附舟至嘉興聞異香疑有異人見船頭一人儀趣頗殊以清遷與並坐香氣彌甚因從容問之荅曰我此地人少時病大風逃於深山中遇一老人哀之令從行至一處有草堂數間老人曰汝可居此以藥一裹令餌之遂不饑渇身日以輕越兩月老人來笑曰有心哉尚在此耶疾已瘳矣爾若勤修道術可以長生人間遂令歸予拜問其姓名老人曰子聞國初有李衛公其人乎此唐末時事也周𤣥真嘉興人入紫虚觀從李太無為道士太無杜道堅弟子也至正戊子來居葑門報恩道院以篆符召鶴名所居曰來鶴軒自號鶴林先生李韓公善長薦於朝致雨有驗錫宴光禄卒葬於莫月鼎墓次毘陵二畫乃天慶觀壁李懐仁畫龍太平寺壁徐友畫清濟貫河圖俱千古絶蹟宋末尚在吳德輝楊誠齋有詩題詠今人不復能畫壁輕縑薄素茍且効技徒取流俗之賞不足發人雄思止湖州興聖寺趙子昻夫婦左右二壁墨竹差有歴落之韻然亦糢糊糜爛多矣繪法於此漸斷野狐縱横於紙筆之塲可嘆也巨然畫趙秉文跋云此畫南麓任君得之宇文虛中最後題云天㑹五年正月八日禮部尚書閒閒老朽趙秉文識史明古駁之曰天㑹金主烏竒邁紀年也是歲丁未為宋欽宗靖康二年金兵方入汴虜二帝北去高宗即位改元建炎明年戊申以宇文虚中為祈請使使金虚中遂降於金後十有八年虛中被殺則哈喇皇綂六年丙寅也而秉文以烏禄大定二十五年乙巳方登進士第至烏達布興定元年丁丑始拜禮部尚書兼翰林侍讀學士尋以論罷五年辛巳復起為禮部尚書寧嘉蘓嗣立改翰林學士至正大九年壬辰卒于汴年七十四計其生當在都古嚕訥正隆四年己卯上距丁未凡三十二年然則秉文尚未生而虚中亦未至金也豈南北分立國史記注或失其真歟將當時别有一趙秉文歟或金之後世亦有重稱天㑹如元之有兩至元歟抑考之任南麓名詢正隆二年進士已在秉文數十年前生而秉文至於老朽詢固無恙又何其多夀耶若夫文詞之鄙字畫之繆固不在論也然亦幸其淺陋不學故人得而議之使其粗知時世先後而傅㑹焉尚何辨哉烏達布一名晟哈喇一名亶都古嚕訥名亮烏禄一名益烏逹布一名珣寧嘉蘇一名守緒趙閲道琴鶴風標清暎千古其手翰整栗遒美酷類范希文道服贊葢二公精采同一律度也余得見其山藥帖語云抃啓辱誨示以南都山藥分惠曷勝珍感介還布謝崖畧不宣知郡公明大夫抃頓首即刻末又數字云海柑四十顆容易為獻皇恐皇恐宋時目薯蕷為山藥葢已避真宗諱矣宋之南都即今之歸德也始興盧度屋前有池養魚皆名呼之次第取食而去東坡居嶺外問長生訣於吳復古復古告之曰安曰和安則寧一而精神不擾和則優柔而情思不躁即老氏致虚守静之旨也夏孟暘昺㫤之兄也精書法預修永樂大典初授永寧縣丞被誣謫戍大學士楊榮薦書釋典擢中書舍人善繪雲山嵐樹得意不减米南宮高房山支鑑字汝同性整潔日就窻几界烏絲䦨作小楷百字畫細篠澗蒲頗極幽致顧信字善夫元大德初為浙江軍器提舉以能書稱從趙文敏公遊得其書必鎸於石作亭扁曰墨妙晚年號樂善處士汪玉水購得文五峯萬壑松風圖從下數上凡五層第一層大松四樹踞盤石而生石根横一平橋橋下湍流漱雪碎石滿磵第二層畧見山脊錯落布中松五六樹樹根一老獨坐又二行者在松徑松間有亂流滚下第三層作小中松四堆在平崗上崗左右嵯岈露山脚犬牙相錯水淙淙其間一老者趺坐而琴一人倚樹而聽又二人促坐對語第四層寸様小松三四帶雲氣雜之上作尖峰七八座左右各取勢為之峯罅迸瀑五處第五層削壁直下上下大小松樹皆披拂震動之象余見王叔明臨展子禽北風圖筆法如此此等大局面畫非經着意布置與陶鑄古人法中者乆未易窺其籓也薺和肝夜明目夜則血歸於肝肝氣和則血脉流通津液暢潤東坡與徐十三薺羮書以為天然之珍雖不甘於五味而於味外有自然之美天生此物以為幽人山居之禄劉孟希云永興湘湖蓴菜三月採盡至秋則無人採矣不知孟希特見永興之蓴耳春蓴如亂髪不足采秋蓴長丈許中止一二尺生水甚滑一二尺外皆棄物耳春蓴嫩不堪作羹季鷹秋風之思正在此一二尺間也杜鴻漸與楊祭酒書云顧渚中山紫笋茶兩片此物但恨帝未得嘗實所太息一片上太夫人一片充昆弟同啜然則唐所進奉類非佳味其後開成三年以貢不如法停刺史裴充官吳丹麓傳松脂方用上好煑酒煑松香先用淨水浸洗煑二十七沸每沸良乆傾出水瀝乾易水煑沸二十七次又瀝乾用酒煑二十七次候燥研粉如玉每斤加栢子仁去油淨末八兩甘菊花去蒂淨末八兩何首烏用牛膝黒豆蒸九次淨末八兩入前松香中煉蜜丸如桐子每辰或滚水或酒服八十丸堅筋骨易鬚髪長生不老松之能壽人聞之乆矣山中道者春時取松嫩頭去粗皮蜜漬之畧煑令蜜透勿太熟食之香脆而益人東坡作茯苓沙法取好茯苓去皮滓水澄過曝乾淨蜜和匀揑團裝瓦罈中隔湯煑三炷香即成團矣元至正壬辰年湖州雷電大雨有物如果核雜雨以下破而食之味如松仁或曰此娑婆子也倪雲林詩云庭前樹子落娑羅又是一種沈石田灣東草堂圖酣濃蓊鬰純法董源有題句云愛子别業灣之東去家僅在一里中蔽門遮屋樹未大矮簷但見麻芃芃頻年一意躭詩酒翻然改與耕夫偶赤脚饁飯走細塍戴笠牽牛映新柳時人喃喃笑子愚阿翁儘有高明居何至妻子嫌側陋何信兄弟專錙銖從人自説渠自好力田養親殊有道强於遠宦竊升斗手種長腰使親飽力田養親樂已多兄弟妻子如予何我與題詩解嘲罵門外雨來蛙滿河成化壬辰五月二日為德韞弟作沈周石翁此詩真率樸直如家常話不作一毫綺語味其意德韞者乃不和於俗而力田自好者翁之所深與也吳江有一種長腰米作飯粒大而香食之益人精氣德韞所營以養親者賢哉倪雲林漢御史寛後十世祖碩事西夏宋嘉祐中使中朝留不遣占籍淮甸建炎時五世祖益渡江居常州無錫縣之祗陀里高祖伋曽祖淞祖椿父炳兄珪子洗字孟民周南老作墓誌叙次甚詳母嚴配蔣師鞏昌王仁輔仁輔老無家奉養如父殁喪塟為制服受弔漢武内傳載上元夫人授帝五帝六甲靈飛之符太陰六丁通真逐靈玉女之籙大陽六戊天光䇿精之書左乙混沌東䝉之文右庚素収攝殺之律壬癸六遯隠地八術丙丁入水赤班符六辛入金致黄水月華之法六巳石精金光藏景化形之方子午卯酉八禀十訣九靈威儀丑辰未戌地真素訣長生紫書三五順行寅巳申亥紫度炎光内視中方凡十二事皆陰陽五行十干十二支中制剋生化之理至人神明之以為妙術後來冦謙之杜光庭鄭思遠林靈素所輯三洞符經不外此數種真以為琅霄蕭臺八㑹文所降未敢信也而謂冦杜輩悉出已裁亦非也𤣥門守泥丸亦子無英白元之事是收拾神氣向内乆之則神凝而冲舉矣佛家彌陀十六觀乃拔神置清虚潔妙之地觀成則脱去穢濁而往生矣設教雖二其求清升上臻一也漢書太液池中作三神山以象海内瀛洲方丈蓬萊瀛洲一名魂洲亦曰環洲有樹名影木月中視之如列星懸火精為日刻墨玉為烏以水精為月青瑶為蟾兎於地下為機棙以測昏曉不虧弦望時有香風泠然而至有草名芸苖狀如菖蒲食葉則醉食根則醒有鳥如鳳身細翼丹名曰藏珠每鳴翔而吐珠累斛仙人常以其珠飾裳葢輕而曜於日月也蓬萊一名防丘亦名雲來水淺有細石如金玉得之不加陶冶自然光淨方丈一名巒雉雲色常紫上有通霞臺衆鸞鳳鼓舞如琴瑟和鳴三山統名崑丘亦曰神山上有不死之藥食之輕舉使遼録云北馬有割去肝能走百餘里者其法以醇酒飲之於脅間取出沈伯遠一研正作馬肝色余為銘之曰刳駿馬肝沃以醇酒研磨隃糜風雷入肘或曰此史皇氏斧也文匠斵削轉相授手元柳道傳貫行書虎丘詩一卷縱横遒逸亦鮮于之亞也詩語宏麗手録之題云奉陪侍御金源公虎丘之遊閲數日乃能成詩以記覽歴詩凡二十五韻闔閭藏窆處白虎卧其丘殉葬劍已化金精猶上浮秦强事穿伐鬼功叶人謀刳腸裂青壁瀝髓發寒流樹色不知古蛟龍鬰相繆蜕影入深窈鐡花繡吳鈎供庖綆汲餘千人宜浣漱生公昔講經聚石石㸃頭至今盤石上法雲垂蔭休寳坊何年建凌虚出飛樓北牖俯平楚西軒延廣疇登臨小吳㑹萬象一目收韋白題詩後物華厭雕鎪胡哉幽獨君窅然遺清謳兹山起原隰山形如覆甌我疑星遊空墮地得長留不然駕海來六鰲為載輈現成般若臺不以聞思修客過閶門西看山㡬囘眸是節風日美招携有扁舟旋櫂午景停繫籬野陰稠行酒進熱啜飲䦨歸意遒詞客思如雲尚書氣横秋吾衰落人後技癢紀斯遊謬語尚可芟蕪穢焉能廋至順四年四月六日侍御王公叔能放船具酒肴以邀常博柳先生遊西丘盤桓金氏圓覺院必待日入而歸余與遂昌鄭明德實從詩吾往嘗和之侍御公殁後數年先生有待制之命復由此而北未乆終於官於是萃其遺并為一卷異日其子孫見之庶知予於先生不忘也時至正二年十二月廿九日錢良佑志趙松雪為黄子乆展書快雪時晴四大字可作扁署諸公題者數人趙公展快雪時晴為大書與昔人促蘭亭同一機括如畫龍者胷中先有全龍則或小或大隨時變化在我矣此四字公為黄君子乆作子乆以遺莫君景行遂以名其齋云至正五年九月二十日黄溍觀右軍張侯帖唐人硬黄所臨米南宫定為神品并叙其傳者本末而字多朽闕趙文敏公為書于後帖中快雪時晴一語最為佳絶復展書之筆勢結密咄咄逼真使南宮復起見當斂袵二者俱藏景行氏嗟乎徑寸之珠盈尺之璧小大或殊皆至寳也得而合之是豈偶然也耶河南張翥敬題於武林史局文敏公大書右軍帖字余以遺景行當與真蹟並行也黄公望敬題晉尚清言雖片言隻字亦清快雪帖首尾廿四字耳字字非後人所能道右軍之高風雅致豈專於書耶趙文敏公以松雪名齋特表章首四字而大書之亦豈無謂歟此幅可與帖並傳天地間散落異處何幸而合於莫君寳之寳之汴段天祐晉人為書每能徑丈一字方寸千言葢其胷中自得全牛故或大或小皆有遊刅之地若趙文敏書法雖特起今代而其所造詣實追晉人及觀快雪時晴四字信乎與右軍帖高致無異想當其運筆之時意合手從亦不自知有今昔大小之間故能得其神趣之妙使第以形骸索諸古人惡足以及是哉藁城倪中敬書于武林安國里之和陶軒古人臨帖妙在得其意度不特規規於形似而已趙文敏公臨右軍帖為尤多余家藏快雪帖乆矣公反覆題識於上可見其珍重之深也又摘此四字展書之雖大小形似之或殊其意度則得之矣遂掲之齋中以並傳不朽云南屏隱者莫昌識六研齋二筆卷二
