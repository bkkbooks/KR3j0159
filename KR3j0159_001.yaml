body:
  text: 六研齊筆記卷一明李日華撰薛紹彭書法從蘭亭秀整綿密中入譬之道脉則中行之士也而變化雄桀之氣絶少是以不能不遜蘇米觀其監太清宫見二蘇上清詞恱之不自揮翰必求坡公書以入石則其伏膺眉山深矣今世稍窺筆法者必欲論著相排何其淺也蔣文藻林塘與姚丹丘同隱大雲執師資之禮書畫步趨丹丘有酷肖者所作叢竹老木尤蒼徑有致人或以文雅稍怯輕之然亦有朴野真率不失山林氣味者如野步過田舍留飲題舊作竹石上云吳蠶上簇桑柘空薔薇花開村徑紅野夫飽食無一事緩步小橋西復東黃鸝緑陰啼不歇路轉却逢田舍翁殺雞留飲話疇昔葦箔稍稍來南風江南好景復何有移山我獨嗤愚公浮生得酒且盡醉莫說楚漢爭英雄甲子冬十二月四日春波舊居改搆落成移居之前一月搬運大都書畫十之九牀几琴硯奇石古敦彛十之五而他物僅足用亦先君舊器多破裂者不忍棄也趙子昻句云貧尚典衣貪購畫東坡抄一書寄叔黨云吾兒小富貴也蔣文藻托其意作移居詩云辛苦經營此卜居林塘吾亦愛吾廬囊空只為貪收畫兒富當知旋讀書余所貽後人者書畫二事雖未能精麗然亦粗足備玩索矣吳仲圭為松巖和尚寫竹枝一卷簡淡蕭逺有天成之趣自題枝枝有參差葉葉無限量不根而自生換却諸天相至正庚寅梅沙彌奉為松巖和尚助喜雪山文信題云吳郎平生真不俗千畝琅玕在渠腹有時寫出與人看葉葉枝枝動寒緑之子愛之如千金袖中戞戞鳴玉音莫教風雨化龍去明日葛陂何處尋洪武二年七月二十一日寫于凝翠樓古汴趙奕題云虛心待我不嫌貧齊下從來獨此君風送蕭騷和雨響月將濃淡向窗分森森碧玉垂蒼葆鬱鬱寒梢拂翠雲晝靜清陰消溽暑涼生枕簟更殷勤延陵釋夷簡題云梅花菴裏散花天翠袖佳人色共妍居士不緣曽示疾此君端解替談禪眉山𣲖自湖州出淇澳詩從衛國傳回首百年成一夢三生莫問舊情緣又有湛然靜者釋惠鑑著語云吳仲圭墨竹初學文湖州運筆雖熟而野氣終不化以仲圭妙境而訾為野氣何此衲之橫議若是耶豈呵佛罵祖於藝事場中亦作無面漢耶再三閲之殊為之不平沈石田倣董北苑山水濶幅上層作圓巒濃瀋㸃苔半如小樹下四五樹平坡一老趺坐手執書卷神韻古淡晚年得意筆也有題句云滿城風雨重陽句今日端陽雨滿家把酒且因時節醉湖田無稚亂鳴蛙湖田無稚亂鳴蛙未見吾生底是涯白首把書聊訓子生涯如此悔農家端午日雨作蓋承前月積陰湖田浩然一浸强與承恩張先生小酌破時而農計縈懷殊無樂地酒半乃形詩二絶觀此可知老况甲寅沈周此幅余十年前得於昭慶寺廊擺攤鋪每一展閲覺天真爛然詩語直率亦取辦咄嗟者古人以此消玩嵗月何意取妍於後而後人終不能捨此如獅子糞金正涕唾膿液皆至寶也豈容人銖兩其間耶文休承嘉靖戊申除夕畫雪林鍾馗贈其友號紹春者亂樾縱橫雲陰慘淡甚得鬼神幽凛之趣大都本之叔明而用意則有獨到者其題句云朔風吹沙目欲眯官栁搖金梅綻蕊終南進士崛然起帶束藍袍靴露趾手掣硬黃書一紙若曰上帝錫爾祉蝟磔于思含老齒頥指守門荼與壘肯使妖狐搖九尾爆竹一聲人盡靡明日春光萬餘里詩既流宕可喜書法亦爽爽雄快余每值臘盡春回家人治松盆椒柏輒懸此幅於中堂以助嵗時之樂未嘗不感嘆前輩風流㸃筆即成佳趣也山谷老人喜書老宿法語筆力壯健亦如樹古藤纒水濺石泐居然衲子風格此老豈止於佛法有緣其宿生當從棒喝中煆煉過來余友曹愚公與延平上人書行草一卷諦視久之隱隱令人作山谷想意其再來也法道零落之後此等筆墨便是護世寶鎧因囑延平善守幸勿以外緣視之歙友吳伯徴寓余郡北郭門外市聲洶洶伯徴戢影一室棐几薰爐法書名畫恣其耽味蕭然如不在塵中也每得一奇蹟輒馳一奚取余評决余年來書畫中頗有進長得伯徴之助為多曽以一絶留其齊壁云一室虛閒寄市橋市聲遙聽似春潮庭梅有意撩詩思橫入低簷尺五梢乙丑人曰雨霽風和簷日可映戲寫一松從幽谷挺幹飛泉灑其頂浮雲蕩其足頗有空山崛强之態題句云羣物生生各有材何須機事苦縈懷壑松亦有參天勢豈是由人灌溉來意亦微有寓云劉完菴與以參藩致政家居葺園寄傲倣唐盧鴻一草堂圖自為繪冊十幅一曰籠鵝閣詩云誰知軒後閣宛在水之濆牖外樹交合階前萍即分鳥窺書影靜魚伺墨波勤豈有山陰帖人言此右軍一曰斜月廊詩云廊傳踏月久更獲此為奇不在照能遍無妨影乍欹檻承花始韻簷閣樹微虧何以添幽致恰當弦上時一曰四嬋娟堂詩云嬋娟何以署到果趣無涯隙地留移竹曲䦨不輟花暫延人意愜久坐客心賖剝啄無妨靜深山詎有差一曰螺龕詩云竟日雙扉掩其中草色新石幢門外樹法相壁間尋借渡石微窄鑿渠雨始深一燈綿晝夜蕭寂了無音一曰玉局齊詩云戒時非作態入室自悠然作古宛如古可傳無意傳才情因以勝位置佐之緣方識命名者前身玉局仙一曰嘯臺詩云空臺超以曠而畝未能盈綴石僅留意栽花不在名借池崇地勢待月望山情長嘯豐林下恆思起步兵一曰扶桑亭詩云虛亭立水面問樹乃稱奇不謂虬龍影能於隙地垂互承欄並檻交接澗通池長日披襟坐攤書尤所宜一曰衆香樓詩云花扉深不測危立有層樓遙矚盈庭樹宛然别一丘坐堪邀月下登或當山遊桂影趨簷際清芬却想秋一曰繡鋏堂麗景旁相映庭空水一灣借廡通竹徑留石讓松關客逺定須到詩卑必痛刪暗香浮澗外恍若在深山一曰旃檀室詩云不來深處坐何以滌吾愁古井汲苔繡石牀吟素秋幽香天際發竒致室中求僮僕諳清事支扉謝俗儔沈石田先生系以長句云余亦村居日久矣有時興到來城市委巷深街行幾何獨聞芳襲此中多因之駐足芬芳底花木嬋娟鬪容止長廊斜月夜生涼孤亭觀日榑桑起樹下披襟風謖謖池邊䃲礴波瀰瀰雖云乍入城闉來恍疑原在深山裏圖史瑶華玉局中臨池琴瑟自能工已知丘壑胸中富轉訝愚公無足慕乘風今日且歸來山中芳草逐時栽莫令獨占香風晚爭採遊蜂不知返此冊為嶽石梁中丞所藏中丞築園西郭先月亭故址有茂林清池虛亭敞閣以延攬煙月滌除塵氛蕭然有逺寄也一日邀余作圖不知余繪事草草㸃染即倪迂所云聊寫逸氣耳非作圖手也中丞乃出此相對評閲慨然共嘆前輩為不可及云倪雲林耕雲圖卷作喬林三叢八樹直下石壁四堵旁有洞穴內層逺巒起伏俱有沙腳樹間一田舍舍後叢竹蕭曠清逺營丘家法也題云芝田耒耜閒石廪吐雲滿渚際荷衣翻巖前蘿帶緩垂露藹輕帷芳池沃清盥霞餐非腥腐物化自修短空囷未足憂服食滋楨幹癸丑八月訪耕雲髙士於西巖因寫耕雲圖又為之詩十五日倪瓚識宋景濓題云看院留黃鶴耕雲種紫芝天下書讀盡人間事不知澄江趙覲題云天風起雲林衆樹動秋色仙人招不來空山倚晴碧梁楷寫右軍題扇圖筆力髙古所作右軍立枯栁下風神灑然媪捧扇俯僂以就絶無懊强之色想是得錢後再來耳趙松雪書紈扇二十握自擇尤慊意者二握貽欣笑隱張淵清夫以句調之曰古人當暑遺紈扇最愛千絲雪色新薄劣王郎閒㸃汚直教老媪也生嗔大癡老人為孫元琳作時年八十二此幅山作屏障下多石臺體格俱方以筆腮拖下取刷絲飛白之勢而以淡墨籠之乃子久稍變荆關法而為之者他人無是也然亦由石壁峻峭者其稜脉粗壯正可三四筆取之若稍繁絮即失勢耳今人用以寫斜坡圓巒豈能得妙沈石田墨荷一花一葉一房一蕊下連折藕一段先以墨汁濃淡漬成後以焦筆辨其筋縷孔竅氣象渾化生意奕然題句云為愛南塘好倩郎種緑荷秋時來踏藕兼聽踏吳歌此老清真寡欲絶無冶艷之好而筆端風調如此石田繪事初得法於父叔於諸家無不爛熳中年以子久為宗晚乃醉心梅道人酣肆融洽雜梅老真蹟中有不復能辨者余家九十芳辰一小幀尤極神化謂梅老分身可也文衡山先生寒林捎空戳雲有從地一湧而出者斷不可以手追焚香默坐對之如在荒江野岸維舟霜栁之下而已吳仲圭將殁命置短碣塜上曰梅花和尚之塔人或怪之曰此有意久當自驗未幾楊髠毁掘江南諸墳即林和靖孤山之骨不免發露而仲圭以碣所署疑為釋流竟免虞山王叔逺有絶巧能於桃核上雕鐫種種細如毫髮無不明了者一日同陳良卿屠用明顧余春波新第貽余核舟一長僅八分中作蓬櫳兩面共窗四扇各有樞可開閣開則內有欄楯船首一老皤腹匡坐左右各一方几一書卷右几一爐手中仍挾一册船尾一人側坐一櫓置蓬上其一旁有茶爐下仍一孔爐上安茶壺一仍有咮有柄所作人眉目衣摺皆具四窗上每扇二字曰山髙月小水落石出船底有欵王叔逺三字仍具小印章如半粟文云王毅印奇哉余聞古人有棘端沐猴之技意謂託言弱冠時得見項子京先生所藏芝麻一粒一面書風調雨順一面書國泰民安各四字云出南宋宫中異人所獻者當時驚詫舌橋而不下今見叔逺此技則又游戲出沒恣取萬象於一毫而無不如意者奇哉奇哉即負針絶者擘人髮以成帷工射微者貫虱心而不絶猶將遜能焉余何幸見是異人得是異物從此印昔木鳶斫鼻悉非寓詞咸成實詣矣元楊瑀字元誠為江浙行省掾屬氣豪而有清尚一時諸公皆與往還晚棲峯泖間植竹千竿自號竹西居士趙仲穆圖楊亷夫作記元誠自題句云翠玉蕭蕭在屋東主人歸作竹西翁品題莫作揚州夢好畫雲間入卷中仲穆詩云籬外涓涓澗水流竹西花草弄春柔茅簷相對坐終日一鳥不鳴山更幽張伯雨詩云問訊揚雄宅深居在竹西風林宜月影春日聽鶯啼東老應同樂南鄰憶舊題東風又花草相與及幽棲馬文璧詩云楊子宅前好修竹因看萬箇碧交加薰風滿簟吹蒼雪春雨充庖盡玉芽茶臼或聞來北牖籜龍未許過東家時時倣像揚州去拄杖尋君又日斜錢惟善詩曰為竹移家亦苦辛我如東道竹如賔石頭路滑機鋒峻峴首碑沉感慨新淡月半窗金弄影清風一徑玉傳神明當拄杖敲門去愛汝草𤣥亭上人陶宗儀詩云溪上人家多種竹林西清意屬詩翁湘靈鼓瑟風來巽鳳鳥銜圖月在東一室蕭閒淇澳似此君貞節嵗寒同何當徑造談𤣥處靜日敲茶試小童文休承題自作畫卷云右溪山無盡小卷乃余辛巳年所寫行筆布景稍有興致距今乙酉不過五年耳視之己如隔世豈不可感歎哉昔先待詔年九十猶作細畫及小楷余於十五年後如此卷者亦復能為之否漫題以志感觀此知休承此卷寫於七十題於七十五絶無衰憊之氣父子皆享上夀眉公先生云黃子久沈石田文徴仲俱高年以有畫中煙雲供養也余以為煙雲乃畫者全身出沒處唐末郭恕先國初冷啓敬皆出有入無游戲造化豈獨夀量過人而已哉余僦居甪里吳氏第左鄰趙駕部青陽右鄰沈銓部白生二君俱有勝韻趙令婺源竭資造遙香草堂墨逺駕方程之上已更京口輦上皇朱方石置所居池上逮解官歸槖無長物沈監稅荆州素號脂膏處皭然不染止㩦滇茶一株植家圃作髙齊對之余深慶託交素心得數晨夕而二君前後化去余亦還春波舊里暇日追念為之慨然因試趙墨漫書此山谷題劉元輔畫馬云與物殊絶筆墨易取至於庸庸殆難為工嘗見寫照者遇嶔顙纈面數筆生神方頥圓輔即難措意所以千巖萬壑奮袂可成片石疏林入思方妙姚雲東小景好作沙坳水曲孤釣獨吟其濶幅重林逺汀著四五漁船而已此公壯嵗入中臺不及攬轡驂鸞晚年好道向平之願蚤畢三山五嶽之屐懸而未試直以逸趣自寫胸中而已未可以文沈作略槩之也昔年於京師見馬麟畫藁如掌片者數十番皆草草粗筆略具林丘而老韻溢出正唐人㸃簇法也馬夏因一時應詔扇羅缺帶方寸求竒不得不祖述之耳張禹玉以衲子海湛小畫卷來求著語余不知海湛何如人而畫筆實用前法蕭閒簡淡大非時流所及余每方為著二十字云蕭蕭不盡風颯颯時聞雨幽窗吟夢斷獨與寒燈語岡頭露石骨黃葉落已盡樹中乾蘚皮班班鹿眠印老樹低壓屋清溪冷浸雲不須鑽故紙落墨自成文萬樹團青影千山鎖緑苔只留一線白容得野樵來勇退急流中翩然似孤鶴抖擻蓑上雪片片梅花落漾舟石壁下煙樾罥深蘿宿鳥棲未定驚魚暗翻波甲子十二月十有七日過項公定出觀書畫卷二十餘函內有右軍草書十七字硬黃紙驗係唐勾懷素講外帖百餘字麻黃紙較律公髙座等帖豐潤有姿不盡畫沙屈鐵之法宋道君松枝伯勞御書賜張慤思陵書毛詩馬和之繪圖山有樞等數十章梅花道人竹石題句云不可一日無此君才著數竿清有餘露葉風梢承硯滴瀟湘一曲在吾廬宋陳簡齊詩卷書法髙朗頎秀似李北海而清栗踰之有句云夢裏不知凉是雨醒來微濕在荷花殊幽蒨可喜又元僧誠道原號覺隱寫竹有掀簸之態又一小卷髙五寸元張伯雨國初姚少師各小楷書步韻詩佳甚趙文敏楷書道德經上卷鄧文原行草家書與妻縣君巙巙子山行草一絶宋仲溫書急就章極婉麗有則唐伯虎倣王叔明竹石石髙三尺具三轉折而以虛廓取象竹亦翛翛如有風泛其上餘皆祝枝山姚雲東文氏父子雜札豐考功一卷從細楷至狂草急就無不備仍以玉筯鐘鼎署年月姓名閲之見此老一時酣適淋漓之趣又出其曽王父墨林公蘭竹松石種種入妙挂軸倣李河陽二幀石稜峯勢濺瀑懸流與雲影林光遞為浮動真傑作也此公擁髙資人謂與陶白方駕不意藝事臻極如此即倪雲林曹雲西且為斂手豈非靈襟灑脫居塵出塵日作飛天仙人想而後能之耶墨林子蘭臺君與余同遊膠庠每臺使者至則請為都講聲訇然滿堂人伏其豪爽無貴介纎恇之氣已入太學中嵗頗娛聲酒嘗招余出歌童相侑備秦巴荆越之音晚好道兼精八法所著書法雅言頗排蘇米近習直趨山陰識者韙之蘭臺子酉山君好修篤行終日讀易有得則札記之有讀易堂五筆皆儒先未發之祕公定即其冢君也與兒亨同研席不以髦棄余每過從輒示奇蹟相評賞堂中列屏三皆鬱林佳石要余品署余為各標四言曰雪涯煙漲曰秋山疊浪曰午峯晴翠皆世罕物大城縣王茂才名培字因赤其兄名鉉字鼎和來乞書扇貽黃鼠二鼎和曰鼠生大同宣府地界竊食田禾而肥土人放鷹逐之鼠輒入坎中不能擒也有獸名夜猴者狀如鼠而大土人繫以伺鷹既得坎則放夜猴入坎中立擒出之鼎和又云古北口有榆肉者菌菌之類大略如藦菰而稍大煮熟其大又倍聶切之味如肉或云生樹間或云産石上陳衛伯弟名堪者從潘運幕來京持畫一小幀云是東坡山水楮既敗爛筆亦粗濁辨其印記乃名金本清者所作而庸妄人飾之耳乙丑九月三日朝罷之吳仙臺寓中見壁掛盛子昭石家金谷園圖運筆傅采俱妙若是者幾於子昻矣刑曹許同生先生作鬱岡齊乾元觀記敘廢興之由極詳核其標閻希言李徹度江文谷李自如李華山舒道人之跡尤著云觀有丹井抱朴子品與太華玉井相同又一井在棲真南竹園內名碧玉鏡皆李含光浴丹處又一池在觀西南二里許石罅涓涓不絶魏元君破肚浣腸於此因名洗心池旁有活死人墓乃江文谷培一小阜以祠重陽而居恆趺坐於此者非墓也文谷之言曰人生未嘗無死形骸有盡人死未嘗無生精氣常存此乃勘破死生之言絶無支離之惑者皆賴先生文載之可補陶貞白真誥之不及長安友人一侍兒體態翩􅗁性喜香遇有薰燎輒傾身覆罩籠上當其捧觴承應令坐客鼻端無不旖旎余名之曰香燕然宋燕肅之曽孫映仕嶺南括南海珠犀香藥以奉時相人目為香燕程季白購得倪雲林畫二軸其一春林山影圖贈子英髙士大小作七樹內一松松幹一筆取勢如飛白餘皆參差掩映奇作也上方題者數人止青城山人王汝玉一絶略有致詩云舊業雲林小洞天閒花野草總清妍一從浪跡江湖上贏得人稱似米顚其一秋林山色圖贈子賢逸人幽居并賦詩留别詩效樂天體詩云不到幽人宅於今十二年窮秋八九月舟到爾門前粥飯同晨暮香霏雜茶煙酒飲二三酌詩吟一兩篇篝燈獨擁被拚櫛向林泉八足蟹螯美四腮鱸鱠鮮磨白作豆乳碓紅收稻田羮蓴浮玉脆醉墨折叉妍我時苦暴下寒熱復相煎為病不舉酒多艱少佳眠時乘小艇出或與鄰僧禪聊為禦寒計豈有新蠶綿衰繆頗興慨交遊寧汝憐坐窗每兀兀心斾徒懸懸逾旬鶴骨健逸情禽影翩波月寒㶑灧山眉翠㛹娟弄翰寫詩意孤帆白鷗邊詩法逼真香山楷筆亦倣楊義和黃素山麓一屋在交樾之下俯瞷碎石灘較常作亦涉異思生地黃四兩熟地黃四兩天門冬四兩麥門冬四兩當歸二兩枸杞一兩仙靈脾八兩銼碎絹盛浸大曇酒內隔湯煮從卯至酉取出埋地下七日夫婦日共飲五六杯婦人經不准者即准經准即受孕此方刻鄒南皋仁文書院集驗方中扶銀臺徐光祿俱云往往得驗因復記而筆之讀張文潜宛丘集有跋唐太宗自書畫目真蹟太宗雄武冠世百戰以有天下又孜孜治理身致太平而翰墨圖史之好與寒士角真天人也倪光祿禺同傳魚鰾丸方服者健脾厚精而多子且年壽踰百魚鰾一斤秦歸六兩沙苑蒺藜六兩人參一兩先將魚鰾曬乾細剪成末諸藥亦為末鍊蜜滴水不散為度將藥末逐漸和勻衆手速丸稍停即堅凝不能丸矣丸如桐子空心用鹽湯或酒下八十丸女几山乃神女杜蘭香上升處地有遺几故名女几閔遇五購得唐榻聖教序索余評鑒余勘其筆意纎悉俱在而楮墨非唐物蓋北宋精本也在今日亦罕寶矣大理潘麓泉招飲入小齊見座上有大圓鼎髙二尺圍二尺有奇渾厚質素色沉沉然黝緑中間有朱斑麓泉云大谷縣耕者鋤地得之又有二壺亦大二尺圍髙一尺有五而色遜於鼎此在南方將標千金而麓泉僅以十二金得之晉中風淳其好奇慕古猶在燕趙後故也刑曹許同生出一古陶杯大如掌面作半瓜形一鼠攫之精緻渾朴信非近物色如土不加黝同生云鄒愚谷曽見之曰此非俗陶乃道者雜丹砂雄黃與諸藥物摶成故非金非石而與金石同堅試以極熱酒注之必作雄黃氣驗之良然蓋用之飲以資其靈氣耳京師報國寺古松二株在佛殿前低枝曲幹偃罩各十餘步望之如青鳳展翅處其下如山間松棚六月消夏尤所宜也宗元幹吾里奇士以醫遊長安所寓必楚潔種樹引流以自怡見一時貴者競服人胞乃著論排之曰今人食禽卵而棄其殼以其無滋也胞即人殼奈何貴之王存思太僕貴陽人云其土多山山之潤澤有光景者必有透明雄黃雄黃整大塊滿數百斤者中人有浮沙成團如鵝卵曰雄膽破之有清水盞許急飲之沉疴俱消壽至二百嵗特山民頑獷遇之不謹即散漫不得飲耳有一人飲之至今猶在健如三十許人自云百五十餘嵗矣陜西緑葡萄色正黑乾之成臘用四五顆入一盞水中即成緑色味甘鮮異常彼地亦二錢銀一兩非達官不得食也時邦印彭澤人號碧溪幼慕神仙有相者奇之目以碧眼神仙後師事楓菴和尚受內鍊之旨居恆蕭然偶蓄王摩詰繪藁一束遂藉以寓意往來江湖所至髙流咸倒屣之年八十四一日忽呼孫誡云我將行矣純陽祖師在此汝可設香供為禮已澡沐衣冠命孫畫太極圖於背趺坐脫去嘗於暗中令孫持物試之無不洞見是其身光所映他人不覺也楓菴亦異人一日山行語同侣云子姑坐此我有所為俄手㩦一蛇而至同侣詰之云蛇藏石中有聲我遙聞之耳滕陽驛㕔事前古槐之下有石碣髙五六尺刻壯觀二字殊徑挺初以義無所取不甚留意偶飯後散步摩挲細察之有太白二字蓋青蓮筆也太白與孔巢父等六人偕隱徂徠山號竹溪六逸詢之正在滕境此必徂徠物而後人徙至此因命從者覔楮塗搨而歸展轉玩之謫仙軒渠厯落之概盡見乙丑十月二十二日自紅心行磨盤山陟降顚頓盡日始至大栁驛舍為他客所據余與劉馭初僦一民房頗楚楚華潔堂陳圖畫庭有散植殘菊數株尚有榮者主人成姓者稽山人以扇索詩余漫應一律云遙遙千里駐征輪山色滁南興始新隱者結廬偏不逺征夫停斾得相親盤餐已有蓴鱸味圖史能開車馬塵何用津途問沮溺髙棲自有上皇民主人又索劉詩劉不即授余戲為代乞云大栁今何在孫枝百萬條捎雲動星斗匝水蘸波濤馬去暮山盡鶯歸春雪消先生既彭澤詩句幸相招葉臺山先生尊公桂山翁精相地常言其家山應出宰輔後以明經薦為九江别駕衙齊堆一小石山為玩山成而繞麓生紫芝因築室名瑞芝堂時先生年未弱冠日課讀其中靈奇之氣隨貴者所寓而萃所謂人傑地靈者耶嗣此衙齊如故而宦居者無佳兆甚或挂議遭恤而去可知矣或曰山川之精遙相貫注葉翁所鍾自是家山英秀而芝特以遊寓故顯發之耳地靈人傑人傑地靈正不容偏主也因閲藏舟圖客曰藏舟於山藏山於壑夜半有力者負之而趨此何旨也余曰丹法也舟運動者藏於山至靜矣山凝靜而實者藏於壑至虛矣至虛至靜豈復有念移動然有有力者乘夜半負之而趨者機之發也夜半者不知不覺也是天人合發之旨也顧用世者亦必有所藏藏則運動而有所就古者范蠡先用而後藏一藏遂不可復用諸葛孔明先藏而後用一用遂不可復藏且藏且用可用可藏惟子房耳客會意灑然懶拙道人不知何許人雙髻赤腳遊楚黃之麻城性懶無營心絶機事人或謂之懶拙因亦自稱為懶拙云彭澤劉進士馭初於萬厯乙卯以孝廉攝麻城教事遇之城北嶽祠坐卧一斷碑上露頂衲衣不避霜霰馭初異之就問不答覺碑石氣煦然蒸濕益異之稍與親昵每問輒縮其脣吻如吞茹狀意亦象教也而莫測其旨已一貴介招之為結團瓢而居鑿竇通飲食或十餘日不食或日食生粳米升餘或食羊豕肉盡一二斤間坦腹示人按之堅如石臍大如杯繞臍生竪毛皆左旋人以為類鍾離雲房云潄沐靧盥自用其便溺亦香潔無穢氣所服衣履經嵗月絶無垢汙馭初一日為具禮堅請乃稍稍授以回陽守氣之訣請益曰子苐行之如果精進我自當來為汝傾吐耳坐圜三月始出飄然不知何往後有人遇之於山西寄聲馭初蓋馭初宦緣未斷此老不輕來就也昔秦漢之君傾竭萬乘之資力購之滄波荒徼之外而不知真仙流裔顧在尋常市里中馭初非有夙植豈能遇之耶余於白嶽見張邋遢於姑蘇見方蓬頭今胸中又著一懶拙矣麻城劉鸞圭年百有十嵗平生多隱行劉馭初攝教事曰禮九十杖於朝天子巡嶽禮百年賜上尊養牛不難為之袒割區區郡邑酺飲奈何不以賔席延致而令多錢傭據上坐乎力請於上官榮鸞圭以章服而賔之鸞圭頗德馭初授以肘後飛金精法每旦日將出時向明端坐兩手交握兩肘腕緊縮尾閭令腎氣由夾脊上升至泥丸中下貫兩目旋轉數四想目有金光微啓眥見日中金光注射兩光內外相合仍入兩目從上􅀈降下腹中至氣穴而住仍稍用意存之如此不拘遍數久之覺有紅日一規常在胸懷間此不死之道也鸞圭云人所以生者得陽精耳日為陽宗常存之安得死鸞圭與馭初别幾十年其人至今在雪中展黃越石㩦來四仙古像一為鐵拐李坐石上對懸瀑仰視天際隱隱一鐵拐飛行空中一為海蟾子哆口蓬髮一蟾玉色者戲踞其頂手執一桃連花葉鮮活如生背緑竹六莖不見枝梢一為寒山子倚絶壁雙手展卷若題詩竟而自為吟諷者一為拾得趺大松根植苕帚於傍松當拾得之背旁又各濶四五寸人不盡松深山絶壑中真景物也越石要余題語余為拈鐵拐一幀塗抹之以見意云息機泉壑注精雲空氣象沉邈姿采毅雄仰睇久之神與之逢非真有得於𤣥鈐其孰能如是之形容若夫衣紋水荇鬢髯風松真道子之的𣲖也其石恪梁楷之流歟余欲拍肩庶幾從容虞道園疊蘇武慢詞十二首張伯雨聞而和之余見其手録藁作細行楷詞翰俱入清玩余以雪朝即事步武其韻以博同調者一哂張詞云清露晨流新桐初引消受北窗凉曉經卷薰爐筆牀茶具長物憑他圍繞老子無情年光有限只似木人花鳥指凝雲散朵奇峯曽見漢唐池沼還自笑待學蟫魚金題玉躞書裡便容身了阿對泉頭布衣無恙占斷雨苔風篠獨鶴歸遲西山缺處掠過亂鴉林表舞琴心三疊胎仙坐到月髙山小余詞云梅攢紫蕾蕙透青芽晃白窗楞雪曉鷓鴣沉片鵓鴿桃紋一縷碧煙繚繞書編稗諢畫筆詼奇壯思鬱驚猿鳥趂閒年閒月閒時隨意甃成池沼還舒嘯倒甕尋香脫巾漉汁身世醉鄉堪了塞馬蹄穿冢麟角折今古幾堆荒篠軒渠胸岸豁達眉稜遙睇白雲天表笑羣兒鬪簇冰山日出漸成消小髙房山為仇仁近先生作山村圖純用米法雲氣磅礴草樹信手㸃染有天真爛漫之趣非規規摹擬者比宋潛溪諸公題之宋云髙文簡公畫趙文敏公題識仇山村周草窗詩皆絶無而僅有者河東張承旨嘗為賦詩吾友蒲菴復和之余欲效顰老病未能也姑書此以志吾愧金華宋濓仇云大德初元九月清河張淵甫二車會髙彥敬御史於月泉精舍酒半為余作山村隱居圖頃刻而成元氣淋漓天真爛漫脫去畫工筆墨溪徑余方棲遲塵土無山可耕展玩此圖為之悵然而已南陽仇逺仁近系以詩云我家仇山陽昔有數椽屋誤落城市間讀書學干祿井枯竈煙絶况復問松菊如此五十年一出不可復髙侯丘壑胸知我志幽獨為寫隱居圖寒溪入空谷蒼石壓危搆白雲養喬木向來仇池夢厯厯在我目何哉草堂資政爾飯不足視吾吾尚存山居有時卜我朝劉清惠公麟隱苕溪思作一樓不可得文徴仲先生為寫神樓圖髙流鼓吹今古同調王介甫令吾浙之鄞鄞濵海其民冬夏乘筏採捕為生有田率在山麓取灌泉水潦則泄以達海旱則瀦以養田故民得指田為質以貸豪右之金豪右得乘急重息之介甫特出官錢輕息以貸至秋則田畝之入安然足償所謂青苖法也於鄞實善政及為相必欲推而遍於天下則非矣鄞人至今德之立祠陀山下神亦至靈梁師成自稱東坡外子欲夤緣頴濵子元老請見通欵元老拒之師成怒擠之不令在中朝宋南渡後吕頥浩罷相范宗尹繼之年才二十自古少年宰相無踰之者馮道浮游五季稱常樂老而不慙其子吉亦善滑稽工琵琶教坊莫及也每朝士宴集不召自至至則為彈琵琶又賦詩起舞人愛其俊逸道誡不令然甚則辱之不為改一日家宴道乃命吉琵琶為壽賜以束帛吉負於肩以琵琶按膝作伶人拜而去了無慙色夫吉之無慙於伶猶道之無慙於虜也常疑此一種人必自有見處然如李秃翁深加奬賞則非也宋紹聖末得一璽下禮官諸儒議李檢法公麟曰秦璽用藍田玉今玉色正青乃其物且玉質甚堅非昆吾刀蟾肪不能治雕法絶久矣此必李斯刻無疑也然則晉所失之璽已復還中原乎昔人以璽經元后所擲刓一角未知然否勃泥國貢龍腦大片者一家底第二等八家底第三等十一家底米龍腦二十家底蒼龍腦二十家底每一家底二十兩大食國貢龍鹽一銀合駝毛褥面三段白越議三段白越議番布之精者金章宗時太原常添壽四嵗能詩亦人妖也元將郭侃征克實密爾部獲其樂器有七十二絃琵琶西域雅庫特大珠含之可不暍尉面可使目有光黃涪翁行書一卷古玉版箋隨意書自作詩似汝帖中劉伯倫向秀等筆法髙朗剛毅如佛氏宿生習氣有驗翁即不應前生從女身轉也其語備録於此大石云崎嶬特石姿羃厯古蘚斑中立介不倚閲人行兩間安得工師舉與君障狂瀾南峰禪院云陳觴禪院裡浩倡叢林杪屐底見花開巾前落蜚鳥瞥見仙人徒拱揖青林表放鶴亭云放鶴誰之亭蓋自支道林道林放鶴時萬里虛空心鶴去人亦逺亭名自古今元豐碑傍云元豐一片石巖巖佛棲傍曽文乾蘚包朱筆凍雨傷悠悠千載下懷賢起倣徨有鄒克明一跋云月舟出此卷為清玩覽畢題云數篇吟可老一字買堪貧天順丁丑人日吳郡鄒亮陸放翁詞稿行草爛熳如黃如米細玩之則顔魯公楊少師精髓皆在詞乃大聖樂亦辛稼軒之流也詞云電轉雷驚自歎浮生四十年試思量往事虛無似夢悲歡萬狀合散如煙苦海無邊愛河無底流浪看成百漏船何人解向無常火裡鐵打身堅須㬰便是華顚好收拾形骸歸自然又何須著意求田問舍生須宦達死欲名傳壽夭窮通是非榮辱此事由來都在天從今去任東西南北作箇飛仙南宋放翁詞稿真蹟凡一百一十七字至正改元獲於山陰王英孫家細窮詳玩備見句法清真筆勢圓熟信一代之名跡也按放翁為陸游務觀别號工詞翰纍官華文閣待制封渭南縣伯有集百卷行世斯其人風流文雅可知矣此詞雖係草稿妙在不經意中天真爛發姿態橫生種種可為師法雜之楊凝式大小米間又曷愧耶是嵗十月之望吳郡陳深敬題元陳愼獨名植寫江浦樹石蒼莽疏宕有子久氣韻上書一絶云無多茅屋滄波逺一半青山竹樹遮宛似吾鄉荒寂地直疑割我白鷗沙朱靜春先生隱居蛟澤淮陰龔翠巖為畫水村圖趙吳興李息齊繼作二圖於後先生賦二絶句以題卷尾嗚呼前輩襟期風度不可復見其愼獨翁作江濵樹石書其一詩於上且乂次其韻其企慕之至又何如哉童君仲文得之於滕君用衡裝潢之俾僕識其末蓋一舉而有感者二焉先生所藏在大德間去今七十餘年愼獨之作已十四年矣俯仰悽愴洪武四年秋九月辛未吳郡張簡記竹懶於程季白所見趙吳興水村圖一卷精妙之極豈即繼翠巖而作以貽靜春者耶茶以芳洌洗神非讀書談道不宜䙝用然非真正契道之士茶之韻味亦未易評量余嘗笑時流持論貴嘶聲之曲無色之茶嘶近於啞古之繞梁遏雲竟成鈍置茶若無色芳洌必減且芳與鼻觸洌以舌受色之有無目之所審根境不相攝而取𠂻於彼何其謬耶虎丘以有芳無色擅茗事之品顧其馥郁不勝蘭止與新剝豆花同調鼻之消受亦無幾何至於入口淡於勺水清泠之淵何地不有乃煩有司章程作僧流棰楚哉武林西湖水取貯五石大缸澄淀六七日有風雨則覆晴則露之使受日月星之氣用以烹茶甘淳有味不遜慧麓以其溪谷奔注涵浸凝淳非復一水取精多而味自足耳以是知凡有湖陂大浸處皆可貯以取澄絶勝淺流陰井昏滯腥薄不堪㸃試也古人好奇飲中作百花熟水又作五色飲及冰蜜糖藥種種之飲豫以為皆不足尚如值精茗適乏細劚松枝瀹湯潄咽而已國初謝孔昭深翠軒詩文一卷文徴仲補圖徴仲作精楷題云孫生詠之視余深翠詩文一卷國初諸名公為吾郡謝孔昭作卷首題額篆楷各二字篆出滕待詔用衡楷出詹中書孟舉記文三首首為俞都昌有立次解學士大紳又次王文靖汝玉皆出親書卷中諸詩亦多名人字畫皆精謹可愛蓋一時諸人皆勝國遺材故形諸篇翰猶有前輩典刑洪武乙巳至今百又三十年矣首尾完好獨逸其畫詠之徴余補為此圖竊念孔昭以繪事得名卷中之畫亦必名筆顧余陋劣烏足以承其乏哉雖然曽子固記醒心亭自以得附名歐公之次為幸然則安知區區之名不附諸公以傳耶正德十又三年嵗在己卯二月既望之夕張燈記此詩凡十三人華搆依苔竹幽深六月寒苕煙迷翡翠松露浥琅玕秀色侵幃畔清芳集座端晚來無客過琴詠自成歡逃虛老人姚廣孝古人隱山林所愛草木蕃君今託㕓市惟兹一畝園嘉樹藹華滋修篁蔭庭軒雅有林壑趣靜聞禽鳥喧輕條弄迥颷密葉晞朝暾優哉此中意欲詠竟忘言純江妙圓深林翳長晝繁陰覆華楹微雨乍收霽羣樹新涼生書幃淡春緑宴寢凝夕清景邃日易暝竹暗窗微明佳卉餘舊滋芳條含晚榮覽賞已成趣況兹絶世營於焉謝塵鞅永遂幽居情張肯結廬近在㕓宛有巖壑趣苔徑翳叢筠蘿垣蔭芳樹密葉賸藏春柔梢半含露秀色菀沉沉窅然迷出處雲蹤席上屯鳥韻林端度適諧靜者心於焉養冲素會當一來過濡毫為君賦南沙釋完㕓居苦湫隘獨此如山林苔徑窅然處開軒叢桂陰南薰一雨後芳潤霑衣襟色湛青霞觴光照緑綺琴我有丘中想因之諧舊心形留不得往掩卷空成吟吳郡梁世行髙人慕真隱屏跡居山林松蘿繞行徑煙嵐結重陰巖窗湛餘碧澗户生秋霖清暉晃遊目涼颷灑衣襟於焉日無事逍遙坐長吟婁江惟信佳樹緑陰淨髙軒春晝明幽人獨無事閒窗啼鳥聲已忘城邑喧自得林野情還憶山中日夏初新雨晴王倪郭外一軒幽簾櫳翠欲流松陰濃蔽午竹色淨宜秋入座怡清趣憑欄豁逺眸此中棲息穩積學踵前修延陵金愷葺茅面逺峯開扉在深樹緑葉映圖書春陰滿庭宇我記昔來遊林蘿乍收雨掃塵坐青霞焚香酌芳醑俄然鳥驚喧零亂舞翠羽夏景信已䦨此地未知暑翛翛涼籟吟似應琴中語意適念慮清徘徊不能去吳郡沈應嘉木藹葱蒨首夏生繁陰開軒入深窈轉徑柯條森霏霏散蒼煙交交鳴好禽回颷灑然至振葉陪清吟因適林下閒每陶忘世心琴書諒斯在期以投華簮宿郡卞同榮名非偶爾素懷甘泊如中嵗謝朋遊思與靜者居適逢有達士結廬城一隅衡門不盈仞自念無髙車佳木蔭層軒修篁覆長渠舉頭仰白日陰陰䝉太虛晴光泛書幌濕翠沾衣裾座無俚俗賔談笑皆鴻儒逸興寓圖畫咫尺窮方輿豈乏冲霄翼翺翔上雲衢奚為願蠖守與此松柏俱終尚往吟咏頓使煩慮除淮海秦衡緑竹藹餘碧青松挺寒姿翛翛蔭華軒矯矯臨清池念彼嵗月改節撡恆自持風霜既云厯雨露亦已滋孰謂春葩榮奄然中道衰貞堅固希偶獨與靜者宜眷言此棲止因之厲我為北郭陸敘列樹敷泉緑茂陰紛疊重娟娟秀芳春藹藹滋丰容緒風一披拂泛灧搖朦朧雜嵐迥莫辨映蹊影可通新月度纎白孤花表妍紅已諧夏深涼尚愛雨餘濃薜蘿藤薈蘙霧露氣濛籠碩人此棲止華軒關其中樂閒懷同願期余相過從抱琴逢日夕往往迷歸蹤盧充􅜶六研齊筆記卷一
