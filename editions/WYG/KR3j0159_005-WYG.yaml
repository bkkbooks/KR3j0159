body:
  text: 六研齋二筆卷一明李日華撰江陵松滋枝江村射鹿者以淘河鳥脛骨作管以鹿心上脂膜作簧吹作鹿聲有大號小號呦呦之異或作麀鹿聲則麚鹿畢集葢為牝聲所誘人得彀矢注之也南中多鹿每一牡管牝百頭至春羸瘦遊牝多也及夏則唯食菖蒲一味却肥角將解其茸極痛獵人逄之伏不能動直就縛取之先噉其血而後斃焉夫狨麝孔翠以有用賈害良亦可愍矣唐文皇英睿通天無物不照晚年亦惑於方術服天竺異人娑婆寐丹藥渇痢而崩楊補之世家清江所居蕭洲有梅樹大如數間屋蒼皮斑蘚繁花如簇補之日臨畫之大得其趣間以進之道君道君曰村梅耳因自署奉勑村梅更作踈枝冷葉清意逼人而道君北轅不及見矣南渡後宫中以其梅張壁間蜂蝶集其上始驚怪求補之而補之已物故金陵俞仲茅先生藏李泰和行書大照禪師碑二千餘字硬黄紙筆法精整清栗有歐虞風味視他書欹側踈豪者大不同先生云此書自唐以來即為高麗所藏以故絶無宣和政和等璽羣玉秋壑等印與蘇米等䟦神廟末年一弁得之平壤將獻之幕府媒進余䇿遼事之必敗戒其毋遽往已而果然此卷遂留余處稍酬之金帛不能滿其意也而終無肯昂直應者故尚為余物耳世傳北海石本娑羅雲麾率以宕逸取竒與此絶不類乃知古人勝處初不可以一途取如菩薩神變散入諸趣在具眼者熟叅之蕭然有得也東偏書屋閒曠乆堆積落葉斷木牕雨灑淅簷日曝蒸忽産丹芝百莖的皪可愛芍藥舊栽奴懶失灌今歲作花如錢蒨艶有態人反稱竒種因有金陵之行舟車盤礴冠葢晉接手不執卷者彌月胷中畨覺空快隨意作應酬文不受古人徽索灑灑我成其我此數者皆以不經意得勝趣天下事何貴力求也趙仲穆用龍眠法冩藥王像坐藤竹牀手執葫蘆在芭蕉林中喻是身之非堅也脚下靡靡細草俯覸之喻大地皆藥草也倪迂作精楷贊曰耆婆大醫王能療諸疾苦視虚實表裏施補利汗吐設或有心病非針砭能愈世尊安心法一彈指病去是畫者贊者俱解入深法者也吳周瑞者携諸卷軸來内倪雲林秋林野興一幀倣董元樹暈濃厚石氣剛果深沙遠嶼大有神韻掩其題欵不知其為徴君也後為杜東原之子字子開者購得裝池乞吳太宰原博題識王文恪公亦有題語余既與小山作秋林野興圖九月中小山携以索題憶八月望日經鋤齋前木犀盛開因賦下韻今年自春徂秋無一日有好興味僅賦此一律録於左方政喜秋生研席涼卷簾微露下衣裳林霏洞戸發新興翠雨黄雲籠遠牀竹粉因風晴靡靡杉幢承月夜蒼蒼焚香底用添金鴨落蕋仍宜副枕囊己卯九月四日雲林生倪瓚十二年歲在甲午冬十一月余旅泊甫里南渚陸益德自吳淞歸携以相示葢藏於其友人黄君允中家余一時戲寫此圖距今十有五年矣對之悵然如隔世也瓉重題鉏經堂前木犀黄何人晏坐聞天香迂翁胷中有清癖欲掃繁花歸枕囊秋林野興圖親冩百年流落燕都下市門不遇杜長垣殘墨誰將手重把𢎞治壬子臘月子開至京偶見此圖識其雲林真筆也因購得之重加裱裭請予題其上吳寛百年遺墨尚精神鑒賞還歸杜老真今日長垣傳法眼固知少嫰亦如人頃余讀東原遺藁其論雲林畫品云世率以其書辨真偽不知早歲作書少嫰如其人先生知畫之深者也王鏊雲林為絶聽老禪冩竹梢止作葉數片嫰枝如絲縷者纒繞紐絡之初無節幹又一種法也題云絶聽應須六用亡先宗密密更堂堂真如般若無根器翠竹黄花有耿光五月廿五日為絶聽上人冩竹梢并題雲林居士露葉風梢是此君半窓涼影月紛紛主人坐徹蓮花漏空裏秋聲自不聞梁用行蕭蕭素影入簾清况是秋聲客裏聽此日披圖思往事雨枝風葉總含情支硎山人彌逺涼葉蕭蕭含晚吹晴梢嬝嬝拂秋雲也知萬木凋零後牕下相看獨此君南沙徳完一枝蕭灑翠琅玕節操還能度嵗寒誰道山牕多寂寞春風依舊報平安幻室至珤開元寺裡常同宿笠澤湖邊每共過誰説江南君去後更無人聽竹枝歌獨庵道衍昔從江上識雲林三尺蒼柯起夕隂葉葉鳳毛秋可數懐人清夜涕沾襟朱應辰倪君能畫又能詩瘦影秋来似竹枝前夜夢回如得見紙窓清影月斜時髙啓昭代篆法惟李西涯擅長觀其收元周伯温危太檏趙期頥諸家篆蹟惟推期頥為最惜其流傳之少余細玩期頥渾􅒄髙古純以禹碑周鼔為宗無一筆陽氷擇木所以深當涯翁之意也近日獵篆名者詭遁百出狐涎滴地余不欲觀之無錫盛舜臣名虞號秋亭慕其鄉倪徴君雲林之畫尤喜其秋亭野興一幅畢力摹之又取以為號其所作大都與王舎人孟端相上下因倨傲不輕與人作其蹟傳者遂少恵山聽松菴有僧真性海者與孟端交最密嘗編竹為爐製雅而韻舎人遂詠之又為性海繪山水徴題成卷為本菴勝事吳原博和詩有結庵正在松風裏褁茗還須糓雨前之句舜臣又倣爐製為兩具一以奉其叔都憲氷壑翁一以貽匏翁皆有詠不讓古石鼎聫句也雨中海琴王生携卷来展舒有味曹縣張黄坡名庚以孝亷授褒城令改築衙宇掘地得銀把杯二隻上鐫孔明佳玩四字係古𨽻盖蜀漢物也携歸寳藏後其家因追逋甚急鎔之将以輸官而銀輒片片碎不受鎔而罷吾聞金乃土之子火乃土之母火之能制金以其中含水也入土久則水為土尅盡金止留母胎渣滓之物純乎土矣火豈鑠之而流乎此實物理豈容置訝攝山棲霞寺有茶坪茶生榛莽中非經人剪植者唐陸羽入山採之皇甫冉作詩送之云采茶非采菉逺逺上層崖布葉春風暖盈筐白日斜舊知山寺路時宿野人家借問王孫草何時汎椀花茶事於唐末未甚興不過幽人雅士手擷於荒園雜穢中㧞其精英以薦靈爽所以饒雲露自然之味至宋設茗綱充天家玉食士大夫益復貴之民間服習浸廣以為不可缺之物於是營殖者擁溉孳糞等於蔬簌而茶亦隤其品味矣人知鴻漸到處品泉不知亦到處搜茶皇甫數言僅存功案而已李薊丘初見文湖州墨竹數十本皆以為不佳疑東坡山谷文字交遊特多曲筆過與而専學黄華老人錢塘王子慶博識士也一日與薊丘語及此事曰子所見皆非真湖州也適府吏家有一本明日借以示君已果得見其蹟一幅五竿濃淡相依枝葉間錯轉折向背欹側低昂各有態度於是大呌絶賞悔從前議論之非用油紙臨摹髣髴携歸盡力學之又獲三本又得南唐李頗叢竹圖蕭協律筍竹圖參閲衆妙而後成家今人未見古片蹟止流俗相師豈有勝妙分耶世傳墨竹始於五代郭崇韜夫人李氏於月下就牕紙摹影殊有真態嗣後遂相祖述此臆説也前是王摩詰已有開元石刻成都大慈寺灌頂院已有張立墨竹壁一堵孫位張立董羽唐希雅皆晚唐人與崇韜同時寧有閨閤散筆遽流傳作諸人之範耶黄書子田帥蜀其閫胡給事晉臣之女相携赴任過雪堂胡以行筆書赤壁二賦於壁觀者嘆絶劉改之填一詞題後云按轡徐驅兒童聚觀神仙圖畵正芹塘雨過汎香路軟金蓮自折小小藍輿傍栁題詩穿花覔句嗅蕋攀條得自如經行處有蒼松夾道不用傳呼清泉恠石盤紆信風景江淮各異殊想東坡賦就籠紗素壁西山句好簾捲晴珠白玉堂深黄金印大無此文君載後車揮毫處看淋漓雪壁真草行書此胡媛又一能書女士不獨蘇若蘭髙渤海而已王聖愈㑹心編有云天與人半不與人全予以智慮足以趨利避害而又與以不可趨避與以精英足以殫見洽聞而又與以不可見聞又曰有兀然抛書之意以觀書而書益清察有澹然遺事之意以馭事而事益得理又曰士人觧三分話方可入仕為吾上者不肯盡言於吾纔説及三分欲吾喻其㫖為吾下者不敢盡言於吾止説得三分待吾暢其情此等皆創新之論甚警甚卓非浪執筆者與古人並行可也王叔明㑹稽書屋圖樹石酣鬱雲氣蓬勃如在千巖萬壑中忽一段開霽處作精屋數十間屋左右巉削之石飛濺之流若相暎帶此叔明極得意之筆神營心搆不必取之現境也余嘗謂古人繪事如佛説法縦口極談所拈往劫因果竒詭出沒超然意表而總不越實際理地所以人天悚聽無非議者繪事不必求竒不必循格要在胷中實有吐出便是矣武林錢嗣善䟦云黄鶴山樵㑹稽書屋圖葢為張思亷而作後為天台葛仲祥購去恨不得一覽今九華先生作天台遊得此卷於僧舍携歸示余種種駭目神竒之作也戴嵩放牧圖作三子母牛一牧兒踞其背一壯者牽牯筆墨極草草得簡古之趣衰柳四五樹尤横斜縱恣有態固知象物者不在工謹貴得其神而捷取之耳元人吳從正一歌亦殊灑落歌云牧牛兒逺坡牧逺坡牧牛芳草緑兒怒掉鞭牛不觸澗邊栁古南風清麥深蔽日田野平烏犍礪角逐草行老牸卧噍饑不鳴犢兒跳梁没草去隔林應母時一聲老翁念兒自携餉出門先向崗頭望日斜風雨濕蓑衣拍手唱歌尋伴歸遠村放牧風日薄近村放牛泥水惡珠璣燕趙兒不知兒生但知牛背樂古人閨閤極重畫衣士大夫燕居亦有服之者是以南朝諸公有九華半臂之製宋赤城詞選載陳子髙虞美人詞題云曹申甫以着色山水小景作短製思極蕭散方倅襲明邀予為詠短製者即半臂之類也詞曰越羅巧畫春山疊箇裏融香雪滿身空翠不勝寒恰似那回偷印小眉山青驄油壁西陵下髣髴當時話而今眼底是髙唐拂拂淡雲疎雨斷人腸倪雲林小景上作嵯峨大峯中作四五重林麓皆有斷沙孤嶼出没閃露下層冩近景五樹作三簇漁屋處其中盖濱江景也題云蕭蕭白髪沈休文問舍求田江水汶此日一杯成邂逅淋漓醉墨氣如雲甲寅三月邂逅耕漁居士於開元精舎因徴余畫為寫此幀并賦贈東海雲林子瓉吳仲圭忍貧孤隱極不喜為人作畫至扵冩像猶所靳者然有古木居士圖一幀為陳海屋先生作者先生髙隠有道術年九十餘而健飲頭無二毛盖神仙中人其圖作古檜三株榮茂者濃􅊊如藏風雨槎枒彫蝕者崛强紐裂若經嚴霜苦雪野火燒餘者多則千年少亦數百年物也林間一老長裾曵袖氣韻澄澹望之知為世外仙癯梅老傑思也陳五雲者題云海屋先生别號古木居士與余同庚壯年偕遊海上朝夕飲酒賦詩談𤣥論道余作滇南之役先生避兵苕溪不覺皆年九十又二先生令嗣石渠先生望重中秘今已七袠有三與毘陵倪元鎮嘉興吳仲圭文墨往還故得此圖觀其古木如龍拏怪石如虎踞先生拱立如閒雲出岫飄飄有莊休曼倩丰度八年之後添籌増算余當賫詩奉賀識此為劵九十二翁五雲老人陳䇿又姜寵題云古木居士與五雲老人同姓同庚同里同學得海外之術有仙風道骨之態余昔放浪五湖每遇兩翁一葉輕舠隨潮順落高唱新詞逍遥於三泖皆呼之為神仙兩翁合夢稿行世今將百歲皆頭無二毛日飲數斗可謂不夢之陳摶矣乃見五雲䟦語云爾釣月叟姜寵敬題時年八十有一崔寔月令曰七月七日曝經書穆天子傳曰仲秋甲戌天子東遊次於萑梁曝蠧書於羽林鄒縣有子思曝書臺沂州有晉王羲之曝書堂新㤗有曝書山昔有道人曝書於此華山玉泉院有陳希夷塜希夷蛻骨為羽流竊出持其顱以行乞嘉靖中姚御史收􅌾之見陳以忠華山遊記華山桃花生石縫花片着之即生不由核種也羲之筆經曰諸郡國獻兎毫唯趙國中用意謂趙國平原廣澤無雜草木唯有細草是以兎肥毫長而鋭也須用仲秋月收之孟秋去夏近毫焦而嫰季秋去冬近毫脆而秃惟八月寒暑調乃中用黄山谷几間有物潘谷隔囊手之曰天下之至寳也出之乃李廷珪墨又一囊谷手之曰吾老矣今不能為也出之乃谷少時所作墨王紱孟端元季國初又毘陵人想與倪元鎮必相薫炙者故繪事規隨不失尺寸余有其贈李士文林亭秋色一幀實與倪慧山圖不相上下余嘗汎舟荆溪顧渚間其山大都低巒起伏勢盡處必帶迢遰之沙其水湖汊紆盤互入處必穿重林之麓淺秀淒迷是其本趣是以倪王二君動筆便如取之簏中正其家常供具也十年前余購得石翁竒畫一軸幅濶二尺有咫高六尺作翠峯攅天僅分兩聚下畧露陂麓列樹五株四直一偃對岸兩松亭亭中虚三尺餘盡是雲氣湧鬱挂之屏几間蒸然欲浮屋也神來之妙如此翁亦極滿志題句云翠倚高天玉出竒淋漓元氣太陰垂匡廬嵩少慿君指醉裏狂揮醒不知宋趙宗漢鴈山圖祖述李思訓峰嶺林麓大約百餘轉雲泉樹石屋木人物騎從俱精工統觀亦有氣韻但淺裝不用金碧畨覺士氣題云汪君子卿余少時舘契也嘗遊學於浙中登慶厯進士謝官歸鴈山將終老焉適宗漢奉使廣南便經浙東過訪留叙臨行出紙索畫遂作此圖寄别意云嘉祐二年五月廿又九日定遠將軍趙宗漢識此幅舊為吾禾懐鐡松所藏今不知落誰手矣石田畫法宗北苑近代則黄子乆王叔明吳仲圭三家其所醉心他則傍及而已以故倣倪之作往往縱横有餘而幽澹不足亦所自歉而不能强者有刪改舊倣雲林以貽崔君題句云迂倪戲於畫簡到更清癯名家百餘䙫所惜繼者無况有冲澹篇數語弁小圖吳人助清玩重價争沽諸後雖多學人紛紛墮繁蕪崔子强我能依様求葫盧墨澁不成運林慙澗與俱何敢希典刑虎賁實區區醜惡正欲裂捲去不須臾今夕秋燭下再見眼糢糊妄意加潤色泥塗還附塗崔子豈不鑑愛及屋上烏佛云衆生怖空以其莽蕩無着落欲其證入則如喪身失命也不知諸法從空出生向空滅盡法有起滅而空常晏然何可怖也今畫家亦多怖空葢自造則結想難就倣作則蹈襲可厭素楮横陳直是無可措手處安得不怖不知此坐平日觀人妙蹟徒知草草閲其氣韻筆法而於布置處不甚留心故也古人於一樹一石必分背面正昃無一筆苟下至於數重之林㡬曲之徑巒麓之单􅃨借雲氣為開遮沙水之紆㢠廻表灘磧為逺近語其墨暈之酣深厚如不可測而定意觀之支分縷析實無一絲之棼是以境地愈穩生趣愈流多不致偪塞寡不致凋疎濃不致濁穢淡不致荒幻是曰靈空曰空妙以其顯現出没全得造化真機耳向令葉葉而雕刻之物物而形肖之與髹工采匠爭能何貴畫乎元朱君璧昆山人善畫嘗作紫霧龍宫翠􅅫神闕二圖十年始就人謂其妙入神品元季海冦犯境邑人棄家避難君璧獨抱二圖坐樓上冦遥望城中虹氣貫月蹤跡而至虹自君璧樓中出疑有至寳攘之見二圖大怒裂碎而去楊鐡厓名其樓曰虹月樓米海岳絹素臨唐𤣥宗書鶺鴒頌紓緩宏濶大類嵇叔夜絶交書無復平日精悍險䇿之態豈𤣥宗原蹟本如是元章假得思以亂之而然耶欵云元祐元年夏五月海若老友持來見示臨此乃還襄陽米芾元章書余生平見米氏真蹟將八九種皆晚年放縱之作其摹學古人者惟諸石搨中見之墨蹟不能多得爾來得見此帖然後知米氏之劍㧞弩張悉從小心翼翼中來也論者謂元章之書沉着痛快超妙入神不亞於唐𤣥宗當並肩齊驅耳何故摹之吁此以管窺天未知書之奥妙者也凡天下事最忌自滿器滿則盈舟滿則覆故狂夫之言聖人擇焉君子戒於闕黨也况右頌筆法結搆遒媚精神骨立不狃於世習得自然丰度亦有元章所不能到者今截長補短更覺神韻不凡耳所謂至寳必百鎔煉而後成者耶然元章摩書與他人異元章此帖與他帖異將來必自有肯余論者錢塘白珽書法自晉唐沛然大興上及至尊下及士庶無不濳心究奥創異立竒唐如太宗高宗𤣥宗臨軒之暇輒精研八法揣摩六書𤣥宗天資既邁積學有源故落筆神采秀發膏潤無窮余在洛陽常其欽家見御書筆勢論一卷極與此帖相肖至唐末喪亂人物寥落風流掃地矣宋初善書者稍復間出猶有五代衰䬃之氣至崇寧間蘇米諸家雄傑有二王顔柳之餘惟元章早年得遊内府見歴代名蹟孜孜摹學一戈一㸃得意外之㫖出入規矩中行草飛白變化無窮有翔龍舞鳳之勢雖曰神鋒太峻其間儀刑自在正使不工處愈見其妙用也此摹𤣥宗􅜇鴒頌帖體度𢎞緩筆韻遒美其精勤敏妙更可寳也華秋白君珍蓄此帖并歐陽文忠公草書一卷出以相示謹為識之東吳高翔僕遊江陵仲巖沈學士招飲於懶宜堂出右帖求僕題識時石齋鮑君同坐私屬余曰余見米書多矣未有超軼絶塵若是頌者純以圓勁為主時露本來鋒頴當為米書上乗不識肯為余設竒轉購之乎但仲巖愛䕶甚篤焉能奪之媿不知書安能妄為損益因録石齋之語以呈趙璧彦昭昔米老嘗從人借古書畫臨搨竟併以真贋歸之俾之自擇而莫能辨故論善臨摹者千古惟米老一人而已右唐𤣥宗􅜇鴒頌原本在河南程九卿處絹素已腐蠧文亦不全後有吕大防諸䟦筆法固肖而精爽失矣反不若此卷之神采也至正壬辰中秋與王赤城闗客凡同觀於鶯葉軒中余因知梗槩而附識於尾張繼孟按元人史君佐號紫微有侍兒名欹柳使掌法書名畫此卷亦有欹柳印記倪雲林園林書屋圖大小作六樹分三重屋後多細竹平坡夾以竒石遠近廓落相暎容人遊意其間所以蕭疎而不凋殘曠淡而有實際此君真繪事中仙品也題句云緑野讌遊官濟濟習池清響珮珊珊高桐初引流晨露密竹通幽度碧灣童冠詠歸春服後龜魚濳躍夕波間北窻應到羲皇上石枕藤牀卧看山乙巳七月冩贈熈雲學士大智度論五通仙人得好寳物藏着石中欲䕶此寳磨金剛塗之令不可破向聞金剛能破一切不受一切破今云磨以塗之磨金剛者又何物耶乃知一切有形俱非堅固西域外道亦持五戒但為天祠殺無罪又為行道故除金餘者得盗取以自全濟除師婦國王夫人善知識妻童女餘者逼迫急難得邪滛為父母師及牛為身為媒故得聽妄語寒鄉聽飲石蜜酒此一段義可見西域重牛等於父母師長為媒者非妄語則不能成媒也數日來連觀偽蹟柯敬仲管仲姬竹趙子昻柳隂漁話圖王右軍清晏帖蔡君謨諸公䟦語髙彦敬雲山近日賈客連艫溢艦紈袴遊從逐逐相徃來者率此物也為之三嘆杜樊川滁州詩云獨憐幽草澗邊行尚有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横刻集者訛行作生訛尚作上宋人遂附㑹其説謂牧之有意託興以幽草比君子而淪落幽隱以黄鸝比小人而得意高顯致唐祚垂末而無幹濟之才不知行與尚本是隨時直賦所見無闗比興者有甲秀堂刻牧之行草真蹟可據佛喜林居嵐鞞尼林中生漚樓頻螺林中得道仙人住處鹿林中轉法輪娑羅林中般湼槃天上歡喜園中有劒婆石柔輭潔淨如天蜿蜒元時𤣥教極盛其掌教真人皆淹通宏雅翰墨絶人士大夫樂與盤桓書劄往來及一時題贈皆有深趣如虞奎章館閣大老負重名而與張伯雨吳全節輩稱爾汝之交居恒簮紱羽衣相錯無慙色也余嘗見其遺墨有與道士徐中孚詩翰一卷筆法圓熟秀媚有虞永風規而詩亦清㛹有味玩之恍如見當時散朗􅁭趣也公自題云十一月壬辰明復真人約華陰楊廷鎮閩中潘子文四明王安道談道話於徐中孚丹房微雪灑空塵静雲晏遂以終日即事雜詩詩曰白雲䕶窻雪鳴竹地鑪深深火初熟樵客晨來午未還真人自與燒黄獨爐中鉛汞輕千乗窻外日月飛兩螢尚有度生情未斷侍人長跪授黄庭玉臼搗霜月當户竹窻暎雪書滿床客來長揖不交語自撥松火燒山香皎皎霜鶴立齋厨蕭蕭風竹鳴庭除窻間有客自高坐堂上真人方讀書佛書云珠玉􅟴璖瑪瑙夜能自行人蓄精玉旦夕移易或在此或在彼皆不足怪不獨馮月華臂上玉馬能入厩亂羣也趙文敏畫馬雖以伯時為師而其古淡渾成若無意標竒處實得物態之自然昔人謂圖鬼魅者易竒冩狗馬者難巧然狗馬之中亦有出竒取異者是亦鬼趣也元人畫馬任月山太庸龔翠巖太竒惟子昻得馬之真葢其性喜畫馬少時遇片紙輒畫而後棄去精能之極合乎自然非淺造者可窺也丁卯八月湯慧珠携公天馬圖來玩平立顒視絶無頓掣之意而神氣雄岸屹然如山奚官長身武姿與馬並高如獻軒墀時也題者數人一馬形軀百法全生時靈氣取山川英雄正用同生死那忍無聲立仗前海粟京口郭畀天錫敬觀松雪翁天馬圖神駒初墮地雷電飛海水三歲不敢騎萬里獻天子翰林直學士虞集題奎章閣鑒書博士丹丘柯九思敬仲審定曲江洗刷雲滿身雄姿逸態何超羣眼中但覺肉勝骨幹也合讓曹將軍嗟哉今人畫唐馬藝精亦出曹韓下玉堂學士重名譽一紙千金不當價山窻擁雪觀畫圖據案便欲擒於莵天厩真龍有時有杜老歌行絶代無史官察級士安竹懶曰察級意似嫌子昻此馬稍肥故謂在曹韓之下横以時名取重耳求其如杜老所歌掃空萬馬者則絶代未有也何物胡奴强作解事如此姚雲東晚慕神仙喜與黄冠遊且身為黄冠師用方外言以陶汰歲月未必真有得也嘗為陸道士冩墨竹系以一詞其欵云陸卧雲碧淵之師嘗問長視之術於余故福源室中亦可以分半榻之雲丹丘之中其師弟每為留宿之客既作墨竹復重以言者其有以耶詞曰王子仙成吹簫處一雙青鳳飛來借問如今世界何地是􅅫臺更有葛陂投杖龍躍起鼓浪轟雷何如我詠猗猗菉竹淇水之湄蒼雪生吾珍簟碧香又落霞杯喚道人相對醉後玉山頺百年笑口開得㡬千㢠廻張樗寮喜書法藏字如當三錢大蒼勁秀㧞葢以李煜徐鉉君臣金錯刀法為宗而稍取率更筆意整齊之者有書金剛般若一部尾行書題云樗寮即之七十八歲喜再逄佛誕以天台教宗印講主所校本敬冩此經遺天竺靈山志覺上人受持讀誦我願執情不作常觀般若六如覺性永明共悟實相本體流通利益均及有情時景定四年歲次癸亥陳雨金䟦云昔吳闗門外有駐節二字大可二尺許古雅遒勁極得大書之體余少時見而愛之先主事都水公曰此張即之筆也後於一統志和州下載云即之特善大書以是知先君葢有所見云若細書則未之聞也兹偶見此經大不過指尤俊健不凡乃知樗寮不獨擅大書已也書史㑹要記樗寮歴陽人歴陽𨽻和州即今含山明隆慶庚午春三月吳下陳鎏識石田漁莊村店圖乗興數筆酷似北苑非許道寧所能及也以其愈率澹愈真愈簡愈逺耳題句亦妙云漁莊蟹舍一叢叢湖上成村似畫中互渚斷沙橋自貫輕鷗遠水地俱空船迷楊柳人衣緑燈隔蒹葭火影紅全與我家風致合草堂亦有此愚翁𢎞治庚戌秋八月偶遊石湖道經村居野店遂作此圖并系以詩沈周宋存爵存餘堂詩話云余家舊藏顧仲瑛詩帖一紙乃次韻劉孝章治中邀夏仲信郎中遊永安湖詩二首字畫絶工楊鐡崖先生嘗和之中有一聨云啄花鶯坐水楊柳雪藕人歌山鷓鴣鐡崖所稱許仲瑛家饒於財而豪俠不覊詩筆乃其餘事楊禮曹支硎先生䟦其後云吾家鐡先生平日豪氣塞雲漢未嘗輕易假人以稱可語今為仲瑛拈出一聫低頭遜避乃知先生目中自有人也黄子乆方幅小景叢林􅃨壟起伏暎帶數十重不作沙水只坡麓髙低與平疇相為出沒而已天地間自有此景惟其胷中吞茹印合者多偶然冩之而又分數明取與熟故蹠實處不患偪塞摶虛處不落空踈千古以來惟子乆獨歩耳予有一幅乃九龍冷道士之物道士以貽王舎人孟端孟端以歸沈啓南啓南徴題于吴匏翁因留吴齋中不及取而啓南化去匏翁捐舘時遺命子孫必歸沈後竟不知落誰何手余甲辰春得於吴門上有楊少師士竒朱翰林善并匏翁三䟦真罕物也唐伯虎有桃花庵作歌膾炙人口沈啓南之弟繼南亦有桃花庵啓南為冩圖倣營丘秀潤之筆葢以春山止取淡冶春林不容蒼鬰平日董巨辣手無可施耳題句云桃花書屋吾家宅阿弟同居四十年今日看花唯我在一塲春夢淚㾗邊此桃花書屋圖圖在繼南亡前兩年作嗚呼亡後今又三易寒暑矣今始補題不勝感愴乙未九日沈周上虞有舜井相傳舜子生時井為湧泉秦始皇封塞起兩墩各髙一丈晉宋為佛廬野人耕鋤多得古磚甃石吴越寳正三年閠八月十四日錢王差人賫火糧畚鍤開掘得䜟記寳物一百二十餘件都抽領西都上直廂虞候盛瑗東都上直廂虞候孫𢎞西都隨身虞候閭丘稔勾當拜祭内直殿十將于軒十六日鑿西井十九日得銀環六赤珠一金盒一古文錢二千三百四十琥珀珠一當十大錢三當五十大錢二十四太平錢百直百三銖二十四大錢二百五十四五銖錢九百六十貨錢二百八十半兩錢三十石獅一鐫其背曰重華井天明可開腹内有水精珠一東井得銀塔一高一尺五層内有金瓶舍利二顆散金瓶二金鈴六銅鈴一銀環六銀鈴一水精珠十四琥珀珠九雜珠大小三十五小琥珀獅子三十瑪瑙珠七玉人一玉環一銅鏡三銅爐一小瑪瑙珠六玊瓶一以上共三十四件並有石匣盛之題云唐元徽四年於此造塔鎮井有重華石一片濶三尺厚九寸左右有索痕深二寸官中令造深沙神一軀足履四石寳正四年六月廿九日差錢文殷祭神鐫石張長史草書蘭馨帖字大如掌雄宕高逸出於天成終日玩之不能釋手文氏父子䟦之葢唐蹟之無可疑者右草書帖云蘭雖可焚馨不可奪今日天氣佳足下撥正人同行相傳為嵇叔夜書余驗其筆為張長史書山谷云顛工於肥素工於瘦而奔逸絶塵則同此書肥勁古雅非長史不能又予嘗見公所書濯煙宛陵春草等帖結體雖不甚同而其妙處則與此實出一闗紐也但其文義不可解葢唐文皇好二王書故屏障間多書晉人帖語一時化之或長史書叔夜帖語亦未可知然今不可考矣嘉靖丙辰三月長洲文徴明題右張長史紋綾上所書蘭馨帖二十字其為真蹟無疑葢草書不入晉人格轍終成下品顛素之所以得名者在此今觀其奪字氣字佳字足下字人字皆從晉人中來余閲書多矣未有如此卷之佳者世人重耳輕目不可語此昔素師緑絹兩行因元章所題而重他日必有以余言為是也者漫書以記嘉靖四十年辛酉正月立春日文彭書古人名跡愈閲愈佳僕性喜草書毎一展必有所得益知古人不易到也汝和將以入石命摹一過老眼眵昏殊不能得其髣髴若風神庶㡬不至懸絶耳壬戌正月廿六日文彭記余自信所見因書卷末而汝和不知也歲暮㑹于京邸偶談及展卷大笑因復與汝和辨論以見前言之不誣故再書此以記歲月云季冬二日燈下試居庸石霜葉硯文彭文衡老詩清㛹婉約弇州歴下諸公每以吳歈目之然獨施於登眺讌集或稍渉輕縟流易耳余見屠伯起所藏公書文信公事詩四首不獨忠憤激烈耿耿有貫虹偃日之氣而語格亦多雄渾典碩舍杜老未易窺者乃知公養􅃉蓄深葢難為垂綆也詩曰地轉天旋事不同老臣臨市自從容誓將西嶺填東海忍著南冠向北風千里勤王空赴義百年養士獨收功人間亦有成仁樂未用區區悼此公又曰倉猝勤王萬里身風塵傾倒作纍臣三綱已去嗟何補一死臨期認自真直以安危繫天下未宜成敗論斯人遺文尚可誅姦賊何但悲辛泣鬼神又曰頻年航海欲何為天厭中原遂不支滿地江湖無死所際天風浪有平時倉皇一念聊臣分寂寞中流頼史知囘首又看狂敵滅寒潮自繞大忠祠千古英雄遺恨在怒濤驚浪日舂撞有天肯與元同戴無面能看宋再降烈士深悲甘蹈海中原未復竟如江君王莫罪風波惡應似憸人解覆邦字學陸放翁灑灑有致亦别楮之上駟也荆州玉泉寺近清溪諸山山洞往往有乳窟窟中多玉泉交流中有白蝙蝠大如鵶按仙經蝙蝠一名仙䑕千歲之後體白如雪棲則倒懸葢飲乳水而長生也其水邊處處有茗草羅生枝葉如碧玉玉泉真公常采而飲之年八十餘顔色如桃花此茗清香滑熟異於他所者所以能還童振枯扶人壽也李太白至金陵見宗僧中孚示茶數十片拳然重疊如掌號仙人掌茶因為作歌李白贈參寥子詩云五雲在峴山果得參寥子又云骯􅗣辭故園昻藏入君門天子分玉帛百官接話言毫墨時灑落探𤣥有竒作又云長揖不受官拂衣歸林巒余亦去金馬雲蘿同所攀知為荆襄間隱人曽召對放還者宋參寥子友歐蘇歸釋唐參寥友太白歸𤣥世外竒人不甘齪齪則往往為異教所籠如此太白風䂓材韻固是南宫謫仙不獨所交賀季真元丹丘􅅫池隱者女冠禇妙素諸人皆結霞外之契即元配許夫人亦慕仙道往廬山尋仙女李騰空太白作詩送之云多君相門女學道慕神仙素手匊青靄羅衣曵紫煙一往屏風疊乗鸞着玉鞭其超逸可想見乃知異人降世自有上界眷屬相從斷非凡眼孔所能測識也劉康谷於廬山遇異人碧眼方瞳鬚髪煜然有光喜劉瀟灑近道授以彭祖小接命丹一方取首生臍帶中根下血子一粒去一寸許剪斷名曰金剛子其色半紅半白自有陰陽號為𤣥珠乃父母元精元炁結成之祖氣也約重一分二釐入銀盒内好乳養之黄蠟封口冬入温水中夏入凉水中其子長大滿盒每日將盒向左旋三次每次三轉三日後藥重一錢二分如天桃狀服者先用麝香擦臍通竅用布剪圓一塊攤在臍上布上放藥外以蕎麥粉或麵作一圓圏圍住用蘄艾一兩二錢焙過加穿山甲七錢為末麝香三分乳香五分共一處揑成艾炷十二箇又用槐皮覆葢藥上皮用刀刮薄針刺孔置艾炷於皮上灸之至三次其藥神化盡灌於臍不見形跡又復九炷其人若醉將槐皮取去用黄蠟醋麻油熬膏以段帛攤之封固臍上如口渇可用蟠桃酒一七日不用飲食八日後可用清粥量進忌油鹽只淡精肉少用二三片三七日飯半碗酒三鍾一月後身上退下粗皮容顔豐悦異常此藥一粒頭胎者延夀一甲二胎者延夀一紀若夏天熱甚安磁盆中以井水浸過頭冬天寒甚以銅器盛水坐炭盆灰缸内養三日男用女胎女用男胎不傳匪人恐遭天譴康谷受而藏之以服官倥偬未及試也竹懶曰嘗觀圃者栽接之法移榦培根無不榮茂以意推之此法非孟浪也又傳烏鬚髪一方用猪板油一斤蜂蜜一斤核桃肉一斤好茶葉一椀共搗碎和合用錫器盛之於飯甑上蒸熟每早匙取少許化沸水中服之三月鬚髪無不黒者趙榮禄與管公節幹月窻判簿二劄子係少年筆精𦂳勻和字字皆羲之法晚年雖縱逸可喜然雜揉諸家非𤣥酒之味矣札云孟頫上覆丈人節幹丈母縣君孟頫一節不得來書每與二姐在此懸思而已伏想各各安佳孟頫寓此無事不煩憂念但除授未定猝難動身恐二老無人侍奉秋間先發二姐與阿彪歸去㡬時若得外任便去取也今因使專此上覆聞鄉里水澇盤纒生受未有一毫相寄二姐歸日自得整理一書與鄭月窻望逓逹不宣六月廿六日孟頫上覆丈人節幹丈母縣君孟頫謹封又一札云孟頫頓首希魏判簿鄉兄足下孟頫奉别誨言倐爾兩歲追惟從遊之樂丹青之贈南望懐感未知所報惟是官曹雖閒而應酬少暇以故欲作數字道區區之情而不可得希魏愛我甚至當不以為譴也即日毒熱伏想水晶宫中夷猶自得履候安勝孟頫頼芘如昨秋間欲發拙婦與小兒南歸以慰二老之思是時又當致書併以拙畫為獻也家間凡百悉望照拂因使便附此不宣六月廿六日孟頫再行䟦者十四人一云今人觀趙承㫖書但見其晚筆縱逸為勝殊不知妙年應規入矩有如此帖者不由䂓矩而縱逸是猶疾行無善歩也識者試與評之至治三年九月廿五日後學錢良右敬題松雪老人書法在中年時一筆不苟怡怡然得天趣此惟識者能知之泰定元年八月廿日隴西李皓見于吳氏文房吳興公字畫之妙不待贊詠而知是帖葢在兵部時所與江南故人者王謝㳫拖風氣不可復作撫卷為之太息吳郡陸友記自晉唐以來法帖其事率皆慰問通敘施於家人朋友之間不過數行而已其初非用意而逸筆餘興淋漓揮灑百態横生使人驟見驚絶徐而視之其意度愈無窮故後世傳之往往以為竒玩而想見其人今觀松雪仙人與月窻判簿手帖宛有古意濃纎剛柔皆與人意㑹真希世之珍又非獨傳玩而已也淳卿其善保之泰定元年九月九日隴西李升書於静寄東軒神品人材一子昻晉唐翰墨漢文章紛紜兒輩輕論議白璧黄金未足當丁應榮杜少陵云斯人已云亡草聖固難得及兹煩見示滿目動凄惻斯言盡之載閲此卷令人悼痛不能已後學張淵李西臺書名重一時而東坡乃謂雖可愛終可鄙雖可鄙終不可棄予嘗妄意借為子昻方寸大字之評聞者瞿然固難為淺見寡聞者道也至其尺牘揮灑奕奕有晉人一種風氣亦不可掩豈易及哉未能上下古今書畫之變而窺其妙遂欲出意品題恐不免紛紜兒輩之侮也泰定甲子季秋蜀梁子寅書鐡畫銀鈎到者稀鷗波亭上墨如飛後人何處求書法華表千年待鶴歸南陽張遜餘不溪邊采白蘋鐡網珊瑚寸寸珍天上玉樓盛不住虹光夜夜貫星辰遂昌鄭元祐吳興松雪公名高當代而書法之妙葢牢籠今古出入羲獻也此二帖雖盛年所書然其輕清流麗之畫得超妙入神之變有非後人所可及者淳卿寳之無斁泰定五年三月一日梁谿生王禮賓觀書中苦説候除官客舍幽州六月寒近接阿彪歸後信婦翁强健縣君安吳僧嗣益松雪先生翰墨之妙名貫一代其下筆之勢出䂓入矩灑落超逸非鍾王不足與議也至其晚年筆蹟猶為妙絶金石所刻後學之士多所師法今觀此二帖前人流風餘韻典刑具在不覺啓敬吳門丘宗書法自唐顔柳以來多尚筋力而乏於風韻然尚筋力者則失於狂趮喜風韻者則過於軟媚求其兼善而適中者亦難矣至宋李建中蔡君謨輩追蹤六朝見稱於時論者猶謂未能盡善本朝趙魏公識趣高遠跨越古人根柢鍾王而出入晉唐不為近代習尚所窘束海内書法為之一變後進咸宗師之或緘之篋笥或傳之金石不能悉數也此二帖䂓摹羲獻其第一帖絶與聖教序相類非有墨池筆冡之工者豈易及此披玩嘆服因識其後至正二十五年秋七月既望盧熊書右趙魏公丈人節幹月窻判簿二帖節幹即公舅氏管公直夫月窻不知何人想亦是管姻家䟦者十有三人陸友仁謂兵部時書按帖意以除授未定欲遣二姐歸侍二姐管夫人仲姬也公以至元丙戌入京除兵部郎中後二年始以夫人北上不應先有是語或是元貞元年自濟南赴史館時而是歲竟歸吳興意者未歸時所遣不可知也二帖行筆秀潤與他書殊不類是蚤年學思陵書如此其署名猶循宋習或謂出聖教敘者非也管公無子公奉之甚至既殁建孝思道院以主其祀亦厚矣哉沈潤卿氏藏魏公書甚富疑此帖有異特以相示余為考訂歲月定為史館時書甲子衡山文璧石田安老亭圖倣梅道人灑落成就晚年筆也題云老人欲得安老具草堂之資空復空賣書無處可暎雪持疏覔錢如捕風預先種竹須十個及早誅茅當一弓他時㑹遇王録事大庇風雨何愁翁沈周橋下幽亭近水寒倩誰題字在楣端市㕓得此猶堪隱老者於今只自安飯後徐行扶竹杖倦來穩坐倚蒲團眼明能展鍾王帖絶勝前人暎雪看吳寛近來誰助草堂資杜陵萬厦徒爾為高人知足老自逸義士逹理顛當持堂深不用日䇿杖山近偏宜朝詠詩我縳草團畧相似織蒲自賣敢煩渠華亭錢福孫老年逾七十年髭鬢差白髪尚𤣥雖然四壁若磬懸所交海内皆才賢賣書賣畫不論錢兩足來往如飛鳶一日一周城與㕓歸來板屋成高眠昕昏樂飽白粲饘老妻稚子相依然藐視豪俠勢位權未嘗希諂一脅肩那更揺尾而乞憐若箇似爾安且便便是陸地之神仙如矄叟張習江湖寥濶竟誰之短疏徒令費我辭若也能存鶻等帖也知足辦草堂資塵中两足未得憇林下一亭何不宜縹卷展來聊塞白落成還許再留詩庚戌八月一日戲題安老亭卷與崑山黄德敷同集翁昔有羲之十六字石鶻等帖句中故及之云朱存理茅亭結得水之濵濁酒三杯日日春君固自能安在裏世間多少未安人數年前為孫君作此君請余重書視之不覺媿汗也睦曩余成化庚子為孫翁作此至己巳乃登於卷迄今四十有四年而翁之殁亦廿五年矣俯仰今昔為之慨然嘉靖癸未秋七月九日虎丘山人都穆絶勝山顛與水濵市橋曲處獨留春老來自有能安理此是皇明壽域人崑山黄雲次韻孫翁一室自蕭然尊酒安眠辨晚年却有一般娛客處焚香看畫日隨縁文璧一亭幽隱世無干眼看天時變暑寒筋力衰遲不堪事慿君莫作少年看張靈草𤣥何必説揚雄自縛黄茅半畆宫不有諸賢爭出力那教此老息忙躬就床時閲枕中記把盞偏思塞上翁記取人間蕭灑地㡬竿簷竹自清風宣城史經六研齋二筆卷一
