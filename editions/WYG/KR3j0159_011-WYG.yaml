body:
  text: 六研齋三筆卷三明李日華撰宋理宗時以應禱勅封嘉興順濟廟神為靈澤侯石夢飛得一卷以相質余曰此中書省所行牒文也字亦中書省臣所書謂之判體非所貴也但好事者蓄之亦見前朝制度當時史彌逺為中書令故首書名而參知以下相次别署耳唐宋庶政纖悉皆歸中書雖封爵之重止以省牒行之玉堂詔誥璽書不輕授也其後又重列名押字者乃中書行門下省門下行尚書省然後行之於下付該廟祝為世守耳三省所列俱以彌逺為首所為同中書門下平章也江珧又名江瑶柱閩海之産亦蟶蠔之類也東坡篤於味至為作傳又云腊之則風味頗减友人有從嶺粤涉海囘者見遺一裹㵸以佐酒遽令蚶蛤輩退步三舍元人喜寫桐陰高士圗子久叔明雲林㓜文俱有之雖景物各布而一種瀟灑超逸之􅃐令人不知人間有利禄事則一也丙寅六月偶過石佛禪堂藏經室前除四五桐樹間桐正作花香雪滿地啜茶談詩亦自慶暫遊諸公圖畫中也門人倪剡雪竒士也精大衍數占事竒中遇異人授以劔訣嘗為余起舞白虹遶楹柱間不可留瞬余為玉龍子歌貽之勸其北遊塞垣以親老未能出户歌曰玉龍子出丹穴一縷紫烟千片雪舞翻滿袖黎花雲銀海茫茫上孤月鶴來且自返蓬壺三百六十飛仙鳴佩玦林逋賣梅既玩其花又取其值似同遣婢一例忍人竹懶賣文之餘兼亦賣梅其梅從筆墨灑落盖以文魔所幻非出園丁手也且不取錢止令麯生時一相就而已顧逋翁况隱我里有洗馬池在小鹽倉橋委巷既窮遂連阡陌有水一泓環以老樹水色沉黒不生萍藻亦無涸溢或云我地無馳驟當是洗研池非洗馬也樹間向傳有石碌硌相暎今為民居闤闠所侵已悉徙去矣逋翁有苔蘚山歌一首豈即是中所玩耶歌曰野人夜夢江南山江南山深松桂閒野人覺後長嘆息帖蘚粘苔作山色閉門無事任盈虛終日欹眠觀四如一如白雲飛出壁二如飛雨巖前滴三如騰虎欲哮咆四如懶龍遭霹靂嶮峭嵌空潭洞寒小兒兩手扶闌干吕温於洛陽南市買得研神記一部不知誰作有上官昭容押縫遂深寳祕為作歌以記之唐盧綸割飛二刀子歌云吾家有剪刀人云鬼國鐵裁羅裁綺無巳時用來三年一股折南中匠人純用鋼再令盤屈隨手傷改鍜割飛二刀子色凝霽雪鋒含霜兩條神物秋水薄刃淬初蟾鞘金錯越㦸吳鈎不足誇斬犀切玉應懷怍日試曾磨漢水邊掌中恄慄聲泠然神驚魄悸却收得兩頭已吐微微烟刀乎刀乎何􅂱􅂱魑魅須藏恠須滅若非良工變爾形只向裁縫委箱篋余得宋仲温草書一本乃題云折剪刀歌筆法沉頓雄快兼篆籀急就之能不獨步驟旭素也後有題語云百年前華亭王先生用鍾王家法書此唐盧綸所作剪刀歌於士夫間價直百錠如獲拱璧先人得之命予自㓜臨倣得其肖似故遇人有求書輒贈之書畢追想先德又成今昔云東吳宋仲温識按仲温所云王先生者王西園也元末老儒精樂府余得其擘窠書萬玉叢三字以冠吳仲圭墨竹冊真不易得者辛稼軒棄疾才情豪放見於填詞諸作書法未有聞亦未之見甲戌春仲得觀一卷乃行書劄子渾厚沉婉有蘇欒城風氣絶無㧞劒罵坐之態古人之不可相如此今録其語於此棄疾自秋初去國倐忽見冬詹詠之誠朝夕不替苐驅馳到官即專意督捕日從事於兵車羽檄間坐是倥偬略無少暇起居之問缺然不講非敢懈怠當蒙情量也指吳㑹於雲間未龜合并心旌所向坐以神馳右謹具呈宣教郎新除袐閣修撰權江南西路提典刑獄公事辛棄疾倪元鎮詩情婉逸天成有王孟之致余甚愛其追和孟東野張承吉崑山慧聚寺詩有寒溜石苔碧落花春雨香之句即摩詰不是過也周公謹名密號草窻又號弁陽老人泗水潛夫殘元時流寓吳中目見偽吳張氏狂圖不遂城破國亡皆由任用非人淫樂自恣竟殲天戈有足􅅓者於雜札中得其詩數絶皆追悼之作也行筆矯徤蒼勁亦深足尚余為裝潢存之而録其作於此曰甲第紛紛起畫樓忍看孤主赴覊囚當時㡬個偷生將只合加封不義侯其一霸氣遥加萬乘君江南兵力已全分那知几席生竒禍兩卒輿屍從後軍其二註云欺君故有禍長淮千里陣雲平萬騎郊原决死生不信玉堂春醉醒倚闌晴日喚流鶯其三註云不救根本而躭泆樂此張所以亡也偃月堂高矗紫烟夜闌笙火正薰天如何斥地連吳楚塟骨都無半壠田其四註云狂生不知死城門壘合勢如山夜哭吳兒矢石間血濺髑髏俱作土功成上將獨登壇讀顧金粟玉山紀勝知當時文章翰墨風流俊賞之彦無不羅致金粟所自賡和亦聯鑣並軌無一下駟獨其手筆未得多見今閲其啓事一通行楷楚楚奄有洛神畫贊風軌信能品也啓云阿瑛啓遁跡異鄉甘與草木同腐逺領斯文大芘眠食粗安但於友朋多不奉書問為缺寔以路逺便艱諒知我者必毋見誚今年目昏手勌老態頓加因思太倉諸友際此多故不知再能相見不因陪雪坡舟中數日得入城一見然風景非前諸公放落獨與學古彦文周旋兩日不勝慨然囘崑山途中邂逅令弟曾附意亮達聴司近始知致身重要喜慰無已然未獲為賀負罪負罪儻至平望毋惜枉駕辰下暑隆唯冀善加調攝以膺大用不具五月三日顧阿瑛手書拜公武交契元人有西字韻七言律詩作於盧充􅜶而諸公和之惟陶南村灑落雄邁筆亦遒古有李泰和雲麾帖意詩曰與君相遇浙河西鴻爪縱横蹋雪泥魯酒未聞千日醉雍琴初墮數行啼老松卧壑虯髯古脩竹排雲玉節齊試問終南高隱處青莎雜樹白蘋迷其一白雪歌殘月墮西綵箋緘露濕香泥錦篝自教鸚哥語環佩同聆絡緯啼新製惠文蟬殻大舊裁白紵鶴翎齊它時若共東園宿夢􅂻相期徑弗迷其二陰陰桃葉武陵西山雨霏微不作泥梅樹月高擕鶴過桂枝風急喚猿啼讀書堆裏牙籖合揮扇行間鐵騎齊聞道驚人吐竒句吟情直入五雲迷其三元人吳叡字孟思工小篆匀浄遒逸亦能品也有書道德經一卷釋良𤦺號楚石與顧金粟遊極密玉山草堂中諸詞客每有倡和必𤦺為發端諸公雅推重之偶於倪雲林雜劄中得一紙有云正月中僕為醉客所捶罵僕亦醉頹然如土木偶人不屑也人所能共知聞乃反造謗於雲門翁謂僕議其詩文字畫雲門翁學皆造極艱虞中留遇僕不淺僕亦人耶獸耶聞雲門中亦少動是不可曉雲門者即琦也𤦺住持越之雲門寺又住持吳之龍門寺故又稱龍門翁味雲林此柬則𤦺之聲價可知矣朱德潤澤民為周景安徴士寫秀野軒圖蒼潤清逸在子久叔明之間又為作記文采斌鬱字畫遒麗亦頡頏鮮趙澤民為江浙提舉學校文行之美冠冕一時特性㢘重不輕狥人求是以流傳有限此卷真吉光片羽也周左丞伯琦為篆秀野軒三字亦極偉觀題者數人悉名筆也末則其嗣君識語亦見世美余昔遊吳中諸山至周氏秀野軒領覽天池玉遮之勝今數年矣今歸寓軒獲覩周侍御之大篆朱提學之新圖恍然若夢遊也景安求余着語􅂓爾塞責髦餘才盡愧無佳語耳我憶天池與玉遮幽軒水木澹清華竽笙逺振風林竹錦綺晴連晚徑花山罽敷床朝看雨澗泉潄石晚分茶番陽大篆睢陽畫不負舂陵處士家至正廿又五年五月既望京口張監天民書時年八十五嵗昔年嘗作軒中客今日重題秀野詩四檻綵雲晴縹緲遶墻蒼雪曉參差雨餘山氣侵茶鼎風過林香落酒巵念我松楸渾咫尺倚闌長是不勝思吳郡朱斌屋裏青山屋外溪水流雲度坐中知繁花翠竹春來好古木蒼藤晚更竒教子讀書兼學稼留人炊黍更烹葵鹿門風景青門􅃐都在斜陽曵杖時張吉江晚洲渚交雨晴草菲菲前山靄欲暗罟師度水歸望烟知君家花竹隱半扉乍休田中耒猶響林下機此鄉即桃源亂後世有稀開圖身已到不知塵境非渤海高啓高舘罷零雨前榮散微風霏霏碧蘿花吹落酒斚中移席俯流水揮絃度秋鴻遥思獨樂意邈哉誰與同太原王行古苔十畝青山麓􅆼窕幽閒映深竹中有高人晝掩扉嬝嬝藤梢上書屋清風出谷灑秋香返照穿林破春緑不省睢陽畵裏看細路經丘杖藜熟青城王彛何處問幽尋軒居湖上林竹陰看坐釣苔跡想行吟嶂日斜明牖渚風凉到琴相過有隣叟應只論閒心郯都徐賁霽色青蕪外開軒此獨幽竹深頻理徑山近不遮樓茶興邀僧共花期報客遊看圖憐到晚借屐擬相留潯陽張羽得覽先公跡悠然記昔時松楸先壠近花竹故人稀圖畫留遺跡雲山起逺思投閒身未遂感慨一題詩鄉人朱吉秀野軒者吳周景安眺覽之所也番陽周公為題其顏我先公為寫而圖之復從而記之盖軒與我先壟密邇景安乃先公之愛友非若是又孰從而得哉先公暮年每倦於此明年逐即世此絶筆也景安亦已物故景安之壻何幼澄氏時以示余拜觀圖後題者多吳中秀士俛仰之間已四十餘年矣諸公亦多淪沒豈易得哉且夫名之著者因以德境之勝者由乎人他日何氏子孫傳示永久亦足以侈外家之雅集矣㓜澄其瑶藏焉余既賦之以詩又求識之於後遂書而歸之永樂庚寅二月望日朱吉識秀野翁所藏帖有趙松雪書歸去來辭及白描淵明立像藁城倪中錢塘陳彦博䟦曲江錢思復浚儀趙俶語溪鮑仲孚各賦選古一章皆論松雪事甚恕盖為賢者諱也周桐村鼎書後云丁丑先大父小識二十三字嵗月而已不著論也丁酉錢半隱先生題名中有先外祖觀稼有君先執友顧龜巢先生呼不肖鼎為七嵗客今犬馬齒六十有五矣又云邑庠生珇秀野之曾孫也以祖執行事余每抱此相展閲又云農圃秀野觀稼半隱龜巢五君子風采可畫與古人伯仲而不肖以犬馬名玷之寧不深感成化元年乙酉陽月廿四日周鼎在武水天香書室謹識竹懶按此卷零落諸䟦不可深考而所謂農圃者即桐村之大父觀稼者即其外大父想當為朱姓顧龜巢則失其名皆前元遺老之有學行者可念也石夢飛得石一片青黄相半類菜甲以為研竹懶銘之曰於陵圃中拾斯墮甲霜凝雪堅不可烹㵸俾食字者礪齒以嚼洮河石三種黄白碧皆淺淡有韻今人指深緑麤石為洮非也兒輩閱肆得一卵子研四旁皆蠟色明透類玉塵靣有二圓暈如蛤肉所謂雞公眼也竹懶銘之曰于闐之河洮去不逺玉之支庶散布流衍千波所淘萬沙作碾斸霜無聲興雲有渰每一啓匳白虹在檻張伯雨書法勁妙初不知其善畫偶見一幅於友人沈載猷家滃筆作山如堆埠起伏下層草樹荒率不甚入意疑偽者因伯雨無畫名而掩之耳忽於一禪者處得無盡燈所作天台山志載伯雨入吳閒閒室受七十二家符篆能以敗筆㸃綴成樹石山水人物頗自賞適則知其以餘瀋自恣也高流胸次吐吞物妙任其出入變現豈能限耶蘇養直名庠隱居學道往來句曲東坡曽與通譜呼為吾宗養直贊其像云松風颼颼瘦藤在手唯此白叟德全於酒盖直風素節士大夫仰之久矣翰墨所遺亦高邁不羣今得覩其手柬二通皆當時率意之筆而㸃畫異趣有不可勝窮者特倩友鈎填入帖而録其副於此門中伏惟萬福妻子輒拜起居之禮必恭已行否或尚留告道區區之意山中雖荒索然歸金壇亦便道肯賜臨辱不勝至幸庠再拜上問尊夫人即日恭惟夀體益康門中上下均休老媳婦輩敢拜起居山中有委萬萬疏示庠再拜䟦周德友所藏養直書云李將軍之霸陵見止於醉尉陳拾遺居射洪畢命於暴宰吏之能辱人如此澹臺子羽不至言游之室閔仲叔不以口腹累安邑皆委而去之士之重所就也如此後湖蘇公隱丹徒辟召不肯起其於世何如也周君德友親主縣簿顧從遊文書往來如曲如𤨏求之古人未易一二數也後湖先生於吾家􅆻好最舊僕晚生不及見先生臨終之嵗叔父中黄翁語羅浮異事知其超然𤣥悟不隨化俱盡矣今徳友尚刻舟以求劍何耶然徳友負其所養不少見於世獨置力於斯文不負所知哉乾道丙戌除日借觀於上饒祥符僧舍眉山蘇嶠題後湖先生仙去已久殘章墜藁不為六丁取去流落世間者尚或有之未若吾德友所藏如是之多也先生少不就舉老不就徵盖神仙中人非世所能覊絆者故語帶烟霞嚼松風非食烟火人所能到此尤可寳也見德友說未經散亡時其家所得詞與詩與尺牘堆案盈箱遷徙十亡七八則不為世之所見得以寳而藏者又不可勝計也伏讀欽嘆久之紹興庚辰汝陰李夀臣書後湖先生以清江曲見賞於東坡今觀此詩帖盖有得於東坡者東坡嘗謂延州季子張子房皆不死嶺南之人亦言東坡不死後湖真不死矣德友久從之遊恬於仕進其文氣老而益徤有以也夫乾道戊子冬至後二日莆田陳雅書見松而知栢聞蘭而識蕙臭味不殊耳僕從德友交游尚未欵觀後湖之所稱道令人意傾也紹興庚辰人日建安徐詡書竹懶曰後湖即練湖在京口西曲阿東南舊傳海神恱高麗王女釀酒為聘王嫌其味醨郤之海神怒載酒還經曲阿口悉覆其酒於中流入曲阿練水受其味色白而甘釀酒異常珍美養直嗜酒因居後湖稱後湖居士蘇嶠者亦眉山族裔所云叔父中黄翁者學道而有得者也羅浮異事中黄於養直化後復見之羅浮也余曾得見冷啓敬張三丰書蹟與此後湖先生手簡皆仙人腕中灑落可為多幸矣右軍瞻近帖真蹟又連龍保帖拾壹字瞻近無縁省苦但有悲歎足下大小悉平安也云卿當來居此喜遲不可言想必果願者有期耳亦度卿當不居京此既避又節氣佳是以欣卿來也此信㫖還具示問龍保等平安也謝之甚遲見别刻尚有卿舅可耳至為簡隔也九字見十七帖右羲之瞻近帖行書之狎隣於草者也典午冲靚放曠之風烏衣諸王富貴居養之素藹然見豪楮間宜其名百世也第宋淳化宣和似搜羅晉帖靡遺而此帖獨不見有表識豈非金源得宋故物易故以新而然歟明昌七印籤帖金書全倣宣和其篆籀朱法精粗不侔後世瞭然在目假令當時不相師法政未為失觀辨章良公成甫家清玩見右軍真蹟二帖當亞快雪至正丁酉閏月已未廬陵歐陽𤣥識此余居祕府時閱厯諸家帖而右軍羣昆季居多荷華褁鮓神俊天出評者至以龍跳天門虎卧鳳闕稱之信不誣矣此帖骨相差豐豈操觚時在來禽喜色之前耶不見賞於徽宗而見珍於完顔臨風撫卷足為世道一慨前翰林孫蕡鄱陽宋天章嘗示余鄱陽獻之帖每恨其絹素未古此帖與金華宋仲珩所收周益公家喜色帖紙墨相類筆法精妙真蹟無疑良金美玉可得而此卷不可得寳之寳之丙寅立夏鄱陽劉昺題竹懶曰此唐人硬黄本也文皇酷嗜右軍書令趙模湯普徹等十餘人常侍左右遇有逸蹟輒令搨之謂之供奉搨書人搨用三法真蹟明朗用雙勾廓填其稍晦者用響搨於暗室中穴墻留孔如錢大正當日光所注以蹟承其光而人就暗中精意勾之若沉晦之極者以紙性暗塞不能暎取則攤之熱熨斗上以蠟薄塗之令紙發明如明角魚枕之堅透而後用牛毛勾法極意取之俟大模就而徐以墨填之謂之硬黄是搨法之極攻苦者也此帖紙堅厚而黄色又連龍保帖一行豈右軍真蹟耶及互為參稽不入閣帖知為王著所棄後又不為道君鑒取故無政和宣和等璽而有金明昌七印此必金僭食時畢少董輩負而投敵中金亡後又負而投南宋是以有羣玉堂秋壑等章不歸内府而僅充宰執之玩者以讐物見擯耳元之䟦者三人惟歐陽圭齋略有見處其二人者如說夢也顧我輩生右軍後幾二千年尚得覩見希微光影皆從前追摹愛䕶者之力但深慶幸何可過肆吹索哉崇禎甲戌穀雨後四日題元人高翼字荗之官至嘉興路推官善書小楷倣樂毅論精悍整飭而略少韻味在揭曼碩之下所傳極少余僅購得其書周子通書四十章一卷亦罕物也項寵叔新安人名承恩杭州府學生也屢上不第遂隱西湖岳墳擕一女奴供㸑竒醜開小肆雜置書籍畫卷併盆花竹石索價頗貴余戲贈之詩云西湖流水供濯足南屏山色對梳頭月夜酣眠琴作枕雪朝孤坐絮為裘盆花巧作千金笑壁畫貲高萬户侯何用更尋高士傳先生風格在林丘余遊中原回聞先生以哭婢成疾而逝即前之竒醜者人皆笑之予信先生非躭其色實藉其相依一旦失去如跫跫之離巨虚實難自濟耳今於常賣處得一扇有先生倣沈石田畫蒼莽淋漓直得子乆家法者題云陰陰茅屋野人棲望裏烟波咫尺迷約伴擕尊釣斜日從來浪跡寄山谿萬厯癸未季春余與徐企孺許思德遊飛來峰既而思德仲兄沂春先生為作記且邀談竟日盡出所藏法書畫卷縱觀之甚歡已别去買舟抵郁銘葵氏宿焉其族有惺初者好古聚二三知已觴我侑以沈石田漁舟晚釣圖徘徊不能舍去強識歸安溪寫於沂春扇背題短句見意云石田詩云新豐酒波供濯足塵土紅汚酒波緑粗豪飲客下馬來三觥五觥行促促何如並着春江船蒲茸紫立栁黄眠船頭對坐酒漫傳賣魚儘可供沽錢夕陽射眼拉柁轉江光貼天孤烏逺𢎞治五年春三月偶坐小軒寫漁舟晚釣賦此長句以見老况録寄冷庵先生求教竹懶曰每見石翁題畫句必竒此尤竒峭孤捩似東野玉川向非寵叔拾之播於毫端則墮沙莽中矣余不惜為此老効捃掇也泰州聖果院有唐時古井闌保大中硺舊有綆迹深入寸許後更合滿銘文亦漫滅盖活石云按集古目録李陽冰縉雲三碑篆刻極細瘦亦由活石嵗久漸長刻處幾合故也唐瑯琊王淹兄女未笄能琴忽彈廣陵散宛轉盡妙自中散歿而此曲不傳五六百年矣不從天墜不從地出實由虚寂之中自宰察之神司其妙以授王女焉中散也王女也皆天地之伶也莊生曰樂出虛先得之矣趙榮禄少時繪事歩武雲麾摩詰營邱不敢失尺寸皆縑素滃染之筆盖荆闗一𣲖未嘗握其門槌也今見其寫謝幼輿邱壑圖纖細曲盡驗其為少筆䟦者數人黄塵汙人廊廟具蕭散風流誰比數清言善畫浪相傳遺恨千年機上女吳興姚式昔顧長康畫謝幼輿著巖石裏人問其故答曰幼輿一丘一壑自謂過之故宜置此子丘壑中觀其清逸標致固足嘉尚然能確守臣節當時同幕罕有及之者今松雪翁後數百載心領神㑹作此圖最是位置有方筆意竒妙使長康復生見此必當㸃頭東廬王𤦺一邱一壑絶塵坌坐看青山出白雲可是玉堂揮翰手却疑大小李將軍鄧梅木之身形似鶴鬢􅆴􅆴消得松風置一龕幸自青青好山色無縁祗有幼輿堪虞集論者可方庾亮何如丘壑自專幸甚嘯歌不廢風流圖畫猶傳宋亢宜著山巖謝幼輿鷗波落月夜窻虛虎頭癡絶無人識把筆臨池每自娛倪瓚右先承㫖早年所作幼輿邱壑圖真蹟無疑拜觀之餘悲喜交集不能去手無言師宜寳之雍謹書洪武辛未夏六月十又二日三山周斌西甌趙友士李録上饒梁鵠同觀于建康之春風堂巨然山寺圖余及見其真者峯巒雄渾林木蔽虧極曲折逶迤之致而於絹素上用筆頗燥絶無滃染之跡乃氣象磅礴自然圜厚昔人謂之乾筆巨然亦其罕作也虞奎章行草一詩亦其晚年目青後信手揮運而波磔意連筆斷處滋有竒態信知得真者駕空凌虛不拘拘憑藉形象也余嘗有句云雲林薫心忽欲吐此時合眼取亦得豈虛語哉今偶見文伯仁想像巨然圖一卷知巨公真蹟本為治平寺而作吳原博重録元人題句亦抄存於此禪林閟清景臺門作重闗幽人不可求邈然在高山古路何迢迢前㕓接人寰雖有樓觀高飛泉望潺湲誰為飛行身踐􅂿紫翠間野渡具舟檝有待終日閒空令垂釣客薄暮聽鐘還虞集題巨然山寺圖老巨三昧筆脫紙作荆闗僧中有此郎宜水復宜山層巒當靣起雲氣隔塵寰松濤響空谷曲磵雜潺湲風將貝多葉亂落夕照間老禪不可尋雲與山自閒空中聞杖錫應與鶴俱還銕道人在雲間長者寮試劉士先涇圓墨書高人造化筆竒槩每相闗羣山獻萬狀一壑分兩山恍疑景外景逈出寰中寰胡麻堆翠緑瀑布下潺湲逺碧聳天際晴雲眠樹間卓哉青城樵神襟寫幽閒手招銕篴仙一往何時還後學錢鼒在高翠軒寫時年七十嵗嵩岳珪禪師曰佛能空一切相皆滅萬法而不能即滅定業能知羣有性窮億劫事而不能化導無縁能度無量有情而不能盡衆生界又曰定業亦不能牢久無縁亦謂一期衆生界本無增减恒無一人能生萬法萬法無主是謂無法無法有主是曰無心如我悟佛亦無神通也但能以無心通達一切法耳此釋氏精要語繙盡法藏不能踰也王子安袁天罡相其不夀果不滿三十而終然其序黄帝八十一難經序云岐伯以授黄帝黄帝厯九師以授伊尹伊尹以授湯湯厯六師以授太公太公授文王文王厯九師以授醫和醫和厯六師以授秦越人秦越人始定立章句厯九師以授華陀華陀厯六師以授黄公黄公以授曹夫子夫子諱元字真道自云京兆人洞明醫道至能逺望氣色徹視腑臓洗腸刳胸之術浮沉人間莫有知者勃以唐龍朔元年嵗次庚申冬至後甲子遇夫子於長安撫勃曰無欲也勃再拜稽首遂歸心焉雖父伯兄弟不能知也盖授周易章句黄帝素問八十一難經乃知三才六甲之事明堂玉匱之數十五月而畢將别謂勃曰陰陽之道不可妄宣也針石之道不可妄傳也母猖狂以自彰當陰沉以自深也勃伏習五年於茲有升堂覩奥之心焉近復仰鑽太虚導引元氣覺滓穢都絶精明相保方欲坐守神仙棄置流俗矣觀子安之自言如此何竟收短年之報耶豈其未少有得而自誕抑形器所局所謂定果不可移也宋羔羊老人王逸老紹興中以散官扈蹕來南僑家檇李書千文一卷字大如當三錢半草半行古淡竒秀盖熟爛二王旭素而隨手出之者也書道宋末儘有人憾收拾不盡至元則頓靡矣宋僧號牧溪者善寫生所作菓蓏鰕蟹皆具真態特用筆稍欠鬆逸而人遂以濃濁詆之然余得觀一卷叢竹之杪止作瓦雀頭數十相聚㳫見側出而若見其全形者此大入意匠不似今人寫生但描依様葫蘆而已宋思陵得李伯時畫人參地黄二藥裝潢之御書東坡二贊筆法渾厚純美有鍾太常家法盖以賜臣下者不可考矣贊云上黨天下脊遼東真井底元泉傾海􅃾白露灑天醴靈苗此孕毓肩股或具體移根到羅浮越水灌清泚地殊風雨隔臭味終祖禰青椏綴紫蕚圓實墮紅米窮年生意足黄土手自啓上藥無炮炙齕齧盡根柢開心定魂魄憂恚何足洗糜身輔吾生既食首重稽又曰地黄食老馬可使光鑒人吾聞樂天語喻馬施之身吾衰正伏􅌴垂耳氣不振移栽附沃壤蕃荗爭新春沉水得穉根重湯養陳薪投以東阿清和以北海醇崖蜜助甘冷山薑發芳辛融為寒食􅄳嚥作瑞露珍丹田自宿火渴肺還生津願餉内熱子一洗胸中塵朱德潤題云右宋思陵書東坡先生人參地黄二詩筆意遒勁有鍾繇波法兼復有御書小璽為識若楊后坤寧殿書則柔婉不侔矣題此以俟知者至正丁亥冬十二月九日朱德潤題於寳儉齋仇山村題云光堯皇后憲聖慈烈楊姓御書也夫婦筆法追及晉人前此所未有也書二藥草以賜人臣藥石之訓也俱非草草觀者宜參言外之意丙寅清明日錢塘仇逺題于邵氏書齋竹懶曰思陵極愛蘇公文詞力購全集刻之禁中此二詩應所熟誦而出之筆端者且坡語二物皆北產而移之南土遂爾蕃茂時當紹興南遷之初尤所感而欣然也李息齋仲賔為仇仁父寫木石細竹規倣宋徽宗極有筆趣題云大德庚子冬十二月息齋居士為友人仇仁父作於嘉禾寓舍題者皆一時名公悉録之蒼筠倚喬木古色秋逾好誰能著茅亭相伴此君老如是翁聞仲賓方苦時行力疾為仁父作圖尚能蕭散如此敬嘆敬嘆孟頫子昻說法已著不必重贅大德五年三月廿日困學民鮮于樞拜觀東坡嘗謂與可胸中自有成竹乃見於筆下今觀仲賓所作脩篁勁節猗猗生意無盡非胸中有成竹者其能若此耶大德壬寅中元日應桂題極目荒墟落木中空山人靜澗泉㫪秋來不用為霖雨留得閒雲養卧龍石惹殘雲樹帶烟猗猗蒼玉正蕭然若人寫出胸中􅃐知道平吞幾渭川蜀普程嗣翁青龍集己酉春正月十有二日㑹稽抱遺叟楊楨之吳郡張習古汶上袁用雲間朱芾隴西李擴同覽于張士騏三昧軒㕔露沐疎篁葉葉清病蘇凉閣思横生山人神往風塵表如見留題數老成梧溪居士王逢題時嵗癸丑十月廿日也醉車先生落筆處一竹一石病容開焚香披向幽齋看想見秋清野思來曲江錢惟善秋風環珮玉珊珊幽谷篔簹野思閒惆悵謫仙歸去後空留清影落人間永嘉曹睿薊邱筆法殊蕭爽與可風流竟未亡安得眉山老居士為君重記墨君堂華亭袁凱薊丘竹木出毫端更覺清風入座寒亦有高人明月夜夢囘恍惚聴鳴鸞天台陶九成一代衣冠李薊丘篔簹落筆似湖州題詩諸老并淪沒風雨江南幾暮秋前人誰持并州刀剪此秋練淨蕭蕭三兩竿尚帶月中影細林山人周之翰幽篁嬝嬝倚雲根舊雨空憐淡墨痕不見薊丘吾老矣嵗寒心事與誰論雲間陸褧竹懶曰細竹一𣲖不知何始常見宋道君寫亘岳六石旁作古櫟棘枝雜以篠竹疎枝冷葉數筆而已此息齋卷乃其合作也黄越石持宋元畫册來中有趙元裕細竹一幅乃作沙水層疊就其高突堆阜處以竹叢之又於竹林間映見沙水灘磧約二三十里之景夫畫寓人目一規所得而已豈有二三十里之逺而尚見竹枝作个字者盖寫近形則失逺勢工逺勢則礙近形此必不合之數也元裕初無畫名當是晚近金湜之流非勝國人也顔魯公劉中使帖行草大徑寸青箋極豪縱天成之趣近聞劉中使至瀛州吳希光已降足慰海隅之心耳又聞磁州為盧子期所圍舍利將軍禽獲之吁足慰也右唐魯郡開國公太子太師顔真卿字清臣書劉中使帖真蹟四十一字公嘗學書於張旭得屋漏雨法衍游京師覽公書最多衍之所藏送羊冕序顔昭甫殷夫人二誥爭座後帖朝囘馬病帖皆經宣和紹興御府然皆未若此帖之雄放豪逸并祭姪季明之帖將與元氣爭長昔人云書一藝耳茍非其人雖工不足貴也惟公可以當之至大己酉中秋日拜觀於蘭谷大卿史侯之第蒙城田衍題魯公書存世嘗見李光顔太保帖乞米帖馬病帖頓首夫人帖祭姪季明允南母殷氏贈誥昭甫誥并此八本觀於此書端可謂鈎如屈金點如墮石東坡有云書至於顔魯公誠哉是言也時至大九年嵗在乙巳冬十月廿五日集賢學士通議大夫張晏敬書右唐太師顔魯公書劉中使帖真蹟著載宣和書譜南渡後入紹興内府至元丙戌以陸柬之蘭亭詩歐陽率更卜商帖真蹟二卷易得於張繡江處此帖筆畫雄徤不獨與蔡明逺寒食等帖相頡頏而書㫖慷慨激烈公之英風義節猶可想見於百世之下信可寳也三月十有二日大梁王芝再拜謹題於寳墨齋北燕喬簣成仲山觀顔太師之書世不多見不肖平生見真蹟三本祭姪季明文馬病及此帖祭姪行草馬病行真皆小而此帖正行差大雖體製不同然其英風烈氣見於筆端一也此語豈可為不知者道哉鮮于樞拜手書鮮于伯幾題祭季明文天下法書第二吾家法書第一此又題劉中使帖漁陽筆法信有所自名不虛得此卷余已刻之戲鴻堂帖中董其昌觀因題瀛州帖視魯公它書特大而凜凜忠義之氣如對生靣非石刻所能髣髴也余平生獲見真蹟二小字麻姑記與此耳嘗有詩云桃源在何處迺見世道汚所以顔魯公細字記麻姑事近荒忽特賢者適嬰多虞世降俗陋假異境以明其志殆子欲居夷也維魯公忠貫日月功載旂常固不特善書名于代况筆精墨妙若是邪昔桓彛渡江傷晉之弱及見王導輩語則知有託足之地余於是觀公翦禽之快亦知夫唐爝未息歟史侯處厚尚義士也曠嵗月而得之既得之非尚義者不出示處厚知所尚哉錢塘白珽謹題太平之日生長京師乃得㑹觀諸名法帖故能考其筆法辯其真偽也如顔書且勿論碑本今專審其墨蹟如乞米李太保馬病皆真行祭姪文行草字如錢許大四帖相若皆白紙頓首夫人行書澹黄紙字亦錢許大昭甫誥正書甚嚴整有力白紙字亦錢許大又有碑刻允南母誥寸五大字筆力不及白紙此劉中使帖字最大觀其運筆點畫如見其人端有聞捷慨然効忠之態真希世之寳也時於明窗靜几展翫之餘收卷三嘆後之學書者非不厲志米芾所為心㑹而手不遂也飲中嘗用東坡硯山谷墨敬書于勸學齋早來左顧匆匆不獲欵曲甚媿承借顔公帖適歸僕馬遑遽不及詳閱姑隨史馳納他日入城更望帶至一觀千萬千萬簽題亦俟後便不悉徵明頓首中甫尊兄竹懶曰陸柬之蘭亭詩馮真實先生物長公權竒質錢予家向留清樾堂中殆十餘稔矣一日權竒强力取去僅償余二􅎓鼎此帖得厚值轉售吳中不可復覩矣余家所藏唐蹟僅顔魯公祭伯濠州刺史文為壓卷耳人知司馬長卿由貲郎進然非貲郎也胡廣典故曰貲者訾算也積而算之謂之訾算士人挾書律之技効於官曹及格者酬以官職謂之貲郎漢時徵辟選舉之外又有此一途若納財授官起於哀帝武帝時未開觀卜式輸財助邊帝使人問之曰欲官乎則知原無納貲之例此如近日欽天監天文生四夷舘譯字生之類耳長卿平日放誕風流雖文藻盖代無人薦舉之長卿亦厭就人牢籠故曰長卿倦遊盖倦於俯仰人以取榮進耳臨卭令王吉上林苑狗監楊得意情味與之相洽後來亦相為地想亦由貲郎進者天地大矣今古自有此一輩韻人遊戲出沒於宦海名塲奈何錯解一字悉舉而推之溝瀆哉今天神聖毅然罷納銀之例以清仕路之源以滌冠裳重厚之汚今而後有志士人得抖擻雪白身材處堯舜之世矣購得端研一回環如鏡厚六分靣徑二寸五分中作直界分左右左如常一腰子硯右上方一圓埳旁屈曲溝道通左硯池導墨瀋蓄埳中下方一方沼貯清水可漬筆製度極有思致可便老年近視者移就目前審諦為用不至誤謬筆墨乃張句曲寫經硯也其背右刻伯雨二字方寸許嚴整有法左刻項墨林珍祕五字盖曾入天籟閣中者石質温純有一眼色暈甚淡旁挾小㸃五六余號之淡月疎星硯不復作銘云吳興許同生先生骯􅗣巍峩壯氣勃勃意常不可一世見貪鄙嗜利者尤唾罵不容口也文章直寫胸臆書備諸家家有兩垞園邀予作記未果以比部郎出守淮陽蒞官五月㑹有要璫經過長吏俱伏謁同生强項超然賦歸貽余靈璧石山一座予置之恬致堂朝夕相對若見先生焉因為之圖以貽先生而銘之曰葉舟下瀨歸懷孤曠賢哉鬱林以此壓浪清淮之濆蒼潤岧嶤寧虛我載以遺素交恠松夀藤千古同格屹斯砥柱吾道生色此石已貽門人石夢飛盟石舘楊鐵崖初亦號梅花道人其自作鐵笛道人傳云㑹稽有鐵崖山其高百丈上有蕚緑梅花數百植層樓出梅花積書數萬是道人所居也然於題署間不一見之石夢飛季弟成甫予門人也恂恂雅飭勤於學問少年得瘵疾夢飛憂之忽夢一臂墮落未幾成甫果不起乃為作夢手歌以唁之云夢中一手落覺後十指疼手落百事廢指疼連寸心老樹挺三榦嵗月相滋榮無端一榦萎蕭索難為春初擬王氏槐竟作田家荆唈唈掩淚泣恐傷堂上親朂哉盟石子孝在褒其真真完生理鬯枝葉自森森每閱荆浩諸圖所作樹皆蕭疎簡逺雖重林穿揷而一樹自為一樹且脩挺軒豁不多為附枝冗榦而意自足真摩詰的子後來嗣之者惟倪迂一人耳己巳穀雨後石夢飛寄至雙徑初芽一褁運慧水者適至五碗既足清風忽生因用荆法寫梅一株視他作縱横㳫拖者又一格矣題句云㸃酥琢玉閨兒夢鏤雪裁冰凍士嚬賴得春宵動吟興一庭霜月喚精神六研齋三筆卷三
