body:
  text: 六研齋二筆卷三明李日華撰陶九成南村圖余見叔明雲西輩數本矣今又見杜東原南村十景圖磅礴蒼秀極得北苑遺法其景曰竹主居蕉園來音軒闓楊樓拂鏡亭羅姑洞蓼光庵鶴臺漁隱蝟室杜自題云余少遊南村先生之門清風高致領略最深與其子紀南最相友善不意先生去世忽焉數載偶從笥中得南村别墅十詠吟誦之餘不勝慨慕聊圖小景以志不忘圖成即置之故瓿中一日紀南過訪檢出相示欣然謂先君可從此不朽傳之後世猶令人知胸中邱壑強欲持去遂命録先生詩於後并題數語而歸之正統己亥春三月既望京兆杜瓊識九成陶隱君品望絶高與雲林惟寅輩名重一時其南村别墅最著人耳目東原先生從逰甚久親炙其高風余恨不獲見九成而幸與東原交知猶可想像遺範然不得逰别墅未免生不同時之嘆紀南持此册索題披其圖讀其詩不啻置身蕉園漁隱間而隱君品行亦恍然展玩中并知東原之師九成不獨以同堂已也題識之餘彌深景仰云成化辛丑春二月既望延陵吳寬書趙文敏臨王右軍書隂符經精麗晃目文亦與世傳者稍異跋者三人俱元高士子昻小楷自是一絶此又其精到者可寶也式觀於姑蘇寓舍因書大德七年春二月草又六日小楷無拘狹之態此畫讚黃庭筆意惟子昻得之大德七年二月二十又七日通川錢重鼎觀於子順書室欣賞之餘聊識卷末隂符經一名黃帝天機之書曩見王右軍石刻隂符文與今文少異子昻蓋有所受故筆力精到不減右軍石刻其得宇宙在乎手之意歟南山人從吾子黃仲圭書於三茅峰難老堂大德丁未十月草有三日元僧方崖墨竹瀟灑淅瀝默坐對之如有聲扶風馬治題云瑟瑟空外音兀兀林下定伊人本無作獨坐欣已暝珠光納大千重疊秋更瑩萬籟何緣生太虛有成聽悲哉湘川瑟鏗乎衛之磬風聲雜梧竹物我此交罄如何濁世士強聒有不醒焉知靈通門寥廓謝畦徑文靖持方崖所畫竹見示俾録虞道園先生寄題聽秋軒詩軒蓋崖在重居寺時燕私之室也因寄前十五年崖自吳門歸余亦次先生詩韻雖不免識者效顰之譏漫此以見意耳嵗洪武壬戌冬十月三日馬治林君復以湖山傲人然亦不免噉名之習當時有作西湖墨本者於孤山左側林蘿祕邃間狀出衡茅題云林山人隱居以示君復君復喜甚為作一詩以承之謝臯羽嗜佳山水鴈山鼎湖蛟門候濤沃州天姥望霞碧雞四明金華洞天搜竒抉祕所至即造遊録持以誇人有浙東西逰録九卷又慨朋友道喪合同志姓名作許劍録會稽王冕携妻孥隱於九里山種豆三畝粟倍之樹梅花千桃杏居其半芋一區韭薤各百本引水為池種魚千頭結茅廬三間自題為梅花屋嘗倣周禮著一書祕不使人觀曰我未死持此遇明主伊吕事業不難至也李伯時在彭蠡濵見野馬千百為羣因作馬性圖蓋謂散逸水草蹄齕起伏得遂其性耳知此則平日所為金羈玉勒圉官執䇿以臨者皆失馬之性矣是亦古人作曵尾龜之意與可墨竹枝葉幹節皆以法度勝然其意未嘗不以散逸為妙觀其自題畫齋一絶云試品齋中畫曾無第二流頑礓與亂篠應挂在當頭則其神賞於犖確縱橫而不徒以甜滑自貴可知矣楊維禎初亦自號梅花道人見於自作鐵笛道人傳古禮男子生具弧矢以射四方青史子載其弧有四時之别春以梧夏以栁夏季以桑秋以棘冬以棗青史子漢志五十三篇今存者胎教一篇華頂天台第一峰高一萬八千丈周回一百里少晴多晦夏有積雪朝暮可觀日之出入絶頂東望滄海渺瀰俗名望海尖上有王羲之墨池宋高郵桑世昌號莫庵有文集三十卷尤袤楊萬里陸遊樓鑰皆與之逰所著蘭亭考淹貫精核辨晰昭然為翰墨家寶書其父桑莊紹興初流寓天台樂其竒勝有茹芝廣覽二百卷曹勛潁昌人字功顯贈太師諡忠靖為金國通問使使還乞身提舉桐柏宫因家天台子耜工部郎中知蘄州子耘利州觀察使余跋就李曹氏族譜未曾與之互質綱目乃朱子門人趙師淵奉師命依資治通鑑纂録而師淵史學頗非所長句字割截不成文理極有可發哂者如陳平本傳云陳平雖美如冠玉耳其中未必有也蓋謂玉綴於冠祗是外美如後人所云繡花枕之類也綱目節去數字直云陳平美如冠玉便絶無意味又唐補闕喬知之有婢碧玉美而善歌舞知之為之不昏昏古婚通蓋言知之惑婢不正娶也綱目乃云知之為之昏不大可笑乎以枵學佐成晦翁之繆師淵之罪也宋趙子良畫雪景裘竹齋題之味裘句則畫味溢出矣一云空篌君鄉來分明記江樹想君詩成時夢作白鷗去一云平生交逰間我幘蓋屢岸區區稻粱謀君亦逐鴻鴈一云風簷手君詩心迹已清絶何當更長吟坐對澄江雪一云扁舟兩漁翁清唱發白暮安得如鴟夷相與五湖去白暮二字更竒唐人極重潤筆韓昌黎以諛墓輦人金帛無算白樂天與元微之歡好視兄弟無間及銘元墓猶酬以臧獲輿馬綾帛銀案玉帶價直六七萬則皇甫湜責裴晉公福先寺碑多至九千縑不為過矣宋太宗時凡勑製文字皆欽定潤筆之數又移檄督之蓋仍唐之習也蔡君謨少年頗耽聲色既與諸伎鬪茶如龍倩周韶輩特為書其小詩又逰寓所到必訪佳麗過嘉禾郡留一絶云盡道瑶池瓊樹新仙源尋到不逢人陳王也作驚鴻賦未必當時見洛神亦狹邪之作也第三禪遍淨天上六十人共坐一針頭而聽法不相妨礙元周伯琦書相鶴經自稱谷陽生跋云右經一卷乃浮丘公授王子晉之書也崔文子學道於子晉得其文藏嵩山石室中淮南王采藥得之遂傳於世又系一詩云江南羽化張天雨海上神交宋仲溫楷法鍾繇稱獨步草臨皇象已專門折叉未墜風前股漏屋先凝雨後痕寄語臨池諸俊彥蚓蛇馳騖莫須論劉完菴贈僧西田長幅山水酣縱有氣韻自題云戊寅孟夏朔日西田上人持酒肴過余清白軒中相與燕樂恍若致身埃壒之外酒闌上人乞詩畫為别遂援筆成此以歸之先得詩者薛君時用也彭城劉珏識薛諱英詩云禮罷金經暫出逰片雲孤鶴思悠悠浮杯直到南溪上贏得文房下榻留水閣焚香對逺公萬緣都向酒杯空清溪日暮遙相望一片間雲碧樹東又沈孟淵沈恆吉俱有題語王孟端贈黃叔洪山水一幀用筆精到超出幼文天逰之上而與叔明並駕平生所絶少者耐軒居士王達一詩亦佳詩曰萬古山川一鑑開層層曲曲見樓臺雲隨曉月峰前墮鷗逐春溪樹裏來兩岸落花人蕩槳半汀殘雨客銜杯寰區何處有此地物外四時無點埃豈但右軍多筆法要知黃石是仙才奔灘觸浪飛頳鯉絶壁凝嵐護翠苔玉室金堂疑太華紫芝瑶草憶蓬萊相看六月不知暑一榻清風真快哉子昻書法於王大令極其染神嘗臨授衣新婦服地黃湯承冠軍三帖尤為畢肖俞焯題云草書自漢張芝而下妙入神品者官奴一人耳此數帖雜用行法初非用意而逸筆絶羣自非生而與晉人氣韻冥合者未易窺其室也松雪臨之如大鏡中看全身鬚眉形影無一不相似者非但髣佛而已寧之其寶之鐵冠道人雪中赤腳登華頂取雪團梅花咽之大叫曰寒香沁我心腑矣余嘗托其意得句云獨立虛簷人不到自團殘雪咽梅花然但吞咽而已未有嚼之者以花味辛辣不堪咀味耳元四明烏斯道者乃有嚼梅絶句云蜜蜂空有一生狂此味從來不得嘗我愛芳馨如嚙雪幸無蘇武九回腸亦竒思也湯正仲字叔雅楊補之甥寫梅法補之楷書遒整學褚河南而加蒼老嘗書補之所作梅詞栁梢青十首詞亦工麗陳眉公先生攜卷見示詞曰為愛冰姿畫看不足吟看不足已恨春催可堪雪裏飛英相逐祇應標格孤髙似羞對妖紅媚緑藏白收香任教桃李漫山粗俗雪艷煙䀶又要春色來到芳尊憶得年時月移清影人立黃昏一畨幽思誰論但永夜空迷夢魂繞遍江南繚墻深院水郭山村月轉墻東幾枝寒影一點香風清不成眠醉憑詩興起繞珍叢平生只個情鍾漸老矣無愁可供最是歎息倚樓人在橫笛聲中玉骨氷肌為誰偏好特地相宜一段風流廣平休賦和靖無詩綺忩睡起春遲困無力菱花笑窺嚼蕊吹香眉心貼處鬢畔簮時天賦風流相時宜稱著處清幽雪月光中煙溪影裏松竹梢頭生憎人在高樓羌笛怨驚催鬢秋不道明朝半隨風逺半趂波浮水曲山坳寒梢冷蕊隱映修篁細細吹香疏疏沉影惱斷回腸為伊駐馬橫塘漫立盡煙村夕陽空裊吟鞭幾多詩句不入商量傲雪凌霜愛他梅蕊才借春光步繞西湖興餘東閣可奈詩腸娟娟月轉回廊悄無處安排暗香一夜相思幾枝踈影落在寒窗月墮霜飛隔窗疏瘦微見橫枝不道寒香解隨羌管吹到屏帷個中風味誰知睡乍起烏雲任欹嚼蕊挼英淺嚬輕笑酒半醒時茅舍疏籬半飄殘雪斜卧低枝可更相宜煙藏修竹月在寒溪從容佇立斯須拚瘦損無妨為伊誰賦才情盡成幽思寫入新詩屋角墻隅占寬間處種兩三株淡月微雲嫩寒清曉香徹庭除羣芳欲比何如癯儒豈膏粱共途因事順心為花修史須紀中書趙大年江鄉雪意圖卷項晦甫物也嘗託盛德潛為媒致之而不可得耿耿於中者二十五六年矣今崇禎庚午之二月晦甫卧疾忽令所善鮑老歸余既成購而晦甫即治後事若相付者余慶物之來而悵友之速化也越月陳眉公先生顧余清樾堂出觀終日贊嘆大年與蘇米狎交東坡每見其畫則以朝陵回嘲之蓋趙宋宗法嚴不令宗子出城故耳此卷初作四五大樹根株錯互梢幹蕭森中段半帶雲氣出沒掩斂極有竒狀其餘層沙起伏煙樾凄迷水鳥戢翼藏身散布蘆洲草棘間備空寒荒逺之思一片江鄉物色也文伯仁題為聚禽圖余以為不然題者數子元人虞輔一歌最妙歌曰我昔江鄉逰水際放懷頗為鱸魚鱠征鞍自笑擁重裘沍凍於時天地閉太空冥冥久隂晦長風蕭蕭雲著地樹枯桑落空槎牙敗葦黃蘆色憔悴蘭橈布帆在何許但見寒鴉騰陳勢塞鴻飛起稻粱謀鷗鷺羣鳬猶水戲江上豪家百不憂已備金帳羊羔醉安知不有戴安道應擬幽人乘興至浙江畫史有天工一幅生綃生巧思開圖宛似昔逰時知是江鄉描雪意吳匏菴題云密林蔽日青蒙茸兩岸都歸煙霧中分明罨畫溪頭景只少垂綸一釣翁釣翁莫放扁舟至沙上鴛鴦方好睡落盡桃花不出溪夜來細雨春流膩劉仲仁春題云朔風獵獵滿江臯同雲藹藹覆林梢羣烏半飛半自止寒氣疑欲舞青腰蒹葭兩岸含霜色路上行蹤渾盡匿野鳬逐隊卧沙洲白鷺驚飛還斂翼漁舟罷釣幾時歸似聞滕六怯寒威鴈行但見俱北向玄律應知聞化機茫茫萬里渺何許山色朦朧杳無覩河流騁望只如帶古樹蒼蒼橫楚浦忽看此景心欲顫豈是窮途曾詫見東郭行看履可嗤梁園擬復開歡宴重隂已極陽當生墮指莫愁寒漸輕東風一日回燕谷盡掃隂霾廓太清文伯仁題云此趙大年江雪聚禽圖上有耆德中正印章為楊邃翁家物昔於丹陽孫氏見之又有緝熙敬止印是南宋內府所藏大年之畫世不多見此可寶也隆慶元年九月望日陳眉公先生携王文肅公所藏淳化祖帖見示每卷有臣王著摹及汪俊陳知古等名紙墨極新好較吾禾項氏所藏又出一頭地每段行間亦多有異魯孔孫屠用明以别本相對録出云每卷法帖第一第二下有臣王著模四字漢章帝書遐邇右有一二小字梁武帝下有一十三三小字唐太宗書下有橫裂紋第二卷鍾繇書多戎輅帖諸帖少見王珣少伯逺帖諸帖有張芝書處字不分二斷另作一行宣示表後多戎輅表十二行張華書有橫裂文謝安書安字是楷字諸刻皆草字第三卷王渙之書反側左之等下有陳知古三小字又有三十八三小字山濤書有橫裂紋羊欣書後有汪俊刻三小字在欲何之左孔琳之書有橫裂紋歎具傍增悒悒腳中四字何賴右有轉劇近明散未覺蓋八字悒悒十二字旁添與今刻不同第四卷陳逵書後有橫裂紋又有四十三三小字歐陽書有橫裂紋第五卷智果書書評索靖俱全第六卷汝不可言下有裂文小佳更帖問字口有裂紋第七卷讓未知如下有橫裂紋七行篆書尾後有第七卷十六板終七字八卷發廬帖後有莆田陳知古五小字月半帖下有橫裂紋六行尊夫人帖不字右有裂紋取卿帖知耳耳字有補痕第九卷思慈帖後有知古二小字思慈無往帖後有汪俊二小字第十卷臣王著模四字在獻之書旁求耳後篆尾前有第十卷三字在追求左第字與追字並十五板終四字與辰嵗十一四字並與七卷尾字稍大張邦昌於元符三年使高麗適其國王死國人重中國使人權立邦昌為王旬月後詔還之宣和中登執政靖康使金營時圖滅趙宗立邦昌為楚帝服衮冕朝百官三十餘日此人命宫不知主何星曜而屢竊南面之權雖終隕滅然亦異矣斡哩雅布索宋金玉寶玩殆盡又索玫瑰一斤玫瑰不知何物當時答稱止五臺一僧能造僧亡其法絶矣然則玫瑰者亦畨硝之類火煉藥製而成者今人名花以玫瑰紅紫色可以想見竹懶草花帖曰花者草木之英陽和之滋秀也地靈不必京洛家珍不必姚魏唐昌玉蕊后土瓊葩車騎奔馳祇供囂競何如嫣然獨笑獻媚叢薄之間娟爾小妍弄姿縟苔之上瑣碎則墮珥遺鈿連翩則繁機密絍輕黃淡碧各自炫竒短莖柔條共相倚態當夫栗留聲沸戴勝飛低淑景乍暄緑隂匝地茗柯戰其芳液筍版薦其鮮腴琴罷酒餘石邉林下數牡丹之落片吸荼䕷之剩香正爾寥寥覩斯種種其為物也微而多致雜而有章乍逢而欣若深玩而不厭羅集而非侈每於斯時解杖頭之百蚨營籬腳之列缶硯泓有滴灌同漢隂薰燎絶煙夢來香國蠧魚欲化胡蝶結蚓半出蠐螬種名紛沓不用玉籖開落任時何煩羯鼓斯亦幽人之極悰而偏賞之偉麗也昔淞陵有馬塍翁種花自業蘇舜欽與之還往錢唐亦有西馬塍錢氏貴戚孫姓者擅之張貞居猶能識其故址蓋塍者田間之蹊也馬塍則蹊之廣者大都在城闉之四隅與大道之側既不當軌又不任犁故逸老結廬而託處焉竹懶二十年前侍養餘暇亦與玄洲盛叟者締園田歡叟得新異必見餉焉叟破百金之産廢四民之業而事此其子若孫每反脣側睨而叟不顧也余嘗因叟有句云蝶為迷香隨墮蕊蟲因餐秀罥初芽又云菊分細種偏難養蓮是重臺未易成又云粉艷且教低著水幽香不遣盡當風頗盡叟婆娑之意今叟赴夜臺飯重思稻玩轉磷花不可復作余所仰僮奚握錢懸購耳因悉書其名以督之迎春紫白蝴蝶剪春羅剪秋羅十樣錦石竹水木樨畨菊虞美人十姊妹線穿牡丹紫茉莉鼓子花六月雪羊躑躅長春花紫花蒂丁紫蘭午時花白花蒂丁飛來鳯金雀紫牽牛白牽牛刺䕷山丹金絲梅金絲桃馬鞭花栁穿魚鹿蔥秋葵䕡蒿花秋海棠錦葵紫鶴蜀葵淡竹白鶴素馨月季水仙百合金萱蜜萱珠子百合金絲荷葉纒枝牡丹錦帶僧鞋菊朱蓼雞冠五色鳯仙罌粟枸杞夜落金錢露水菊夏菊寒菊決明馬蘭頭天門冬麥門冬庚午四月下旬齋居無事徐節之携吳復初山人所蓄吐綬鳥來云此鳥復初豢之十餘年矣初由西僧籠至復初購得二隻其一以飲酒過多醉死此鳥獨留今神益旺羽彩鮮澤復初得其性飼之惟謹所啖榛栗瓜子胡桃仁茭白鮮菜間與三白酒天稍暄燠不敢多與也天啓癸甲間杭城大火延燒數十里汶上李鶴汀作守復初適携此鳥寓西湖人士歡言鳥能辟火藩臬郡邑長俱就視鶴汀議捐重資懸購山人毅然不可潛携之歸吾里白苧斗室低簷焚香讀道書朝夕與鳥相賔或經月不出灑如也昔尸鄉祝翁養雞千百與雞作名字呼之輒來衛濟川馴鶴能令銜書佛説劫初禽獸俱能人言與人相親後因人心險毒機械日熾掩殺無厭故畏避藏匿漸與人隔而情欲嗜好一不通矣中古至人避人避世未能入壁隱樹姑引異類與之相處實此意耳節之留鳥竟去曰少須即吐綬矣是日凡三吐綬丹翠彬蔚相錯成文若組絍而就者垂尺餘廣半之諦視實不見梵書夀字嘗記昔年鬻古者持示滕昌祐懸夀鳥圖畫一鳥緑羽朱喙狀如鸚鵡頸挂絡索中有瓔珞珠璣綴黃素一幀上書夀字似𨽻似篆則刻繒所成爾時心知是宫禁邸第中所蓄如投瓊鳥銜杯馬之類非生成物也且余詳考記載此鳥絶無夀文之説禽經曰冠鳥性勇帶鳥性仁纓鳥性樂冠鳥若鷹是也帶鳥若練雀是也纓鳥若綬鳥是也綬鳥名鷊亦謂之吐綬咽下有囊如小綬五色彪炳吐有時風不吐雨不吐有驚懼之虞亦不吐詩曰中唐有甓卭有旨鷊言不戕賊之故中唐有甓不驚懼之故卭有旨鷊也一名避株行必避草木慮觸其嗉亦曰真珠雞體有真珠點文食之甚美詩謂旨鷊以此或剖其嗉無復有綬綵矣述異記曰吐綬鳥身大如翟五色出巴東山中毛色可愛若天晴淑景即吐綬長一尺須臾還吞之隂滯即不吐又禽經曰頸有綵囊曰避株雉屬出華山及巴峽中晴暘則頸出采色作囊遇樹木則避之故曰避株華夷禽獸考曰魚復縣南山有鳥如鴝鵒羽毛多黑雜以黃白頭頗似雉有時吐物長數寸丹彩彪炳形色類綬因名吐綬鳥又食必畜嗉臆前大如斗慮觸其嗉行必避草木一名避株鳥謝靈運在會稽作山居賦曰雞鵲繡質鶷鸐綬章蓋會稽深山中亦有此鳥也按此從無梵文夀字之説亦不言其能辟火再考辟火之鳥凡四而吐綬不與焉山海經曰符禺之山有鳥焉其狀如翠而赤喙其名曰鴖可以衛火小華之山鳥多赤鷩山雞之屬胸腹洞赤冠金皆黃頭緑尾中有赤毛光采鮮明音作蔽或作鱉可以禦火翠山其鳥多鸓狀如鵲赤黑兩首四足可以禦火丑陽之山有鳥焉其狀如鳥而赤足名曰䳅鵌可以禦火若夫鷩之為冕以其文也先王以供朝祭鶡之為冠以其鬪也戰國以冠武士鵕鸃之為飾以其麗也漢以冠嬖幸與吐綬初無涉者吐綬之為鳥與諸負文之羽尤為雋異且翕張變化若與神明通故人尤愛之凡吉祥喜事悉以歸之如曰綬者祿也是宜官祿又曰綬者夀也是宜長生又以其形質偶類山雞赤鷩而謂其能辟火皆妄語也惟復初山人者購之以多金而不貪譽之以飾説而不信淡然與鳥處而鳥亦安之若渾然偕生於開闢之初而爪牙角距一無所施者是其所以常有鳥歟既籠鳥還客又綴之説以報節之非所以使聞於山人也右吐綬鳥説老子中經曰百嵗之人黃頭髮二百嵗之人兩顴起三百嵗之人兩耳聃四百嵗之人面縱理五百嵗之人方瞳子六百嵗之人脅肋駢七百嵗之人骨體填八百嵗之人腸為筋九百嵗之人延耳生千嵗之人飛上天大洞經云九天真人呼日為濯曜羅三天真人呼日為圓光映太素天中呼日為眇景皇上清真人呼日為九曜生泰清天中仙人呼日為太明太極天中呼日為圓明玉賢天中呼日為微玄東華真人呼日為紫曜明亦名圓珠亦謂始暉亦謂太明亦名鬱儀色界人化生但噉香無便利無色界人化生併無色想乃有形長數百里而不自覺厚地之數其下二十億萬里得潤澤潤澤下二十億萬里得金粟澤金粟澤下二十億萬里得金剛鐵澤金剛鐵澤下二十億萬里得水澤水澤下八十億萬里得風澤風澤下五百二十億萬里乃天地綱維制使不陷者也仙人服日月光芒者宜食竹筍鴻脯筍者日華之胎鴻脯者月胎之羽鳥也北斗九星其二不可見漢霍光家典衣奴名還車忽見二星在斗中光暉非常乃拜之遂得增年六百人三魂一曰胎光屬天喜清淨以無事恬愈為樂二曰爽靈屬五行喜機智以擒制幹濟為樂三曰幽光屬地喜欣合以耽溺沉滯為樂儒者論魂魄曰魂神歸天體魄歸地則魄者骨骸耳道家稱三魂七魄乃云魂者陽神魄者隂神不徒有其數且有其名則魄亦無形之神矣醫亦儒之支流亦曰肺藏魄何居桑榆子曰身外虛空亦天也身內虛通亦天也天者虛氣之靈石之陽精為玉石之隂精為金神仙以金石藥二十四品搗煉如法二十四日成八景四蕊三珠降生神丹又煉麻腴一斛蔥薤白各二斤亦如八景神丹日數腴成入神丹更火之如前日數又寒之七日發之藥煙變成明月珠五粒取佩之光映天地與日月同景五珠成復又火之如前日數寒之二十二日乃開五珠變成三華飛剛之龍乘之以詣九晨之宫故高上經云子乘隱龍與天無窮或取錫十斤於鐵釡熬之半日投四蕊紫華一銖合攪之成葳㽔紫金投三銖成懸黎緑玉取八景丹滓搗三萬杵日服一丸如小豆許身生玉光夀同天地體香聞三十里燒一丸辟百邪惡氣而芳香十日不絶已死未三日服一丸如大豆許立活此等神竒變異之説世間不必定有此事然於造化實有此理善讀異教書者亦不必存疑信二端姑時一閲之以宕我神可也上品光明砂出於辰錦山石之中白牙石牀之上十二枚為一座生色如未開紅蓮花光明曜日亦有九枚七枚五枚三枚一枚為牀座者十二枚九枚者最靈七枚五枚生者為次每一座當中有一大珠可重十餘兩為主君四面小者亦重八九兩亦有六七兩以下者為臣周繞朝揖中心大者於座四面又有雜砂一二斗相抱其玉座珠牀外揀得芙蓉頭成夜安紅絹中光明透徹者亦入上品又有如馬牙成白浮光明者是上品馬牙砂有如雲母片白光者是中品白馬牙砂圓長似笋生而紅紫色者即上品紫靈砂若是白片稜角生青光者是下品紫靈砂如交桂所出但是座生及打石中得者形如芙蓉頭而光明者亦入上品如顆粒成三四枚重一斤通明者為中品片段成明徹者為下品如衡邵所出總是紫砂打破石中得紅光者亦是下品之妙如溪砂顆粒成而通明者伏煉餌之亦得長生留世如土砂生於土石溪砂養於溪水之內土石相雜不中服食若得座中中心主君砂一枚伏煉入五內則功勳便著名上丹臺更服至七返九還自然魄煉尸滅神怡體輕永為上真之飛仙也唐李文饒著芙蓉砂論最為精核每行荒江斷岸遇欹樹裂石轉側望之面面各成一勢舟行迅速不能定取不如以神存之久則有時入我筆端此犀尖透月之理斷非粉本可傳也子瞻雄才大略終日讀書終日談道論天下事元章終日弄竒石古物與可亦博雅嗜古工作篆𨽻非區區習繪事者祗因胸次高朗涵浸古人道趣多山川靈秀百物之妙乘其傲兀恣肆時咸來湊其丹府有觸即爾迸出如石中爆火豈有意取竒哉己巳臘月盡魯孔孫猶相依不忍别去為拈此一籌相印歸而開之或足佐椒柏供也元僧覺隱曰吾嘗以喜氣寫蘭以怒氣寫竹蓋謂葉勢飄舉花蕊吐舒得喜之神竹枝縱橫如矛刃錯出有飾怒之象耳彼佛者流即金容玉毫從九品湧出者亦觀力所就矧草木庶品乎孔孫蘭竹擅妙古人之法已無不窺因其請益特助此世外一則語士人以文章德藝為貴若技藝多一不如少一不唯受役兼亦損品林君復極富畫情見與可伯時終日碌碌徇人遂堅意禁制不為余嘗謂王摩詰玉琢才情若非是吟得數首詩則琵琶伶人水墨畫匠而已陶隱居年十二於渠閣法書中見郗愔黃素寫上清丹法慨然有神仙之志大都東晉士大夫既留意筆札又不屑為俗間書是以右軍黃庭內外景陶貞白神仙起居法琅然照世不獨楊許喜録上真祕㖟也地記稱衢州常山縣石洪溪水中産石竒秀萬狀有高不盈尺而尖鋭聨數十峯高下起伏嵌空穿漏具諸洞穴者昔年於吳山人少君處見一石僅如拳而列十四峯二十餘洞當時不知何石今乃知其石洪也水性欲流欲靜靜則不撓不雜塵土流則新活無淹腐氣吾郡諸溪港極駛活城下亦清映可愛擇其稍逺舟楫處甕汲停貯宿昔即堪烹點其勝井泉數倍也日者繪法荒繆展時流之製令人憒憒思嘔不如環列大理石屏以一榻坐卧其下翻有荆關董巨之想所謂天不足則補之人人不足則還之天亦却醨酒而飲清泉意耳雪詩多矣大抵襲撒鹽飛絮而廣之不則束筆為許洞所困矣惟沈啓南有一夜江山成玉換之句玉換二字何其竒也洪谷子故有溪山風雨圖余嘗見王叔明所臨卷較此尚長二尺餘而景物更有歸僧扣寺門牧兒逐墮笠與浮鼻之牛守門之犬而此俱無之則西涯所云斷爛收拾不獨楮素脫落印章不全而已然其筆氣渾厚人物精采所作客舟倚樹搭蓋蓬席一婦一童子目睛仰注如生山樵有不能不遜步者專車一節想見偉人不可忽也每嵗蓮初透水未及葉際為驟雨所淋輒中夭余出新意剪荷葉線縫之作兜鍪狀名曰蓮笠雨前遍覆之良有濟也戲詠之曰欲展凌波步先為行雨裝擘羅深覆額擁髻悄藏香莫倚傾珠蓋應同裹玉囊自憐嬌小甚脈脈待恩光大觀帖拓於閣本既燬之後重出御府墨迹勾填入石較閣帖眉高二寸有竒與諸行列語句亦多不同主之者為蔡京前褾後題皆京筆京事業不滿人意而書學視王著稍勝故所拓有一種雄桀之氣與潭絳諸本懨懨學步者不同又以昏主諛臣所鐫人不貴尚無翻拓者所傳大抵皆當時拓本也墨池筆壘無關平章重事烏可以人廢無妨與淳化祖刻驂乘而行按方衆甫汝志汝舊有望嵩樓樓四壁皆帖石㟏嵌輶軒至輒拓以携去人患苦之後因樓燬有司采此瘞之馬廄者積數十年迷不知所向矣成化中廄有光怪馬數夜驚察之是錮帖處因掘出洗刷置州吏舍是帖竟不知誰何人所拓也至神廟壬子余謫倅汝及見此帖凡十二石橫陳於禮房石皆紫色含潤一石計丈許厚五六寸所刻帖東西倒行亦有零帖就四隅湊綴者以拓多石有裂紋字皆磨泐余拊其石極愛之戲謂汝守劉叔熙曰帖無藉於如是厚誠得吳中巧工解其半以斫硯蓋無上材也而可得百餘研叔熙笑以為然而莫名其為何石意伊洛瀍澗中所潏蕩而出固嵩高之結璘乎王元美評諸處帖以汝居上中余謂必出宋人非近代所為也余從汝携二十餘本回無如此本裂少而完多者其先余而拓又不知幾何嵗矣黔江帖北宋秦子明者為長沙副將買石令郡人湯正臣父子重摹僧寶月所翻閣本法帖世所稱潭帖者載歸壁之黔江紹聖院中此本字情墨法的係宋拓之佳者但以曹陶齋譜系考之多有參互處如云第一卷尾有淳化篆書三行次有楷書一行云降授供備庫副使充東南第八副將訓練潭州諸軍潭州駐劄秦世章家本其後又一行云湯正臣重模男仙芝靈芝鐫第二卷至八卷尾各題長沙湯正臣重摩勒八字却無淳化篆書及世章銜位又第八卷取卿女壻帖第二行休字立人作二點第二卷鍾繇宣示帖內再世榮名作榮石第九卷尾題長沙湯正臣摩勒七字十卷題長沙人湯正臣重摹男仙芝為一行靈芝鐫為一行今一一對之各卷尾俱止有淳化篆書三行第二卷宣示帖內再世榮名仍是榮名非石字第八卷休字立人似點似拖筆此不足辨矣大抵閣帖之行至元祐中勳戚世家諸侯鎮將有餘力者競摹勒一石以自雄快特筆意有纎肥工力有精粗楮墨有良楛而已今人知重泉州而此本風度神采逺在泉上安知非更在黔江本前如二王府之類耶求美臛者適口而已何必沅江九肋哉余亡友吳伯徴博雅善鑒平生寶愛此帖殁以遺其子七郎清臣清臣醇謹好學篤意書法者也帖十卷亡二卷查係大令藉令唐文皇操衡則嚴家餓𨽻可無惜其逋竄矣一笑宋仲溫書法急就徑利古雅髣佛鐘鼎溢為繪事唯寫細竹嘗見其作雞栖石叢篠一幅題語極自滿意有藝成不覺自斂手之句蓋謂不可復得也吳仲圭濃隂辣幹平生不知狼藉墨瀋幾斛而亦有岡石小竹一方幅森森别有風致其自題云野竹絶可愛枝葉扶疏有真態生平素守逺荆榛走壁懸崖穿石罅虛心抱節山之阿清風白雨聊婆娑長梢千尺將如何渭川淇澳風煙多老梅戲墨元用以為如何葛稚川之𨽻黃野人肉身住羅浮山至今人有見之者赤身無衣紺毛覆體一日醉書一詩於石壁云雲意不知滄海春光欲上翠微人間一墮千劫猶愛梅花未歸陶隱居父貞寶家貧以寫經為業書類蕭思話羊欣一紙價四十以故隱居五六嵗即解書而性好仙宗遍索楊許二真手迹而次第之以成真誥凡道術種種世未有不源而波浪橫溢者也嚴州烏石寺在高山之上有嶽武穆王飛張循王俊劉太尉光世題名劉不能書令侍兒意真代書張堯臣題詩云諸老凋零極可哀尚留名姓壓崔嵬劉郎可是疏文墨幾點胭脂涴緑苔偶有持中興四帥像來閲者惟剩一韓蘄王世忠而劉貌更修偉且視諸公皆其後進是以落落倨岸其命侍女代書未必不能書直偃蹇耳皇甫湜韓門弟子而不善作詩往往詰屈至不可讀故退之有詩云皇甫作詩止睡昏辭誇出真遂上焚要余和贈怪又煩雖欲悔舌不可捫言其語怪而又好譏罵也又白樂天哭皇甫七郎中詩云志業過玄晏詞華似禰衡多才非福祿薄命是聰明不得人間夀空留身後名涉江文一首便可敵公卿其題浯溪石間為元結詩云次山有文章可惋只在碎然長於指敘約結多餘態心語適相應出句多分外於諸作者間拔戟成一隊中行雖富劇粹美君可蓋子昻感遇佳未若君雅裁退之全而神上與千載對李杜材海翻高下非可槩文於一氣間為物莫與大先王路不荒豈不仰吾輩石屏立衙衙溪口揚素瀨我思何人知徙倚如有待味其語意蓋衡量唐人文章而詞亦有氣岸稜峭非茍作者洪容齋以為風味無可采非也皇甫松湜之子也作醉鄉日月三卷有云凡酒以色清味重為聖色如金而苦醇者為賢色黑酸醨者為愚以家醪糯釀醉人者為中人以巷醪粟釀醉人者為小人李頻與方干同里師事干姚合以女妻之大歷中猶未知名常從縣令穆君逰靈棲洞幽勝盤礴穆愛之微吟曰一徑入雙崖初疑有幾家行窮人不見坐久日空斜而下句不屬頻曰豫得之矣因云石上生靈草泉中漾落花終須結茅屋向此學煙霞穆大加賞名遂振嚴州分水縣天尊巖産茶最芳辣宋時以充貢桐廬酒味清美名灑落泉乃嚴瀨水所釀青溪山中生蜜栗子形如蚌外甚堅內有金星食之能制五金之毒服丹者所須也樂苑曰柘枝曲羽調也屈柘枝商調也此舞因曲為名用二女童帽施金鈴抃轉有聲其來也於二蓮花中藏花拆而後見對舞實舞中雅妙者也沈亞之盧肇俱有柘枝賦沈賦云昔神祖之克戎遂以玉笛按之非天樂也曲名霓裳羽衣後傳於樂部盧賦曰古也郅支之技今也柘枝之名此可見柘枝之名本由郅支來也荆門之上有硤州在唐改為峽而印文則為陜州元豐中郎官何洵直建言峽與陜相亂請改鑄印文從山事下少府監而監丞歐陽發言湖北之陜州從阜從夾從兩人陜西之陜州從阜從夾從兩入偏旁不同本不相亂改之恐天下謂少府監官皆不識字當時朝議是發而卒從洵直之言易印蓋謂大吏操柄者皆伏獵侍郎也沛縣儒學大門嵌壁有東坡竹二枝跋云先生與叔祖山陽掾暨先大夫同榜雅契熙寧中守彭門叔祖通直赴約射堂晏談旬餘一日戲寫卭竹二枝且曰觀此如何叔祖曰此如學士立身許國徑挺不移又其疏枝結葉則如學士馭事愛民間密以濟先生笑曰公精鑒也卷而贈之於今四十餘年矣乃刻石以傳久云宣和辛丑冬至日朝奉郎通判澤州時敦題梁溪漫叟時道安立石皇甫松賦語云書抽虎僕虎僕者小獸狀似狸善緣樹皮毛斑蔚如豹取其尾毳縛筆最健即九節狸也廣州經藏樓閣有佛頂首楞嚴經乃唐相房融筆授番僧所譯者宋紹興間薌林居士向子諲初寮王安中及向浯蔣燦李憀劉岑吳説顔博文是觀道人共書之姓名具見於經卷之首又有大硯刻云大唐神龍改元七月七日有天竺僧般剌密諦自廣出譯經回示此硯驗之乃灘哥石也其堅實可愛置几案間如厚重君子因識於後以永其傳前諫正大夫中書門下平章事房融書其後長樂林衢有詩云開池曾記虞翻苑列樹今存建德門無客不觀丞相硯有人曾悟祖師幡舊煎訶子泉猶冽新種菩提葉又繁無奈益州經卷好千年金縷未消痕古人極留意於紙素不得佳紙不書得佳紙必書不令虛棄此如壯士遇好矛槊雖百忙亦必挺舞一回也嘗見黃山谷書謝陳適用惠送南雄紙歌云廬陵政事無全牛恐是漢時陳太丘書記姓名不肯學得紙無異夏得裘琢詩包紙送贈我自狀明月非暗投詩句縱橫剪宫錦惜無阿買書銀鈎蠻溪剡藤卷盈百側釐羞滑繭羞白想當鳴杵砧面平桄榔葉風溪水碧千里鵝毛意不輕瘴衣腥膩北歸客君侯謙光不自供胡不贈世文章伯一涔之水容牛蹄識字有數我自知小時雙鈎學楷法翻令兒子憎家雞雖然嘉惠敢虛辱煮泥續尾成大軸寫心與君心莫傳平生落魄不問天樽前花底幸好戲為君絶筆謝風煙已無商頌猗那手請讀南華內外篇余得蜀僧石碌研名峨眉雪卵客云古未有以卵名硯者余曰有之梅聖俞集云劉涇州以所得李士衡觀察家蟾蜍硯其下刻云天寶八年冬端州刺史李元得靈卵石造示劉原甫方與飲辨云天寶稱載此稱年偽也遂作詩豫與江鄰幾諸君和之云硯如刳蟇腹如月又若剖瓢萌強發鐫題天寶年造之刺史李元傳自越刳蟇剖瓢我莫分稱載作年初辨君君雖能辨猶曰寶寶兹偽物我何云仰天大笑飲君酒硯真硯偽休開口願封藤匣還與侯請共江翁獨持守客携示沈石田寫生二卷其一最妙乃晚年率意神化之筆所作蝦蟹魚螺與葵萱諸種皆粗筆淡瀋一揮而就而生氣奕奕如覩末又掃一驢蹄踠皆一筆曲折起止可數真絶品也翁亦自以為不可復得題一絶云我於蠢動兼生植弄筆偏能竊化機明日小忩孤坐處春風滿面此心微蓋自言其用思入微而以神取之之妙也定武稧帖余見程季白所藏一本與余所購可稱雙璧今又獲覩一本云是五字未鑱損本筆意亦在而墨色稍昏或炫飾無知者過於礲治令糜爛以示舊而反益其疾耳諸跋亦可采以參互評榷也蘭亭敘出定武者凡三本其一宋景文帥是邦實慶歷之嵗得於李學究所謂玉石本傳為陳僧法極字智永所橅逮薛師正來牧其子紹彭刋本易去宣和中紹彭之弟嗣昌帥長安有旨取石置睿思殿嘗以墨本分賜近臣即此本也其二紹彭所橅有鋒鍔字差大亦亂真往往目為舊本也其三修城得於役夫自崇山字中上下斷頗瘦徑後歸章伯可之家伯可嘗題後云岐陽石鼓俱載以北宋元功頃從使北庭聞在所謂中京者因併記之今觀右文所藏真第一本宜保持淳熙十三年六月八日右北平榮芑跋桑世昌澤卿蘭亭考定武稧序李學究殁於妓家時定帥宋景文以入官庫此真本也名玉石本薛師正帥定武其子紹彭别刻置公寢師正數日乃悟曰頗瘦此瘦本也紹彭又刻肥本遂缺真本湍流𢃄映天五字易之以歸謂之公庫本真本則名五字損本公庫本宣和中入內府繹曾見定武多矣唯鮮于伯機郎中趙子昻學士二家本敘字波腳作螳螂肚形趙本墨色頗晦鮮于本膠礬得所最為精妙欣字腳作九轉折餘所見皆肥瘦本耳侍御王公得此真玉石本有紹興希世印淳化榮芑跋右丞東平性齋馬公喬饒州仲山校書井西王公之子慶皆今代絶識印志唯謹此本由會稽王修竹監簿所入東平王朋益亷訪家今歸侍御王公矣稧序百世竒寶凡歸三王皆巨人青氊所還豈偶然哉敘字波腳與鮮于趙氏本正同而五字未缺尤為可貴至元六年後庚辰陳繹曾書會稽晉名山中有千世寶所以臨池波歷歷照穹昊流傳長安道老僧惕如搗昭陵雲霧深玉匣失所保周成顧命篇垂戈列經誥至今天下人欲觀何由討幸然定武石難容以智造宋家幾播遷惜哉迹如掃眼明偶相遇精神更美好五字未曾缺才出紹彭早黃庭亦不存瘞鶴殊渺渺摩挲憶真者鬚髮空自皓王士熙平生右軍書固自歷代寶永和修稧事醉筆落晴昊粉蠟氷一方蘭膏玉萬搗繭紙化飛埃摹拓貽永保相傳金錫帖貴比漆書誥多事桑澤卿雌黃費探討巧偷竟沉淪肥瘦異鐫造化身遂千億濁俗不可掃昭代二王家玉匣尚精好東山賢相君購之苦不蚤寶氣白虹蜿逸思青雲渺想像清閟堂玉石光皓皓門下士陳繹曾六研齋二筆卷三
