body:
  text: 六研齊筆記卷二明李日華撰天啓甲子九月九日同曹愚公侍御登真如塔下禮長水法師墓浴雪井水遇梵僧鎖喃嚷結者深眼微鬚能為漢音與坐良久因詰其西來緣起嚷結袖出一編相示蓋其踐厯蹤由也今録於此以備遐方參覽焉西域東天竺國有國名主活近名髙昌統二十聚落城髙十二丈方圓百里四門三層四角有十二窣堵波文武二樓髙二十五丈龍樓鳳閣千二百座名剎大院百所人物雄奇多有勝蹟城西百里有大乘寺立像髙十五丈赤髮青面捧降魔杵大殿睡佛長十六丈赤袈裟白玉石佛像澡瓶緑琉璃髙三尺圍三尺五寸左十里有小乘寺內供佛齒五寸輪王齒三寸有鐵鉢黑色盛七升乃燃燈佛遺蹟右西北二十里有答辣法藏寺即鎖喃嚷結出家之所寺本周天元時甘露梵王創建一寺三院樓閣七重中有諸天諸佛說法壇壇內遺舍利三顆紫金函供佛牙一長一寸廣八分黃色常放光明後林懴播樓供佛掃帚一把乃迦舍草作成長三尺圍七寸帚柄雜寶裝飾玉石匣盛後建法王殿說法臺髙昌國王麴文嘇哆所施封一髙僧無上法王號圓通至勝佛所度法子名嘛喝實利正鎖喃嚷結之師俗居恭御都宫是髙昌王第七弟之遺宗名播利鎧厭王宫幻有之軀欣菩提無生之果遂投實利修習禪定指示要路東行九萬里餘始至大明有先代和尚班的答祖殁東土乃我成化皇帝國師嚷結翹慕華風兼欽先德發心結五衆同行初禮大雪山證道臺靈鷲山說法臺從王舍城過入莫度達官所上名領文掛號批登五僧名一鎖喃嚷結一鎖喃陸竹一鎖喃堅銼一展陽喃渴一朵而只懴發站東過囀芻河此河阿耨達池之源也進茄赤建國換牒掛號一月方行經喝捍國行一月至恭御城人民烏黑多習波羅門種三千里過白水城多外道幻術不敬僧東行五千里過呾邏斯城其人圓晴黑面短髮長鬚多習小乘山出珍寶住三月東行至羯霜那國換牒掛號住十月民敬三寶諸物豐盛米麥長寸東行三千里至葱嶺山山髙險有開闢至今不解之冰凝沍汗漫與天雲相連仰之皚然無際睨其旁有冰峰摧落者橫踞路側髙可百丈廣或數尺以是蹊徑崎嶇登涉艱阻加以冰雪雜飛不禁寒顫將欲眠食絶無燥處唯是懸釡而炊就冰而寢苦不盡言七日方出東南臨至特伽國聞說多暑十月時如别國八月之熱不可前進因向東北行至馬蟻院乃佛在世時使阿難教化之所名因果處停住一年調養凍瘡全愈方行嚷結所傷兩足磕破膝額尚存可驗又東行過殑伽河即恆河廣可百丈其水緑波見底雜石所襯兩岸奇卉異香木筏而往一月至跋祿迦國名小沙磧王名碧多都城髙廣人物阜盛唯有一寺名阿奢埋兒寺寬廣僧多專學禪定多遊天竺又東三千里過屈支國王號木文麴多宫殿整齊人民男婦赤色敬重三寶多幻術所餐諸物華美衣服精麗使用金銀錢停住一年又行東過阿耆尼國多有銀礦山金礦山髙可百丈光氣騰曜不可名狀賊冦極廣其人凶惡慘殺無忌又東行千里乃古髙昌國先髙昌王有妹被主活國王取去亦名髙昌國古髙昌國亦名伊吾國人物清秀相傳𤣥奘法師化道之所時有漢僧駐錫東行三千里至流沙河即砂漠磧是也寬八百里上無飛鳥下絶走獸地不出水土無莖草薰風炎灼魑魅縱衡十日方出至野馬泉安歇取水有一大寺名雷音後一窟洞名碧播屈昔日如來降諸外道治火龍之所住一月東行千里至五烽從西烽取進有一山王乃五隴之後代名王崙卜山下一泉方圓丈餘清徹甚美有達官看守凡取水者通報王知王見五僧甚生歡喜留住數日與書一封寄東烽王使人引出界指說路徑付水皮袋盛之其路一片沙漠無有行處望馬糞骨聚而進虎狼極多行五日至東烽逺見山上城墻止有一門對列器械弓箭看守達官暸見五衆方要放箭急呼西烽王有書見書方許進見細說西來之事王亦甚喜留住一月付水甘糧指路從賀延磧行才有水東行五日至磧乃西畨境界名小西天昔如來傳法於此號烏思藏地面寬廣乃四家達王供奉之所多出髙僧大殿內列法牀五百張有佛子法王蓮花上師所傳畨經畨咒出滲金佛人頂骨數珠氆氌容金鈴云昔漢班定逺超住此鎮定西域本朝劉馬太監征西入界處地氣多寒參禮蓮花上師留二載餘臨行與書一封達五臺山羅㬋寺侯法王哨來東至玉門關有山無關有葫蘆河一道上廣下狹洄波迅急深不可渡西岸多梧桐林自砍大者作筏而進從上稍至東北行東南七十里是玉門大路封王進貢悉由此行隨喜岷州秉靈寺雅州紅花寺山西一路而來上五臺山羅㬋寺法王處住二年遇欽差御馬監太監劉潤上山引五僧至北京雙林寺住萬厯三十年五月十五日啓奏明肅皇太后命住萬壽庵持咒三年有畨經厰太監張貴引奏萬嵗爺命住雙林寺設壇濟幽四十九晝夜賜紫衣寶冠命西經厰掌壇教授中貴又賜織金禪衣金段十匹膳盒八副寄與大能仁寺蓋先代班的答祖師於成化年間賜法王寶殿塔院也僧五人朵兒只懴滅於五臺山菩薩頂展陽喃渴滅於雙林其餘二僧一在山海關一在墨雲嚷結募造滲金觀音一尊朝南海天臺齊僧三千已滿得遇納川同行至嘉興宰官居士見者往往詰問縱由敢述大都如此宋南蹕臨安倚吾禾為畿輔孝皇登極又為湯沐多戚里貴公流寓人文鬱然每試士輒於郡南謂之南宫又築一枝堂取郤詵桂枝之義為多士祝也而實為羽流禮斗祈星之地往往有仙真異人來棲止者方外友許廓無與談七真事甚悉因筆綴之魯沐𤣥風格髙亮氣息深穩宋治平中從海南來與人不交一言默對終日時有白鶴旋繞空中學士范公鎮建來鶴軒以居之至元初猶存吳公澄禮以為師年三百餘嵗朱艮菴初住郡東太古院遇異人授以黃白祕術蕭然淡漠不以屑意時南宫院燬於火道衆俱散艮菴過之惻然流涕趺坐其處不食者七晝夜士庶感動為聞於有司清隱占百餘畝信施駢集遂重建三清殿環以八𤣥室宫之復興皆艮菴力也壽九十有三端坐而化張復陽當湖人初業儒既娶有感棄去從朱艮菴學道妻亦為尼善詩工畫畫倣吳仲圭蒼鬱淋漓掩其欵鮮不以為梅花菴主也又注釋性理大全行於世喜作雲水遊止金陵朝天宫與尹蓬頭為侣深談極論亹亹不休旁人不解也復還長水止宫中直指孔公聞其名檄郡邑長邀致之不時見觸郡侯怒遂擔書往餘杭洞霄宫止焉先是洞霄石壁有張果老題字云五百年後吾當挑書再來復陽欣然得句云蒼苔白石淨無埃洞向風雷起處開生前缺下煙霞債今日挑書重又來俄有虎從石壁中出弭耳隨行麾之不去一住草年丹就乃還里有司為新一枝堂建棲𤣥樓以居之𢎞治三年年八十有八尸解去仙樂滿空香氣經月不散舉棺甚輕至今以鐵索懸一枝堂後如空器焉朱棲林受道於復陽善屬文工吟詠與考功豐南禺上林項少嶽衲子釋冬溪結社城西之項園夏月夜坐鼓氣作運雷聲聲聞數里大學士鵝湖費宏趨召艤舟西水聞聲尋之得之松下歡然禮遇時世廟方注意𤣥修公别許以薦聞棲林笑不答公贈詩云赴召仍迂霅水舟塵途深愧雪盈頭談𤣥邂逅蓬􅘵侣一笑相忘對白鷗費至京俄殞棲林年八十有五而化嚴頭陀武林人與朱棲真盟契憩止南宫二十餘年鹽官孝亷郁雲陽者問道於頭陀有得遂棄公車事修煉一日郁與飲湖上既醉履行水面十餘丈已而雲陽入武夷頭陀隱句曲每登峯步虛有識者呼之不應或遙拜則搖手大笑授道於崔光頭囑曰南宫我嘗神依之汝當居以繼我志李赤肚或云出度偉岸疏野飲酒至一石噉肉數斤遇儒者與縱談無忌嘗禁人不得泄氣大小遺節忍至十日半月非大悶絶不解也禮嚴頭陀為師頭陀去後赤肚時在吾郡金懶仙别號心齊道人復陽五代孫也精通三教理兼得望氣之術與司空陸五臺公施靜村居士談禪交契力行利濟之事雲游羽衲至者如歸崔光頭養丹吳興山中為鮫水衝漂浮海面者七日至四明漁舟援之登岸懶仙望異氣迎歸宫事之如父因盡得嚴頭陀之道每夜分起坐人視其面如月輪光照一室雲間許侍御者久病藥石不效夢吕祖示云有懶仙可療汝疾物色得之迎歸教以靜坐疾果却侍御為買田築室備僮奴留養終身年七旬餘呼水盥沭更衣端坐而逝許廓無與余極談內外丹旨俱有根據其言曰士大夫溺於嗜欲信方士采鼎之說背清淨而入火坑固可憫笑然不深究參同悟真之理而謂一身之外無物則亦非也寧知清淨養成之後更須㸃化其道初非形交之褻投穴之險而不無神迎氣合之妙乃造化骨髓中骨髓生萬物丹頭前之丹頭所謂玉皇口中涎非有質之物也譬之善炙沉水者以銀鈿隔火火力一到逼出香氣鬱然觸鼻若一有煙起即須撥去之先天之氣亦若是其功全在迎候與槖籥過度之妙不輕授耳且曰余將適秦必有遇不知何解也是其所得又將超其師懶仙而上矣王弇州先生不徒文章蓋代而於法書亦極精詣余得觀其所藏右軍真蹟三帖賞會評量著語往往深入其意毅然以琅琊後昆自任而奉此為赤刀非祗為鑒收者也卷留余案踰月度不能有因悉録其副云晉右軍將軍王逸少書干嘔帖其字畫雄雅圓徑而紙亦古色知是唐人所藏也於書行空間直界成路蓋謂久而卷舒恐致褙絹絲紋磨損字面故置之書筒而祕之乃知前人寶愛如此之篤太宗時已嘗刻之淳化帖中上有南唐舊合同印併集賢院印及首尾古印朱文十數又鵝溪黃素革首前後皆用宣政內府圖書印想當必有數帖成軸不然何以革首外邊各亦有印文耶今存者此帖耳是以書譜止載其首帖之號云皇慶二年十二月朔喬簣成仲山父題王羲之書惟淳化帖止得兩卷則知購收不盡者多矣宋臨所見者思陵與米南宫一拙而頗弱一徑而出奇若此帖唐人所藏祕自有過妙處知書者必辨也大梁班惟志敬跋喬氏所裝書畫以印色定置髙下此帖有仲山甫自題尤足重也後五十有五年臨川危素書此本視慶厯大觀中真書諸刻最為佳也丹山奇隱居士購得之常置書筒中每溽暑三月又加蠟封裹其外其深護甚於嬰兒也時欲展玩則淨拭几席而對之或者譏余為宋人燕石之藏居士因復之曰昔人語右軍書樂毅論太史針體皆正真有忠臣烈士之象隨所在而有神物護持如辨才於蘭亭殆逾性命况千餘載之下寶玩尚無斁者余於此帖豈為過耶或者遂服余精鑒如此唯唯而退居士因徴余言以悉於後使其傳家者尚知其自焉時至正三十年春二月上浣日陸修正識右晉右將軍王羲之干嘔帖嘗刻之淳化帖中以石刻較之分毫無異真至寶也或者謂其紙墨蕭瑟或又謂其為唐摹政不必計也其筆法髙古斷非後人所及今見石刻一行半假皆寶惜之況此帖典刑具在非水月鏡像可比者乎其直界成路喬仲山以為置書筒中者非也古人寶愛名帖常以自隨如王世將得索靖草四日帖置之衣帶中至宣和中摺痕尤在即此類也其周遭諸印多用赭墨亦非僞為長洲文彭謹題右軍帖自昭陵殉後真筆銷亡所珍貴者惟唐摹其宋摹又出重番斯下矣唐用硬黃紙摹出馮承素者為上宋用雜油紙摹米南宫為上此三帖大熱干嘔的是唐摹此月則為米筆無疑二千餘年若覩右軍手蹟良是難事得見唐摹亦希世至寶也然三帖中干嘔尤勝法度圓融風神具在即右軍手書恐不甚軒輊識者自能鑒定矣吳郡周天球觀并記此右右軍大熱帖十七字雖紙敝跡渝而風範猶存且遺墨揾透膚理隱然有入木三分之勢贊曰墨池飛龍鬱蟠繭絲十七驪珠精光陸離有象燭天土花蝕之青鳳片翰人間所希其在琅琊天球庶幾右干嘔帖痰乾二字作淡干皆古書通用妙在藏鋒精雅之極是唐臨本也贊曰歐險旭顚顔莊李佻實繁哲孫厥祀幾祧楚驚優孟謂為叔敖以似求有典刑不恌我追會稽毋憚嶕嶢右此月帖二十五字結法圓美遒逸而微有米家風疑為此君臨本贊曰優孟抵掌卒驚楚王虎賁登筵蔡為不亡屈邯鄲脛步山陰堂柔腕虛和役圓就方誰其最工米顚襄陽世貞謹題余前得先右軍大熱此月二帖於崑山顧氏乃黃琳美之家物也轉入陸太宰全卿顧氏其外甥孫也大熱帖更世久紙墨已盡揭而猶有揾入膚理者細視之極純雅可愛當是真蹟此月帖筆勢圜逸而間有襄陽筆意終為米南宫臨本後得淡悶干嘔帖於慧山談氏印識題跋甚衆結法精美有度而發筆微拙據鑒定以為唐人臨本也真跡縱潦倒如裴叔則病劇回眸猶足掩映數人臨法從真蹟上翻出優孟抵掌尚近於王孫隆凖薛紹彭云古囊織縹可復得白玉為躞黃金題況為之後者乎珍珍重重甲戌七月裔孫世貞題余又得觀弇山堂所藏宋榻黃庭經趙魏公臨本合裝一卷元美敬美有系語皆於書道中說甚深法余喜而悉録之右軍書黃庭有以時代置喙者有謂為吳通微筆者如黃伯思董逌輩要是胸中微有書眼中無珠耳毋論陶通明啓事可據試取宋榻石本觀之唐以後人能辨此否也趙吳興臨筆精微之甚第不可合看合之覺石本如絳雲在霄舒卷自如臨本或不免羊欣之嘆耳吾此語殊有意須於宣城諸葛家叩之乃能得所以萬厯癸未初冬王世貞題黃庭佳本余所蓄有三此刻與第一本同榻而稍剝蝕故屈居第二然筆意純雅古色隱起未易優劣也趙文敏臨本絶真苦非余所愛如余兄藏文敏枯樹賦真跡絶佳不幸與褚河南雙鈎本同石聲價頓减時代升降乃爾宋人謂黃庭非右軍筆今人謂文敏書超唐接晉均非知言也吳通微兄弟贋書是黃庭內景經耳而黃長睿輩便以揶揄此書真可謂貴耳之徒矣吳郡王世懋識竹懶曰敬美自言不愛文敏書然余觀其平日所運悉是趙法又其所藏蓮華莊墨𣲖一卷雖仲穆輩能肖一二者亦收之何耶大抵唐宋來能法二王者無如趙欲法二王者未有不愛趙者也右軍草書十七帖與淳化閣本所收及王方慶寶章集所列皆赫烜人目照曜今古而張懷瓘乃深抑之置之第八云逸少格律非髙功夫又少雖圓豐妍美乃乏神氣無戈㦸銛鋭可畏無物象生動可奇是以劣於諸子得重名者以真行故也唐文皇極珍羲蹟於子敬尤有蛇蚓之誚懷瓘置之第三髙出右軍五等翰墨好尚固人自有懷然以臻極之藝時主之鑒輒自竪議排突亦可異也山中無事探節數時於寒暑晦明間有消受處名曰四時佳候彼衝衝馬頭駒隙者未必知也試與靜者商之正月多風雨為佳候萌芽未作浸灌無傷俗間往還藉以勒斷二月三停雨七停晴為佳候稍雨則芳意漸滋多晴則和氣漸達三月忽雨忽晴為佳候雨不破塊津莖潤葉日不爍膚解肌催笑謂之養花一年第一好處不可錯過四月不雨不晴為佳候輕雲蔽日轉益陰森濃緑疏紅㸃綴逾妙五月積雨後晴久晴後雨為佳候取其暄涼相濟體適意和六月或快雨或微雨為佳候七月候同六月八月晴雨相間為佳候夜有月倍佳九月晴暖即佳十月晴暖即佳十一月晴暖即佳小作凍雨令竹樹淅瀝有聲亦佳十二月有日可曝有雪可眺俱佳虞樂以簫為宗主書曰簫韶九成商樂以磬為主詩曰依我磬聲周樂以金為主傳曰金奏肆夏頌琴即箏之别名管子相齊築陰里三墻九門使玉人刻為璧者石耳謬請於周非彤弓石璧不得朝獻利僞璧之入也今世鬻古者競飾以相眩夷吾實開之矣東至開悟南撫多鷃西服壽靡北懷弭耳偶閲天文書有異聞輒節録之天鼓有音如雷不從地出極長之晝其夕常明天籥主國家祕書藏之金匱石室月一日至四日行最疾日夜行十四度餘五日至八日行次疾日夜行十三度餘九日至十九日其行遲日夜行十二度餘二十日至二十三日其行又小疾日夜行十二度餘二十四日至晦行又太疾日夜行十四度餘以一月均之則日實得十三度十九分度之七星厯家言盡西必占狼星極南必占斗凡聲教所不及者皆占狗國正月必雷雷不必聞惟雉必聞故感而震詬如風雨晦冥而雞必鳴也宋慶厯中有一術士姓李多巧思嘗刻一木鍾馗髙二三尺右手持鐵簡以香餌置鍾馗左手中鼠緣手取食則左手扼鼠右手運簡斃之以獻荆王王聞於朝召官之李自云知厯術特炫此以求達耳回回厯每月有閏日而無閏月二月為一時六時為一嵗庭州灞水在大荒之外以金鐵承之皆漏惟角與瓠葉不漏周茂叔太極圖說人謂出於壽州鶴林寺僧所授邵堯夫皇極經世書謂其母前為某公妾藏其亡夫遺書以歸邵氏宋時浮薄不根之談如此可笑也農家以霜降前一日見霜則知清明後一日霜止吳萊陰符經注序云廣陵鄭山古語蜀黃承真蜀宫大火甲申乙酉則殺人無數我授汝祕術庶幾少減於殺伐幸汝詣朝堂陳之陳之不受汝當死泄天祕也已而蜀主不聽承真死孫光憲竊窺其書題曰黃帝陰符然與今本不同不知此又何書也若李筌藉以用兵而山古又欲倚之禁兵果何說耶錢學士溥所藏定武蘭亭楮墨榻法俱精古非贋物舊一見於余倩沈伯逺齊頭王越石不知得於何處又益以蕭翼賺蘭亭圖題曰閻立本蓋僞筆也又附諸跋皆不真止錢之子諱克頴者數語係的筆今録於此余有書舍在吳興之蜀山今年自鍾離還蔣仲紛訪于北郭因談蜀山之勝同游數日臨别出視古刻蘭亭紙墨俱精典刑具備固善本也前有吳興趙子俊子俊名籲今此摹亡矣所摹閻立本賺蘭亭圖亦精妙韻度殊勝余從仲紛易之歸家憶先公手臨宋仲溫子昻十三跋命工裝潢成卷每窗明几淨時出展玩既見右軍法度又得親先公手澤為益多矣戊申嵗八月上浣日後學錢克頴識於一塵不到處有客㩦梅道人臨荆浩漁樂圖一卷見視凡作漁舫十四中流傍岸沙際樹坳或駕或泊舫皆檏厚方濶上具軒窗漁者皆唐帽道裝知為關中渭川風物士大夫脫樊籠以自放於滄波浩渺者江南真漁葉舟箬笠無是布置也其出洪谷所營似可無疑然余昔於戴上舍敬雩所見一卷景物於此正合題云姚丹丘臨梅沙彌筆蓋三十年所矣今覩此卷又云梅沙彌臨荆筆荆又倣自唐人乃知繪事唯創意之難如其成就今古相師殊不諱也唐人重摩詰輞川皆乞本傳寫唯元人重氣韻而輕位置以為一臨倣即失生動耳神瞽精絃索者一操器即别晴雨余輩與筆硯周旋久亦藉以知燥濕硯佳者每午前必劃然劘墨午後即泓水不減筆鋒亦因暵加鋭乘陰稍韌但其候甚微心粗者不覺耳古銅物鼎彛之屬入土千年則純青如鋪翠入水則純緑其色子後稍淡午後乘陰氣翠潤欲滴大理石屏所現雲山晴則尋常雨則鮮活層層顯露物之至者未嘗不與陰陽通不徒作清士耳目之玩而已唐自天寶年相沿至南唐時俱於升州句容縣立官場鑄造上古鼎彛壺濯之類欵飾精整嵗久間亦有青緑者然不足貴也有人持一劍來質長二尺有奇靶長一尺就明視之隱有花紋燦發如青萍之㸃波甚奇之豈即古者青萍之遺歟然不解其所以然一日質之鍾幼芝幼芝曰戎劍也戎人聚精鐵治為薄葉細剪成花團揉之雜他鐵以鑄而後淬磨之故其文如是戎人性巧喜文章陸離之觀割破馬鞍皮纍數重漆者為小合子若貍首鹿胎然名曰犀毗亦奇物也幼芝又贈余一小匕首彎如羊角以瑪瑙石作柄鋒鋭甚銛云此西域僧用以割酥㸃茶者西人以茶為藥石以酥為餱糧南北分治時魏笑茶為酪奴梁指酥為膻食今此僧乃混而同之不知竟作何味耶余方立論排虎邱茗為有小芳而乏深味不足傲睨松蘿龍井之上乃聞虎邱僧盡拔其樹以一傭待命蓋厭苦官司之橫索而絶其本耳余曰快哉此有血性比丘惟其眼底無塵是以舌端具劍前輩戚中嶽先生精楷法與文徴仲頡頏初不知其善畫鍾幼芝尊人號仰泉先生特為作圖法祖巨然筆力蒼徑較之吳仲圭略減淹潤耳不似近習疏莽絶無映帶賔主一切逃之荒詭逼塞而動以元格自掩也積雨彌旬河流漲溢河壖籬塹之居水皆灌注稚子敲針結網漉取魚蝦村酤雖醨瓢粟可易林榮野艷瑣細不名之花盡為圃人檐負入市日縱數十錢則紅紫黃白紛然滿庭且醉且歌且弄筆自恣又或以虞初夷堅等詼奇不必有之說助其壯浪真貧老漢活計不必告人者也王金陵學術頗僻三經義大不滿人心而庸流檏學得藉以竊糈媒進亦有翕然頌之者其魁傑如三衢何恭欽聖至作長篇獻東坡欲其推尊王氏語甚瑰偉東坡心不然而貌禮之其詞曰昔日歐陽心獨苦搜羅天下文章虎未逢賈馬嗟誰與崑體文章正旁午一得眉山老翁語始協平生好奇古騫騰鸑鷟螭虬侶錦繡腎腸終日吐眉山跨馬挾雙龍迤邐欹斜劍閣東一息萬語光羣雄是日魯酒歸淳醲仁廟當朝起數公四時閶闔來清風眉山秉筆摩蒼穹稽首獻議何雍容是時慶厯主嘉祐東省西垣半耆舊一代偉人爭入彀天開黃閣咸虛受公時脫頴眉山後歆向機雲同一奏建安數子空鳴脰集賢學士皆籠袖玉人發馬下天階華蓋星邊捧詔來天子延英不浪開為公此日深徘徊金吾侍側天顔低上列四輔前三台相與疇咨將相材飄然八駿先龍媒西京應制十八九賈董褒然為舉首此輩昻藏希世有劉蕡又作鮫龍吼觀公舉勸斯人手玉壺破碎珠囊剖許國誠心仍貫斗識者談之不容口天公一見列詩曹指㸃姮娥供兔豪公歌數曲風刁刁若耶溪上皆停橈郢客擲筆不敢操楚人往往收離騷李杜藩墻不甚勞太白脫却宫錦袍東風顚入五湖裏萬籟聲聲哭龍耳河伯江妃愁欲死只恐將來拶見底南登灞岸將何以直節壯懷聊自倚養得身長數千里天地一夜風雷起官家內相能幾人幾人到此陪經綸天語叮嚀下降頻金蓮燭畔窺龍鱗日曝花磚暖繡裀鐶金珮玉何申申姮娥喚作真麒麟焉知韓李非前身龍樓漏箭銅壺挹隱約六街騶唱入傳宣使者翩翻集月題控馬天門立錦箋瓊琯尚書給九韶忽然如俯掖宸恩四海周流及武帝王封乃平揖我宋修文偃武初詞林翰苑新扶疏竇儀陶穀端何如峩冠曵履承明廬草昧功名尚武夫討論潤色姑徐徐剪夷五代尊圖書墨客稍稍躋天衢中間作者相踵武請試從頭為君數真宗皇帝觀神㝢楊億風流玉堂處傾金注瓦橫樽爼大笑哄堂任豪舉逡巡百尺江南楮密掃煤煙驟如雨六一超然又不同陳言萬紙一洗空晉宋齊梁不待攻兩漢直抵元和中龍驤鳳舉扶桑東五采射日吞長虹滿堂玉磬諧金鐘紛然和者如笙鏞木鐸可憐聲獨悄一振鏗然須大老伊說數公無處討蕭曹丙魏規模小馬遷班固工品藻出處行藏何太少升沉將相侯王了經天緯地慿誰好信知風采古為多堯舜文章煥若何東作西成南已訛真人更集滿鑾坡夷䕫禮樂俄森羅黼黻郊廟金盤陀羽毛率舞呈天和髙陽才子前賡歌君哉頓起一俞爾執簡抽毫無及矣周公整頓乾坤已開闢明堂復如此從頭製作軒轅始海獸山禽咸獻美袞冕分明圭玉侈六代光華謁天子日月星辰繢九天蟲魚草木繪山川羣聖文章想亦然百家妙理何周旋離離黍稷春風前東周一去追無緣帝德王功只僅傳廟堂急管催繁絃巍哉孔子尊如帝矯之孟軻天莫制斯文未喪今何在鄒魯邈然安可再揚雄力寡知無奈天祿校書真末計江海悠悠百川逝回首相望幾千載熙寧天子憫斯文轉展搜揚到海垠丞相王公舉趾尊委蛇二老西來賔咀嚼六經如八珍補葺東魯鋤西秦天子資之又日新八風自轉成天鈞頃從孟子驅楊墨他日淫詞又榛棘豐鎬荒涼天空碧庸孟書中幾充塞金陵為此深求直二十年來人稍識求之左右逢星極內聖外王真凖的古人效學豈文辭堂陛之間意已移彛何虎蜼尊何犧云何簠簋如靈龜不然制作知無時反魯詩書一貫之明明古訓識者誰百家效語如嬰兒蝌蚪六書藏屋壁豈比鍾王論筆蹟會通意象如作易不假語言含妙德尚從對偶音聲覔洙泗文章少平昃解到雕蟲童子識斯人稍得揚雄力熙寧論撰亦何慙況把先儒衆說參舉世傳經作指南辟雍泮水堆牙籖或者囂然痛欲殱安得諸儒口遂鉗聖主賢王實用僉公嘗一語令師嚴翻思偃蹇熙寧末苦信古書由世拙金陵戶外履成列稱衡一刺終漫滅倣佛五經無二說堂堂萬里星中月欲論西漢誰優劣忽然吟蟬風脰咽邊韶性懶讀書頑病甚相如下筆慳敢望言如霧豹斑擔簦負笈徒間關沂水春來初解顔浴沂童子彌春灣先哲如龍尚可扳鼓瑟從之豈浪閒可憐道德共耕獵何苦侯門俟彈鋏不挾而來聊自愜栩然夢爾飛蝴蝶飲中數子劉伶俠江外主人張翰攝短舲下水輕仍捷落帆解舵吳山脅此詩鋪舒曲折可謂費詞然大意不過謂歐蘇輩止作得詞章一路若孔孟著述周公禮樂必歸金陵自此種議論流行後來紹述小人極其緣飾直令荆舒配食孔廟真足發千古一笑耳然從此遂開僞學一途動以聖賢自處興言立詞籠駕天下而清明宇宙竟作魑魅場矣不可謂非欽聖輩邪流附和之遺毒也此詩載周密浩然齊視聽抄偶曝書録出之陳無已云世人以癡為九百謂其精神不足也項平甫家說云汪司業云九百草書喬字也朱彧可談云青州王大夫為詞鄙俚每投獻當路以為笑其季父為青掾亦與詞季父他日見其子謝之其子云大人九百亂道玷瀆髙明蓋謂神氣不足為九百豈以一千即足數耶以草書釋之不若陳朱之說通張平子西京賦云小說九百本自虞初注為小說者九百篇注又云九百四十三篇言九百者舉大數也東坡作艾子中有一條彭祖八百嵗其婦哭之以九百者尚在也李方叔問東坡曰俗以憨􅂒駱駝為九百豈可筆之文字間坡曰子未知所據耳張平子西京賦云乃有祕書小說九百蓋稗小說凡九百四十三篇皆巫醫􅍦視及里巷之所傳言集為是書西漢虞初洛陽人以其書事漢武帝出入騎從衣黃衣號黃衣使者其說亦號百九吾言豈無據也方叔後讀文選見其事具注中始嘆曰坡翁於世間書何往不精通耶東坡先生雖天材卓逸其於書畫二事乃性所篤嗜到處無不以筆硯自隨海南老媪見其擘裹燈心紙作字有張睢陽生猶罵賊嚼齒斷齦顔平原死不忘君握拳透瓜之語其在黃州偶途路間見民家有叢竹老木即雞棲豕牢之側亦必就而圖之所以逸筆草草動有生氣彼固一時天真發溢非有求肖之念也東坡云武宗元畫中嶽壁圖有類韓退之南海碑記朝以道請其間坡云武宗元真廟朝比部郎也畫手妙一時中嶽禮告成上命畫羽儀於壁宗元獨占東壁遣羣工就西幕以幃帳武乃先畫一長腳幞頭者執撾在前諸人愕然怪問曰比部以上命至乃畫此一人何耶武曰非爾所知須㬰畫成其間羅列森布上下臣僚至厮役貴賤行止各當其分幾欲飛動南海碑首曰海於天地間萬物最巨其後運思施設極奇怪正為劈頭得勝氣耳武畫所以似之丙寅夏余購得東坡遊赤壁圖筆法布置蒼秀古雅極類唐人元遺山跋云畫係武元直所作元直事金昌宗居畫院去宋不逺豈即宗元之裔耶其蕭然矩度誠不知於嶽壁何如顧其狀山川之鬱盤風露之浩渺天空水濶之趣必有當於坡翁者也沈啓南才情灑落見於所作畫上題語想其一時滿志氣酣神縱不自知其工也如題畫燕云今年見新燕猶是去年見主人頭髮白轉多只有烏衣不曽變年去年來來不差分明認得主人家柴門大開風滿屋飛出飛入隨楊花君不見相國門前車馬塞一朝去相車馬寂車馬寂草萋萋燕子還來梁上棲又云嵗嵗年年喜見參新泥重把舊巢添五陵世異誰華屋百姓家貧我草簷飛對對語喃喃杏花捎落午風恬東家阿媛心撩亂一月紅樓不捲簾又其賦簾影一詩云誰放春雲下曲瓊一重薄隔萬重情珠光蕩日花無語疏影通風笑有聲外面令人倍惆悵裏邊容眼自分明知無緣分難輕入敢與楊花燕子爭情思駘宕如少年不自持者夷考公生平篤行乃知是廣平梅花耳趙仲穆越山圖云臨髙尚書者峯巒潑翠雲氣鬱浡倐斂倐開乍近乍逺上下作數十層出沒意非不華妙縑素亦舊但絶無髙趙二公法余直斷以為元人不知誰何之作耳玉雪坡老人番陽周伯溫詩曰浙江春水滿東岸盡青山旭日明旌棨晴雲擁髻鬟柯亭林倚塔秦望石迷關一曲何時遂開圖漫破顔沈石田填唐多令一詞云江盡正分吳山多繞越都一望中還見重湖昔日霸圖何在者空雲樹煙蕪遙指廢臺孤論興亡一軌逮如今仍似姑蘇剩與後人傳作畫王孫曽有傷無慈溪張鈇填念奴嬌詞云浙江東岸是越王勾踐舊時封國嘗膽卧薪成底事唯有荒臺凝碧萬壑爭流千巖競秀宛宛無今昔兔葵燕麥中間多少遺蹟遙想東晉風流蘭亭修褉空自留殘墨何用登臨傷往事堪笑衰毛白且覔扁舟賀家湖上載酒尋春色季真歸後四明還有狂客王履吉書法歐虞風神奕奕詩工古選絶無凡調然未嘗以畫名也余近得見一幅散筆翛灑實兼大癡雲林兩家韻度乃知髙流胸中未易窺測其題句云髙樹覆清溪松亭延落照為問京華人欲返思鱸棹欵云秋日倣雲林筆意因有所懷賦此文文水題云履吉不以畫名此幅乃偶然興到隨筆㸃染耳然深得大癡雲林墨外之趣可見髙人胸中無所不能從伯榖齊頭見之為之心熱謹題數字於上趙彛齊與皇甫表論寫墨竹而尤其胸中無詩又云何況髙束李杜編江湖競買新詩讀以新詩味薄讀之終不能壯人懷抱於寫竹蕭灑振拔之韻無以助發耳彛齊為許梅谷作寫梅詩云濃寫花枝淡寫梢鱗皴老幹墨微焦筆分三剔攢成瓣珠暈一圓工㸃椒糝綴蜂鬚凝醉靨穩拖鼠尾曵長條盡吹心側風初急猶把枝埋雪半消松竹襯時明掩映水波浮處見飄颻黃昏時候籠明月清淺溪山長短橋閙裡相挨如有意靜中背立見無聊筆端的厯明非畫軸上縱橫不是描頓覺坐成春盎盎因思行過雨蕭蕭從頭總是楊湯法􅍆下功夫豈一朝此詩寫梅彀率併其神聖工巧可謂一一具備矣在人熟參之耳顧余猶謂寫梅花在取格簡淡孤髙梅之格也李息齊為吳興别駕喜寫墨竹用文與可法動筆鬱然非涼薄者可窺余得其一幅作老本二尺叢篠擁之葉皆焦墨所成略不露罅而神韻變動真奇作也趙松雪竹法疏逸與公殊調然亦雅重公其題此幅云李侯寫竹有清氣滿紙墨光浮翠筠蕭郎已逺丹淵死欲寫此君惟此人元趙善長原山水雄麗可鴈行叔明其墨竹尤得簡貴一法嘗作過墻一拖枝上下不數葉而風中軒簸之態欲絶有竹泉者題之曰叢枝蕭散折叉股老葉參差金錯刀酒醒夜半起長嘯月滿空庭墮鳳毛沈石田一絶云青鸞有尾不可割飛過猶餘五尺强借得庭前夜來月倒描一影在東墻元郭畀字天錫為無聞老禪寫叢篠於古檜之根檜橫挺一秃幹千力萬氣如夜叉臂竒作也柯九思題趙魏公竹石云石如飛白竹如籕寫竹原於八法同此論筆法之妙耳然合之東坡先有成竹力追所見如兔起鶻落則神氣所奄筆法又不足言矣柯九思寫竹必儐以古木煙梢霜樾森然與叢篠相映亦有奇趣黃鶴山樵一幅四面皆竹而古木處中名曰鐵網珊瑚世甚珍之嘗見石本王維竹一竿畫竹之全體不為披拂顫撼之勢而灑然之韻自在終日處喬松修竹之下未必能寫松與竹窮山傾崖亂松之塢祖幹孫枝縱橫交倚而後松之態畢獻矣荒江之濵沙礫之地叢篠生焉多而不刪孤而不益偃抑欹直各任其天而後竹無遁姿矣此厩馬萬匹作曹將軍粉本自有超然領會處故也新莽以方士蘇樂言起八風臺於宫中順風作液湯種五粱禾於殿中先煮鶴髊玳瑁犀玉二十餘物漬種計粟斛成一金此黃帝穀仙之術唐相文饒用金玉八寶煮湯飲而棄其滓言久服可長生此皆冨貴已極而橫作仙想者寧知仙經所云金漿玉液乃其自身華池所生必絶葷血煙火而後可致耶梅花在疏林秀石邊如王謝支許同入山陰丘壑其映綺疏香箔則道藴內庭吟絮令芬硯席摛辭野店溪橋陶元亮逺社聞鐘銅瓶竹几卓臨卭壚邊促膝得風則列禦冦之揚裾著雨則郭林宗之折角雪中髙袁安之卧霞外淡樊女之粧總之韻格超奇秀入神骨比之人倫但取勝流不容以男女老少及方內外論也又見王履吉畫一扇倣子久筆蒼秀老成不讓徴仲自題云逺岸疏林斜日外春風碧水草堂前匡廬突兀開屏障坐看銀河一道懸履吉短年藉令得如待詔大耋安知不更揮灑大幅留人間乎蔡林屋行狎書遒美有逸韻詩亦清切余嘗見其書鹿飲泉詩云老夫倦茅屋五日頭不沐侵晨東家子邀我看新竹東風吹梅落忽見燒痕緑上山雲推人下山泉躡足蒼鼠剝古粟白羊竄深谷丹竈雖生苔紫巖尚堪宿渺渺人世間千載見遺躅當時僧不到今日吏催促但恐有髙節無處寄松菊七十二㸃青對酒聊一掬陸務觀會稽志載吳說傳朋跋閻立本畫蕭翼賺蘭亭圖云書生意氣揚揚有自得之色老僧口張不呿有失志之態執事二人其一噓氣上咈者其狀如生非善寫貌馳譽丹青者不能辦此上有三印其一內合同印其一大章漫滅難辨皆印以朱其一集賢院圖書印印以墨朱久則渝以故唐人間以墨印如王涯小章李德裕贊皇印皆印以墨此圖江南內庫所藏簮頂古玉軸猶是故物太宗皇帝初定江南以兵部員外楊克遜知升州時江南內府物封識如故克遜不敢啓封具以聞太宗悉以賜之此圖居第一品克遜蔡人寶此物傳五世以歸其子壻周氏周氏傳再世其孫榖藏之甚祕梁師成請以禮部牒易之不與後經擾攘榖將逺適以與同郡謝伋伋至建康為郡守趙明誠所借不還紹興元年七月望有㩦此軸貨於錢塘者郡人吳說得之後見謝伋言舊有大牙籖後主親題刻其上云上品畫蕭翼籖今不存此畫宜歸太宗御府而久落人間疑非所當寶有者說記此畫常熟楊儀得之京師文徴仲跋之曰楊君夢羽得唐閻立本所畫蕭翼賺蘭亭圖雖已渝敝而精神猶存其筆畫秀潤有非近時名家所能者顧無題識可證他日閲會稽志見吳傳朋跋語其所記印章及古玉軸悉與此合因為録於卷尾定為閻筆無疑嘉靖十九年嵗在庚子十一月朔長洲文徴明書時年七十有一矣又七檜山房録曰按傳朋曰此幅為郡人謝伋得於周榖伋至建康為郡守趙明誠所有紹興元年有㩦此卷貨於錢塘郡人吳說得之傳授次第追述甚明他日又見李易安所撰金石録序云紹興辛亥春三月赴越在會稽卜移鍾氏舍忽一夕穴壁負簏去為吳說運使賤價得之者正此圖在其中也易安即明誠之妻傳朋即吳說字考其年月又無差繆二人所珍愛又在此幅渭南先生收入會稽志以為美談數百年後乃幸入余手可謂不偶然矣此即夢羽筆也後此畫歸趙定宇先生今又更主矣唐宰相善畫者不獨閻立本貞元中又有楊炎嘗為盧黃門圖松石障雲物移動功參造化盧厯世寶之王紹宗曰鄙人於書翰無深功由水墨積習恆精心率意虛神靜思以取之又曰虞七亦不臨寫但心凖目想而已竹懶曰此非無臨摹乃沉精之極力索於平時而神追於筆下耳西蜀道士張素卿因孟昶生日進八仙圖八仙者李耳容成董仲舒張道陵嚴君平李八百長夀葛永璝也六研齊筆記卷二
