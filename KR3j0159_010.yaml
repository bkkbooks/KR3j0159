body:
  text: 六研齊三筆卷二明李日華撰石劵天啓乙丑余與許同生先生同宦京師先生孤介高朗廷評俸薄破扇羸馬踉蹌長安中有時微服步行與故人相過一日於馬上見余問旁人曰此何人曰李君實璽丞先生曰我固聞之抑何風神灑落若是乃挾一鴟酒過余出心指示自憾遇晚也丙寅余既歸里先生出為淮陽守處脂不潤益簡傲自得中涓至欲屈之庭僅五月拂衣去槖裝如水以一石見餉蓋靈壁之嘉者曰泗淮唯此物堪與相對近且辭家入華陽尋先長史故居以老無容復著是長物謹以奉若余置松下每勺酒酣酹如對先生今崇禎壬申先生蛻去已二年而余受上清養氣訣不敢過飲蕉葉灑淅不足以沃先生之石門人石夢飛馴謹好修而酒腸獨寬又素慕先生高尚以不及盤桓為憾余因撤此石復遣一松作媵以付石郎永司典守庶千載之下亦不沒我兩人氣誼吾子孫不得援平泉例有言也古人劵馬余劵石遂作石劵懷素魚肉帖草率數行不甚奇詭而古淡有味可與律公諸帖並行其詞云老僧在長沙食魚及來長安城中多食肉又為常流所笑深為不便故久病不能多書異聞以報諸君欲興善㑹當得扶羸也晦日懷素藏真白藏真書多見四五十幅亦皆唐僧所臨罕有真蹟一二知書者謂此幅最爛熳因錦襲祕藏之延祐元年十二月集賢大學士榮祿大夫張晏珍玩懷素書所以妙者雖率意顛逸千變萬化終不離晉魏法度故也後作草皆隨俗繳繞不合古法不識者以為奇不滿識者一笑此卷是素師腑中流出尋常所見皆不能及之也延祐五年十月草三日為彥清書吳郡沈右金王庭筠號黃華老人善寫梅書法沉頓雄快與南宋諸老各行南北元初䕫子山諸人不及也余見其行草一卷大如當三錢書杜子五言律四首乃宛馬蟋蟀螢火林猿詩既雄奧筆亦奇縱老目眵昏為之開滌趙松雪墨羊二一作勻描形段白質赭文一作批毳滿體如亂麻宛頸俯嗅地極有生韻公行書自題云余嘗畫馬未嘗畫羊因仲信求畫余故戲為寫生雖不能逼近古人頗於氣韻有得余嘗讀杜工部畫馬讚云良工惆悵落筆雄才未嘗不歎世之畫者鮮其人也晉唐而下姑未暇論至如近代趙文敏公書畫俱造神妙今觀此圖後復題曰雖未能逼近古人氣韻有得非公誇言真妙品也好事者其慎保諸吳龍門山樵良琦寓玉峰逺緑軒題時為洪武十有七年秋七月十九日也趙文敏公為仲信寫二羊展卷間如行河湟道中與旃裘索帶之牧羝奴逐水草而棲止昔稱廊廟才器稽古入妙者信矣汝陽袁華書於鼇峯寓舍昔李伯時好畫馬遇大比丘戒墮馬胎乃畫一切佛得三昧松雪翁亦善畫馬今披此圖又善畫羊觀龍門所題想亦含此意又惜其丹青之筆不寫蘇武執節之容青海牧羝之景也為之三嘆東郭牧者張大本寓崑山客館與琦龍門同觀書此王孫長憶使烏桓因念蘇卿牧雪寒落盡節旄無復見寫生傳得兩羝看義陽偶武孟水晶宫中松雪翁玉堂歸來金蓋峯樓船如屋載珍繪四壁展玩青芙蓉江都之馬滕王蝶彩筆臨摹最親切如何此紙意更新不寫驊騮寫羝羯昔余遊宦灤河東大羣濈濈晴沙中長髯巨尾悅人意幾回立馬當春風只今撫卷頭如雪復為王孫畫愁絶也知臨筆感先朝不寫中郎持漢節戒得人吳興毫素妙如神暫寫柔毛便逼真沙漠已空人去逺春風塞草幾回新東竺山人至􅀈居延嵗晚朔風寒荒草茫茫木葉乾山羜自肥羝自老也知曾屈子卿看昆丘遺老松雪翁胸中妙奪造化故戲筆寫羊即得其真宛如敕勒川上風吹草低而見之也石城居士為友橘金先生題蜃市氣所結成不獨海中有之山東東阿縣東南有桃城鋪鋪旁一丘高可數仞每隂雨後烟霧中隱隱有市井車馬之形土人以為蜃市膠州翟中丞嘗謂余曰吾鄉雨後諸山麓堆阜間往往有之不獨一處也文與可以集賢校理出守吳興至宛丘驛忽留不行沐浴衣冠端坐而逝是與可未嘗至湖州也向令一至則墨竹縱橫必滿苕霅間矣豈俟坡翁息齊擅此技耶檀敦禮好事每以精器古物茶茗香酒貽涪翁博其法書又時以所收蘇米手蹟李伯時畫求鑒定著語涪翁剖駁真贋不遺餘力曰龍眠畫如吳生以其有筆此無筆是以知其僞又曰東坡畫竹成棘是其所短無一㸃俗氣是其所長山谷不善畫而持論屹屹如此所以能主張此道宋馬逺畫水十二幅宋楊妹子題字賜大兩府各幅同雲生滄海層波叠浪湖光瀲灧長江萬頃寒塘清淺晚日烘山雲舒浪卷波蹙金風洞庭風細秋水回波細浪漂漂黃河逆流右馬逺畫十二幅狀態各不同而江水尤奇絶出筆墨蹊徑之外真活水也豫不識畫格直以書法斷之長沙李東陽馬逺不以畫水名觀此十二幅曲盡水態可謂多能者矣全卿家江湖間蓋真知水者宜其有取於此戊申十月晦日吳寬在海月庵題山林樓觀人物花木鳥獸蟲魚皆有定形獨水之變不一畫者每難之故東坡以為盡水之變蜀兩孫兩孫死其法中絶今觀逺所畫水紆餘平逺盤回澄深洶湧激撞輸瀉跳躍風之漣漪月之瀲灔日之􅐓洞皆超然有咫尺千里之勢所謂盡水之變豈獨兩孫哉戊申嵗長至後十日王鏊題又有陳玉東沂題語羅浮山人梁敬借觀俞允文畫水記一篇馬逺水十二幅楊妹子所題往時陳道復嘗誇豫謂是世間奇物今四十餘年矣始得一見豈勝快哉馬畫盡水之變俞記窮水之態元美世居海上其於水之變態當自得之豫近寄寓包山風帆往來亦嘗領略今觀此卷頗㑹於中元美方出為世用既有得於水之變態尤宜觀水之體以自致瞽言狂妄不知以為然否同在坐者錢叔寶榖顧季狂聖之尤子求求隆慶戊辰六月十八日五峯山人文伯仁上帝兩帶垂長江黃河流崑崙觸天漏下貯海一壞震澤與洞庭滙作東南漚風雲出千變日月浴雙輈泓渟寫列星蕭瑟競素秋木落清淺出石壓琮琤抽其細抹貫珠巨者膏九洲誰能傳此神母乃宋馬侯解衣盤礴初已動馮夷愁天一臆間吐𣲖九筆底收生綃十二幅幅幅窮雕鎪憶昔進御時陡豁神龍眸遂令大同殿濤聲撼牀頭六宫攝其魄所以不敢留楊妹即大家女史司校讐朱填六玉筯墨宛四銀鈎錦縹賜兩府青箱潤千秋晴窗下開閲如練沾衣褠恍作銀漢翻浸我白玉樓當其鬱怒筆楣表騰蛟虯及乎汩舒徐遙頸延鶩鷗動則開智樂淵然與心謀老思鑑湖曲興盡剡溪舟左壁桑氏經右圖供臥逰那能學神禹胼胝終荒丘隆慶庚午春日吳郡王世貞詠此圖得二十五韻二百五十字右馬河中逺畫水馬不以水名而所畫曲盡其情狀吾不知於吳道子李思訓孫知微若何能自崑崙西來至弱水之沼中間變態非一無復遺致矣畫凡十二幅幅幅各有題字如雲生蒼海層波叠浪之類雖極柔媚而有韻下書賜兩府三字其印章有楊娃語長輩云楊娃者皇后妹也以藝文供奉內庭凡逺畫進御及頒賜貴戚皆命娃題署云然不能舉其代及遍考畫記稗文俱無之獨往往於他蹟見楊迹如一按逺在光寧朝後先待詔藝院最後寧宗后楊氏承恩執內政所謂楊娃者豈即其妹耶又兄石谷俱以節鉞領宫觀位至太師時稱大兩府二兩府則所謂賜大兩府者疑即石也此卷初藏陸太宰全卿家李文正吳文定王文恪諸公俱有跋而不能詳其事聊記以俟再考世貞又識竹懶曰凡狀物者得其形不若得其勢得其勢不若得其韻得其韻不若得其性形者方圓平匾之類可以筆取者也勢者轉折趨向之態可以筆取不可以筆盡取參以意象必有筆所不到者焉韻者生動之趣可以神游意㑹陡然得之不可以駐思而得也性者物自然之天技藝之熟照極而自呈不容措意者也馬公十二水惟得其性故瓢分蠡勺一掬而湖海溪沼之天具在不徒如孫知微崩灘碎石鼓怒炫奇以取勢而已此可與靜者細觀之壬申八九月學使者駐我郡最久試院前擺攤鋪棼集見有珠蜈蚣一條生蚌壳上長僅寸餘首尾鬚足纖悉皆具又石片如玉者一方高二寸濶一寸五分厚四分白質黑緑雜色文一面峯巒起伏數層一面烟霧滃濛中下露坡腳坡縫水紋瀉下湍急紆回有跳珠濺沫之勢一髹匣題云千巖競秀萬壑爭流亦奇品也李後主於黃羅扇上書一詩賜宫人慶奴云風情漸老見春羞到處銷魂感舊游多謝長條似相識强隨烟態拂人頭扇宋時猶傳玩貴人家今亡矣陳後主沈后供智者大師物有赤松澗米五石黃屑二斗黃屑不知何物十道志以為沉香末亦未確隋煬帝為晉王時供智者物有貓牛酥三瓶又不知貓牛是何等牛鍾隱天台人少清悟不嬰俗事卜居閒曠結茅屋以養恬和之氣好畫花竹禽鳥以自娛凡舉筆寫象必致精絶尤喜畫鷂子白頭翁鶡鳥班鳩皆有生態又長於草棘樹木其畫在江南者悉為李煜所有親筆題署及以僞璽印之米元章海嶽畫史乃云鍾峰白蓮居士又稱鍾隱居又稱鍾峯隱者皆李重光自號何其不之考也杜雲林綰石譜有品石建康府有石三塊頗雄偉有巖洞險怪色稍蒼翠遍産竹木茂鬱可觀石罅中有六朝唐宋諸公刻字謂之品石吳孫皓天紀中建康有鬼目菜生黃狗家又有蕒菜生吳平家按圖以為瑞封狗侍芝郎平為平慮郎皆銀印青綬無字碑除泰山外尚有其二一為始興文獻公謝安墓碑以公勳德之盛不敢輕為敘述一為秦㑹之墓碑其家樹石徴文而士大夫鄙憾之不肯著筆始安王賜沈約茯苓一枚重十二斤八兩約有謝啓杜古狂堇為徐髯仙寫天神一幅長尺餘形貌怪詭有持巨斧者有執火炬者有握霹靂砧者蓋雷部鬼神也髯仙每遇端午日七月十五日中堂設之詫人曰此古狂輞川圖也余亦有古狂陶靖節白樂天二像靖節曵枝五栁之下樂天逍遙步履似對永豐坊垂栁皆衣冠雍雅神韻靜深望而知其為有道名公較之髯仙余所得多矣昔有客過茅君時當大暑茅君於手巾內解茶葉人與一片客食之五內清凉茅君曰此蓬萊山穆陀樹葉衆仙食之以當飲李白詩集序云荆州玉泉寺近清溪諸山山洞往往有乳窟窟中多玉泉交流其水邊處處有茗草羅生枝葉如碧玉拳然重疊其狀如手號為仙人掌蓋曠古未覿也唯玉泉真公常采而飲之年八十餘顔色如桃花此茗清滑異於他茗所以能還童振枯扶人夀也六安茶名小峴春春秋緯酒為天乳王者法酒旗以布政施天乳以哺人高昌國以汙林無半蔔萄置八風谷凍成酒味甚美凡食物有須凍而成者不獨酒也余常於僧堂食吾地半邏凍米糕於臘月用四舂白糯米置大缸中注水結氷凍之至春暖氷泮取出磨粉炊糕異常鬆美山谷清醇酒頌云清如秋江寒月風吹波靜而無雲醇如春江永日落花遊絲之困人借之以涪翁清閒鑑此杯面淥本之以李叟孝友成此甕頭春品物類聚記云吳興米炊之甑香白馬豆食之齒醉虢國夫人厨吏鄧連以此米搗為透花糍以豆洗皮作靈砂臛以供翠鴛堂晉書王羲之制秃千兔之翰聚無一毫之筋窮萬榖之皮斂無半分之骨蓋言俗書之綿鈍也葛無奇家姬李因者妙於寫生無奇以牡丹折枝貽余余酬一絶云珠箔銀鈎獨坐春拋將繡譜領花神脂輕粉薄重重暈恰似崔徽自寫真神仙傳漢武帝上嵩山見仙人長二丈耳出頷下垂肩帝禮而問之仙人曰吾九疑人也聞中嶽有石上菖蒲一寸九節食之可以長生故來采之忽然不見帝顧侍臣曰彼非欲服食者必中嶽之神以喻朕耳時從官多服然莫能持久有王興者城陽凡民也服之不息遂得長生太白詩神仙多古貌雙耳下垂肩嵩嶽逢漢武云是九疑仙我來采菖蒲服食可延年言終忽不見滅影入雲烟喻帝竟莫悟終歸茂陵田余自弱冠讀書養蒲一盎以清目經今幾四十年嵗月滋長竟成七盎凡三開花雖未得服餌而灸其清寒森蒨之氣良亦不少余别號九疑山人雖出無心顧典故班班若為余設也因暇筆之嘉禾八景圖勝景者獨瀟湘八景得其名廣其傳唯洞庭秋月瀟湘夜雨餘六景皆出於瀟湘之接境信乎其真為八景者矣嘉禾吾鄉也豈獨無可攬可采之景與閒閲圖經得勝景八亦足以梯瀟湘之趣筆而成之圖拾俚語倚錢塘潘閬仙酒泉子曲子寓題云至正四年嵗甲申冬十一月陽生日書於橡林舊隱梅花道人鎮頓首空翠風烟在縣西二十七里檇李亭後三過堂之北空翠亭四圍竹可十餘畝本覺僧剎也萬夀山前屹立一亭名檇李堂隂數畝竹涓涓空翠鎖風烟騷人隱士留題詠紅塵不到蒼苔徑子瞻三過見文師壁上有題詩空翠亭三過堂本覺禪寺檇李亭萬夀山龍潭暮雲在縣西通越門外三里三塔寺前龍王祠下水急而深遇旱則祈於此時有風濤可畏三塔龍潭古龍祠下千年跡幾番殘毁喜猶存靜勝獨歸僧隂森一徑松杉夜樓閣層層耀金碧祈豐禱旱最通靈祠下暮雲生白龍潭三塔灣龍王祠景德禪寺鴛湖春曉在縣西南三里真如寺北城南澄海門外湖合鴛鴦一道長虹橫跨水涵波塔影見中流終日射漁舟彩雲依傍真如墓長水塔前有奇樹雪峰古甃冷於秋䇿杖幾經遊長水法師塔前有仁杏葉上生果實真如塔長水法師塔彩雲墓雪峯井五龍廟鴦湖雙湖橋鴛湖金明寺春波烟雨在嘉禾東春波門外舊日高氏圃中烟雨樓一掌春波矗矗鹺帆閙如市昔年烟雨最高樓幾度暮雲收三賢古跡通岐路窣堵玲瓏插濠罟荷花裊裊間菰蒲依約小西湖三賢者陸宣公陳賢良朱買臣濠罟三賢堂放生橋梓潼祠馬場湖鹽倉烟雨樓陸贄祠宣公橋秦駐山乍浦月波秋霽在縣西城堞上下嵌金魚池昔李氏廢圃也粉堞危樓櫩下波光搖月色金魚池畔草蒙茸荒圃瞰樓東亭亭遙峙梁朝檜屈曲槎牙接蒼翠獨憐天際缺青山却喜水回環月波樓金魚池水西寺爽溪祥符寺仁夀寺天福寺梁朝檜楞嚴塔院九品觀三閘奔湍在嘉禾北望吳門外端平橋之北杉青閘三閘奔湍一塘逺接吳淞水兩行垂栁緑如雲今古送行人買臣妻醮藏羞墓秋茂郵亭遞書處路逢樵子莫呼名驚起墓中靈華光樓端平橋施侯祠上閘杉青閘下閘秋茂鋪吳江塔震澤洞庭山胥山松濤在縣東南十八里德化鄉山約百畝餘荷鍤翁墓其下子胥古跡也百畝胥峯道是子胥磨劍處嶙峋白石幾番童時有兔狐蹤山前萬箇長身樹下有高人琴劍墓周回蒼蔚四時青終日戰濤聲石田子胥試劍石荷鍤亭胥山存吾堂白石祠石龜聽雪亭武水幽瀾在縣東三十六里武水北景德教寺西廊幽瀾井泉品第七也一甃幽瀾景德廊西苔蘚合茶經第七品其泉清洌有靈源亭間梁棟書題滿翠竹蕭森映池館門前一水接華亭魏武兩其名武水幽瀾泉景德教寺吉祥大聖寺魏塘雲間九峯幽瀾泉乃嘉禾八景之一而亭將摧在山師欲改作而力不暇給惟展圖者思有以助之亦清事也梅華道人鎮勸緣竹懶曰仲圭此製全學范寬長江萬里圖以㸃簇作小樹借樹作圍繞其間斷續逺近層數稠密一以樹為眉目而城堞樓臺特標幟之所以生發秀潤真有百里見纖毫之意古今作圖法也然寫近景如輞川草堂獨樂園等圖則又須作樹石真態不同此法矣華以愚號東湖叟為華景彰寫卧雲圖祖法巨然而奄有勝國雲西幼文之趣蓋一能手也而遺蹟不多見其自題句云白鸞不掃翠蘿深靜宿簷端伴獨吟寂寂枕書聊適興英英出岫信無心長年自悅便清夢萬里遙瞻識舊林只恐內江歸覲後也從龍去作甘霖景彰元之遺老隱梁溪其子約洪武中任成都主簿故叟及之王亨題云巖阿有一士考槃逺囂氛衡門鎮常扄門外多白雲頽然卧其間夢逰湘江濆寒生紾絺綌影落羲皇墳無風自卷舒帶雨常氤氲收之歸肺腑吐出五色文野心同盟久一笑忘憂勤醉呼扶搖子稽首雲中君朱升題云高人愛向山中住野服悠然忘俗慮門連翠巘成比鄰席對長松作賔主石梁苔合少行踪落花滿地扄幽戶萬竿修竹森如束一道流泉漱寒玉白雲來往本無心却就君家簷下宿君家有軒堪偃仰夜深雲臥衣裳冷滿窗雲影夢初回政值山頭明月上榻前雲山中月與君高興皆清絶從今只合在山中一室閒眠自怡悅吳彛題云幽人高臥白雲窩聞說分明似華陀嵐氣濕衣山住近苔痕上榻雨來多身疑太華峯頭宿神向南柯郡裏過况復傅巖人望久為霖未卜意如何竹懶曰元之入主腥我宇宙士大夫高朗者咸不樂仕以耕漁自業以圖詠自娛蕭然遁世而無悶如景彰東湖叟其人者在在而是逮我聖祖崛興極意搜訪巖穴思得才俊與之共理而諸君猶復躇蹰而未肯遽出故吳詩以從龍為霖隱然為景彰勸駕此亦可想見一時俊乂鼓躍思奮之意有關運數不若今日弄筆諸子為自適之具已也錢逵篆臥雲二字亦雅奧不凡漢時八珍猩唇豹胎之外有酥酪蟬者注云以羊脂為之乃今之抱螺酥也其形與螺初不肖而酷似蟬腹乃知名物之妙今不逮古多矣山谷與王直方柬云子瞻明日必來當設硯席於清凉處多堆佳紙俟之張武筆其所喜也想見古流相聚全以翰墨為戲具切磋鼓舞安得不日造勝地今日酒肉徴逐不唯聲氣寂寥即求一善縳筆如武者亦不可得矣每一揮運輒為三嘆歙友王子玉携溫日觀葡萄一卷來看較余前所收無異而老溫草書更淋漓神旺諸跋詞翰亦勝録之舉世只知嗟逝水何人微解悟空花此大唐貫休禪師佳句皇宋溫日觀為書之為後人策勵之端仍為寫龍鬚於後癸巳年三月三十日扁舟至天佛院晴窗晚興有兄副寺寶之後又書云紙長宜書好詩為後之名勝笑攬詩云明月清風宗炳社夕陽秋色庾公樓修心未到無心地萬種千般逐水流濃淡絫絫半幅披却疑月架影參差憑君問取乘槎使還似宛西舊折枝蜀益川張夢應敬題至元壬辰維夏書於雲間寓舍㑹稽王斗祥敬觀於武川吳氏明逺樓吳綃蜀繭筆底墨雲飛一片㸃㸃秋腴收得驪龍頷下珠興來一掃暗處有時揑似寶霧葉烟條幾陳西風吹不凋减字木蘭花山隂曾寅孫奉題昔年添竹延秋蔓露葉離披馬乳寒今日天涯忽開卷還如月架夜凉看一片秋雲江上影老禪收拾入蒲萄小窗剩著詩為伴不博凉州意自高鄱陽仲輿葉衡題就借日觀韻奉題老僧妙墨遍中州好事携將萬里逰要識色空同不朽龍鬚馬乳等浮漚上饒程鳯飛墨浪黏天潑潑枝纍纍數顆綴雲衣南風吹到燕山外帶得幽薌巢底歸敬題日觀手卷後明瑞頓首溫日觀華亭人寓西湖瑪瑙寺寫蒲萄如破袈娑松雪翁極重之書法楊凝式晚年專修淨土道行高卓不獨書畫勝也崇禎壬申五月眉公陳繼儒題於佘山頑仙廬同觀者王景暉大德四年七月草八日子昻畫人馬圖曲江洗刷墨身雲雄姿逸態何超羣眼中但覺肉勝骨幹也合讓曹將軍嗟哉今人畫唐馬藝精亦出曹韓下玉堂學士重名譽一紙千金不當價山窗擁雪觀畫圖據鞍便欲擒於莵天廄真龍有時有杜老歌行絶代無松雪趙承㫖用生紙畫人馬圖居然生動之態使龍眠無恙當與並驅也因賦一詩時泰定二年七月草二日書於維揚寓室海粟平生我亦有馬癖曾向畫圖求象龍曹韓已化伯時逺昻翁筆底寫追風郭畀題趙文敏公人馬圖徐遜敏甫觀于毗陵寓舍之靜學齊松下清齊折露葵古今以為妙句然以松下二字誤認緑葵為露葵緑葵即今之蒲扇芥也亦非松下所有顔氏家訓曰昔有蔡郎其父名純因呼蓴為露葵有士人聘齊主客郎李恕問曰江南有露葵否士人曰露葵是蓴水鄉所有今所食者乃緑葵耳然則關中人素以緑葵為露葵摩詰愛其名以入詠謂長齊松下之人折露葵而食之耳非謂松下有葵而掩露以折之也贊寧採笋法曰避露日出後就土取之投密竹器中勿見風風觸則本堅浸水則肉硬脫壳煮則失味生著刃則失柔采而停久非鮮也盛而苦風非藏也脫壳非治也淨之入水非洗也蒸煮不久非熟也知此可與語食笋矣余記十年前在武林山中寓旬月時積雪甚盛與數衲子地爐團坐老僧雲山就圃拔菜十餘本選根肥甲茂者乾手淨之不入水又手斷之不齒刀勑童行潔釡注水燀薪沸之躬自投菜略入鹽醯作羮進客美不可言雲山曰凡物皆有至味烹㸃擇治非其器水火節候違其宜則至味失而所啖者渣滓耳又手自操杓橫菜一莖釡中挹水碗餘曰如此恰好若减此必不能爛菜若加此又為水奪味沸止少停即起方美沸不及則生而帶苦過沸則成糜不可食余曰妙哉子之以菜說法大都世出世間何事不如此審察精諦方得天真受用也與贊寧采笋同一關捩子可録出作伊蒲典刑倪雲林水竹居圖卷兩樹夾坡有平屋二間上方低巒餘皆細竹碎石筆極蕭散後有俞焯作記以贈仲和處士者倪題句云吳下人多水竹居俞公染翰笑談餘記文固已瀾翻甚嘯詠應當雨霽初篇什謾勞陳組繡園池無復有禽魚只今瀟灑南湖上種玉疏流孰侮豫又題云仲和兄吳城宅中有水竹居聞甚清邃兵後以其地處軍伍因遷居松陵南湖之上亦種竹疏流婆娑其間比之城中尤清曠也俞君作記瀾翻浩汗雖白首暮年猶不除少年舉子習氣耳題燕適之所曰水竹居吳人多用之類皆鑿池種竹以誇深靜也余至吳中士人家每見如此故篇中悉及之至正草二年嵗壬寅九月草六日倪瓚後又題云俞焯作記發揮水竹之義引洪範五行與易乾兑又隂用楞嚴金火曜光生水之說故迂翁又評之曰此一篇金水講義雖不脫科舉習套亦自老成竹懶曰雲林子孱然山澤癯耳其畫端著語取辦倉猝備一時疏逸之興耳乃其評量人所作居然作登壇語無所遜避乃知勝國之季士流所尚不獨多聞又崇直諒可貴也桑寄生與蠶沙入酒極佳原酒之始實本於桑按晉江統作酒誥曰酒之所興肇自上皇或云儀狄一曰杜康有飯不盡委餘空桑鬱積生味久蓄氣芳本出於此不繇奇方朱翼中著北山酒經三卷曰古語有之空桑穢飯醖以稷麥以成醇醪酒之始也又道書載中國極東瀕海有扶桑樹大數千里掩蔽日月每旦日從東南出地上經過此樹謂之扶桑洲樹汁淪液入地其土極美産百穀蔬果皆桑之精髓所化也古仙人留大丹訣刋函谷關石上有云采於蠶食之先煉於火化之後蓋以桑為丹基耳凡桑上生菌與桑椹皆為上藥五加皮名金鹽又名文章草譙周巴蜀異物志文章草贊曰文章作酒能成其味以金買草不言其貴宋艮嶽八芳草曰金蛾曰玉蟬曰虎耳曰鳯尾曰素馨曰茉莉曰渠那曰含笑大慈寺壁畫明皇按樂十眉圖地生瑞草謂之錦地張乖崖常剗平之封其門後五日開復生如故王雲浦有漁莊倪雲林寫漁莊秋色贈之下層作五樹參差疏密相映極有態一亭在其隈上層平巒逺渚望而知其為銅官離墨間也自題云江城風雨歇筆硯晚生凉囊楮未埋沒悲歌何慨慷秋山翠冉冉湖水玉汪汪珍重張高士閒披對石牀此圖余乙未嵗戲寫於王雲浦漁莊忽已十八年矣不意子宜友契藏而不忍棄捐感懷疇昔因成五言壬子七月草日瓚徐幼文作繪清潤恬雅所題楷筆亦秀整端慎不為㳫拖自恣今得覩其草書泰山紀遊三詩雄緊跌宕出入旭素無不淋漓快健乃知古人之不可測也詩云萬仞峯頭上帝居紫宸絳節接清虛崑崙尚想周王制贔屭猶傳秦相書盤礴三齊橫地軸孤根西北接天樞自是仙人真窟宅願得安期一起豫其二曰山下更衣路漸難巖巖高上歷巉岏天關遙控三千里烟磴斜懸十八盤復殿尚留元狩碣老松仍挂祖龍官怪來爽氣清人骨玉峽流雲瀑布寒其三曰翠削芙蓉倚碧霄盤空霞磴度飛軺絶壁金銀雙闕逈澄空鐘磬萬山岧天門過雨嵐光合日觀標霞海色遙穹碑讀罷占遺跡欲共𤣥暉問泬㵳欵云余幼觀宋室趙伯駒摹唐將軍李思訓泰山圖便思一登眺若弗克見今謁孔林遂迂道登泰山得覩巨麗併書紀逰三詩始知李趙之筆超出於尋常萬萬也北郭居士徐賁題倪元鎮秋林山色圖倣巨然筆意上有懸壁旁帶逺嶺逶迤出沒下方作平陸高低四五層各作叢樹參差㸃綴以分層數亭屋居其隈蓋大入意匠者非寂寥散筆也題句云寓館風雨秋閉門草苔翳懷人思奮飛携書此留滯玉琴和幽吟竹牖聊靜憩西山日在望白雲淡生媚寂寞棲德園清虛捐世味石竈有餘烟未收煮茶器八月二日寫秋林山色并詩以遺伯循文學瓚雲林此圖不甚類平居筆清潤之致似全法巨然洪谷之意蓋其天資遒逸隨其步武無不妙絶雖簡略冲逺而濃淡高下似弱而老似淺而深是得意之筆也寶之毋斁高陽仇逺倪元鎮秋林山色圖乃吾郡程篁墩得之於唐伯虎者也幼時一見之寤寐數十載忽程山人携贈仲淹二弟三傳而至吾家故非易得信有夙因什襲藏之願子孫世守毋斁萬歷戊子仲秋汪伯玉識王叔明聽雨樓圖為盧山甫之子士恆作欵云至正二十五年四月草七日黃鶴山中人在盧生聽雨樓寫此盧生名恆字士恆時東海雲林生亦在樓中倪雲林詩云河濶樓低雨如洗祇疑身宿蓬櫳底清晨倚檻看新晴依舊山光青滿几聽雨憐君隱市中我憂徭役苦為農田間那得風波險朝朝愁雨又愁風荆蠻民倪瓚張伯雨詩云雨中市井迷烟霧樓底雨聲無著處不知雨到耳邉來還是耳根隨雨去如將此語問風幡聞見何時得暫閒鐘動雞鳴雨還作依然布被擁春寒樵人張雨為盧山甫題至正八年二月十一日倪雲林又題云虛牖濛濛含宿霧瀑流澗響來何處江潮近向枕邉鳴林風又送簷前去峽水隨之自往還根塵不染自安閒多情一種嬌兒女淚滴天明翠被寒至正二十五年嵗在乙巳盧士恆携至緑綺軒見示輒走筆次貞居外史之韻以寄意云陶蓬寄亭中人暨諸名勝當不默然也後十又八年四月九日瓚記玉山雅集圖元淮海張渥為顧仲瑛寫㑹稽楊維禎作記云右玉山雅集圖一卷淮海張渥用李龍眠法所作也玉山主者為崑丘顧阿瑛氏其人青年好學通文史及聲律鐘鼎古器法書名畫品格之辨性尤輕財喜客海內文士未嘗不造玉山所其風流文采出乎輩流者尤為傾倒故至正戊子二月十又九日之㑹為諸集之冠鹿皮衣紫綺坐據案而申卷者鐵笛道人㑹稽楊維禎也執笛而侍者姬翡翠屏也岸香几而雄辨者野航道人姚文奐也沉吟而癡坐搜句於景象之外者苕溪漁者郯韶也琴書左右捉玉麈而從容談笑者即玉山主人也姬之侍為天香秀也展卷而作畫者為吳門李立傍視而指畫者即張渥也席臯比曲肱而枕石者玉山之仲晉也冠黃冠坐蟠根之上者匡廬山人于立也美衣巾束冠帶而立頤指僕從治酒肴者玉山之子元臣也奉肴核者丁香秀也持觴而聽令者小瓊英也一時人品疏通俊朗侍姬執伎皆妍整奔走童𨽻亦皆馴雅安於矩矱之內觴政流行樂部諧暢碧梧翠竹與清揚爭秀落花芳草與才情俱飛登口成句落毫成文花月不妖湖山清發是宜斯圖一出一時名流所慕尚也時期而不至者句曲外史張雨永嘉徴君李孝光東海倪瓚天台陳基也夫主客交并文酒賞㑹代有之矣而稱美於世者僅山隂之蘭亭洛陽之西園耳金谷龍山而次弗論也然而蘭亭過於清則隘西園過於華則靡清而不隘也華而不靡也若今玉山之集者非歟故余為撰述綴圖尾使覽者有考焉是嵗三月初吉客維禎記是日以愛汝玉山草堂靜分韻賦詩詩成者五人于立得愛字青陽在林野雲物殊變態繫船石蘿隂把鈎挑水菜羣英延清酌攬芳結幽佩歡期豈再必於焉寄所愛姚文奐得汝字仲春㑹桃源青年映霞舉道人吹鐵笛主者捉玉麈野航晨不渡溪漁來何許欹坐蟠根隂匡廬故仙侣衆賔各雅興辭適忘爾汝懷哉張李輩明月在空渚復念東海迂雲林夜來雨郯韶得玉字逶迤玉山阿窈窕桃花谷野芳綴丹葩霞彩散晨旭溪回濯新錦洞幽答鳴玉樂哉君子游於以寄高躅顧晉得草字客從桃源遊愛此玉山好清文引佳酌𤣥覽窮幽討流鶯答新歌飛花落纖縞分坐有雜英醉眠無芳草顧瑛得靜字蘭風蕩叢薄高宇日色靜林回泛春聲疏簾散清影褰裳石蘿右濯纓水花冷於焉奉華觴聊以娛晝永詩不成者二人各罰酒二觥山隂王􅨀之德輔雅道久寥落馳騁爭相先襟期屬幽曠邱園樂無邊披圖得良玩燕集羣才賢春風拂蘿徑碧澗縈芳筵忘形襟佩散班坐花竹妍瑶觴亂飛月翠䄂寒籠烟徘徊玲瓏曲蕭灑琳琅篇屢舞眷餘景顛倒山公鞭主人三絶俊晉胄今猶傳勝事有如此妙寫呼龍眠高風振庸俗清輝照林泉衰遲亦何幸拭目塵相遷吳龍門山釋良琦元璞至正戊子二月十九日楊侯鐵崖宴於顧君玉山賦詠疊筆淮海張渥為圖傳者無不歎美余後半月與吳興郯九復至玉山顧君張樂置酒清歌雅論人言不减楊侯雅集時既醉顧君徴余詩然豫於聲樂詩詠何有哉適其所寓而不違者烏乎寓烏乎非寓故作詩以道其事卒反乎正云耳玉山窈窕集瓊筵手撥鵾雞十二絃巢樹老僧狂破戒散華天女醉談禪鵝兒色重酴醿酒桂葉香深翡翠烟最愛碧桃歌扇靜長瓶自煮白雲泉雲林生倪瓚元鎮至正九年八月十六日計籌山吕尊師訪余蕭閒館為余言顧仲瑛徴君玉山隱居之勝輒想象賦長句以寄他日尚同袁南宫携琴嘯詠竹間也解道玉山佳絶處山中惟有吕尊師已招一鶴來庭樹更養羣鵝戲墨池松風自奏無絃曲桐葉新題寄逺詩若許王猷性狂癖徑來看竹到階墀時南宫同在蕭閒館中就致意焉河東李元圭廷璧荆山明月秋水清山間之璞千古名誰為隱君慰幽獨我欲携酒相與傾階前拾翠驚春夢石上看泉更晚晴何日同舟載仙侣紫荆花下聽吹笙崑山郭翼羲仲愛汝西莊給事家繞屋山石何谽谺截江秀色發林壑平地玉氣貫虹霞佳處如居子午谷望中開遍冬春華夜深酒醒月在海應有仙人來繫槎㑹稽楊維楨廉夫玉山丈人美無度前度虎頭金粟身未試囊中餐玉法時有座上索華人銀魚學士真成隱錦里先生許卜鄰自是君家時節好桃源風日洞庭春丈人家住筆峯下玉氣有似藍田山椰酒熟時春瀲灔山香舞處花斕斑伶官石作鐘磬響少女潮帶魚龍還險穴已平滄海角仙家不啻白雲間再題我嘗被酒玉山堂風物於人引興長銀絲蓴薦野鴨段金粟瓜取西楊莊山頭雲氣或成虎溪上仙人多訝羊何處行春柘枝鼓閬州竹枝歌女郎婁江姚文奐子章玉山之堂湖水東朝來佳氣鬱葱蘢鶴飛瓊圃三株樹鼇戴崑崙小朵峯雨裡賣魚溪友過華間吹笛野人逢朝簪儻擲歸相候一箇桃枝瘦竹笻吳龍門山釋良琦元璞鐵笛倒吹江上去聞在玉山仙子家自喜酒船逢賀監定知𤣥易授侯巴露凉磁碗金莖凍月滿湘簾玉樹花人生歡樂何可暮遲爾龍門望太霞㑹稽楊維楨廉夫次前韻山回古縣六七里潮到唯亭第一家翡翠明珠通百粵竹枝銅鼓出三巴山公酒醉童將馬禪客詩成女散花須信西園圖雅集佛中脫縳有丹霞荆山道人曾有約約過虎頭金粟家江上降龍重見朗酒邊吹雨或成巴春歸駟馬橋頭栁月滿蕃禧觀裡花鐵笛東歸還小住仙源不隔赤城霞搜神記曰扶南王范尋常養鰐魚十頭犯罪者投之池中無罪則魚不食乃赦之月山叢談曰占城國人有訟事不决者則使乘水牛過鰐魚潭理曲者魚食之直者雖十往返不食果爾則與觸邪神羊指佞靈草同為瑞物昌黎何必為文逐之耶濟上多清泉釀酒瀹茗俱妙杜康泉在舜祠廡下即舜泉也水一升重二十三銖考古二十四銖為一兩則不及兩許輕之極矣陸務觀老學庵筆記云盧鴻草堂圖舊藏中貴人劉有方家余往有慶歷中摹本亦名手精妙猶記後載唐人題跋云相國鄒平段公家藏圖書並用所歷方鎮印記咸通初余為荆州從事與柯古同在蘭陵公幕下閲此軸今所歷嵗祀忽踰二紀薦罹多難編軸尚存物在時遷所宜興嘆丁未年駕在岐山涿郡子謨記又書己酉嵗重九日專謁太儀遂載覽閲纍經多難頓釋愁襟子謨再題鄒平公文公也柯古其子成式字也成式終太常少卿故稱太儀段公鄒平人竹懶曰余於項氏亦見二卷皆摹本然不載此跋皇覽冢墓記曰孔子冡塋百畝本無祠堂塋中樹以百數皆異種魯人世世無能名其樹者傳言孔子弟子異國人各持其方樹來種之塋中不生荆棘及刺人草今惟有柞樹成林而已余有閒情常思得高手畫士用丹彩雜色寫孔林圖以自玩而未遇其人也余過滕於察院庭中見石刻李太白書壯觀二大字今閲金鄉縣碑目亦云儒學有此二字其碑隂刻云賀知章為任城令與白友善過城鎮有所觀覽書此二字蓋元新豐里人得此於沛中置諸堂元末兵亂仆於草萊國朝徙置今所豈又一石耶大都名賢之筆傳摹轉徙不一而足者多矣唐時顧渚山有明月峽金沙泉出紫筍茶毗陵吳興二太守就泉上造茶大張宴㑹泉不常出太守具儀致祭始流溢造供御者畢即微減供堂者畢又大減太守旋斾涸矣或淹期多造則有風雷毒蛇之變白樂天聞賈常州崔湖州茶山宴㑹詩云遙聞境㑹茶山夜珠翠歌鐘俱繞身盤上中分兩州界燈前今作一家春青娥對舞應爭妙紫筍齊嘗各鬭新自笑花時客窗下蒲黃酒對病眼人按陸鴻漸茶經造茶之法摘芽擇其精者水漂之團揉入竹圈中就火烘之成餅臨烹㸃則入臼研末潑以蟹眼沸湯至宋蔡君謨以其法造建溪之茶而加精焉胡元挏馬潼茶無所聞入昭代唯貴葉茶餅製遂絶洪武中顧渚貢額止五十餘斤耳余友王毗翁攝霍山令親治茗修貢事因著六茶紀事一編每事詠一絶余最愛其焙茶一絶云露蕊纖纖才吐碧即防葉老采須忙家家篝火山忩下每到春來一縣香溫州乳柑冬時味酸經春暖則甘美溢出太和山騫林茗葉初泡再泡猶濁澀螫口經四五泡則清香撲鼻矣顧仲瑛秋華亭書扁係鮮于太常𨽻筆欵云檇李鮮于伯機書乃知漁陽公流寓我郡頗久故以自署也東坡書快哉亭石云昨日與數客飲至醉今日病酒書以醉軾時元祐四年三月四日也又一手帖云昨日快哉亭與數客飲至醉才歸辱簡不逮即答為愧春生雪盡計尊候起居佳勝新詩甚清冽病酒不敢率意趂韻幸少寬限否因書見過如何如何不一軾再拜書忠玉提刑執事顧仲瑛得此石作壇立之名拜石壇又併得此帖作壇記與帖考云瑛素有嗜石之癖每遇故家遺宅見有奇峰怪石輒徘徊顧戀不忍舍去或百計求之不得者圖寫其形似標諸草堂壁間以為几格供後至元戊寅四月下浣訪尼僧巖叟於東城之庵庵即故宋周太尉宅斷垣之外燕麥中有假山在焉遂披榛約棘褁衣而登其上羅立諸峯已為好事者挽載而去獨有一石似壁而失其左股欹臥於高梧之下上有老坡題識觴詠之語易之以粟歸而立之中庭左映右帶無非松竹芭蕉枇杷之屬多者書帶草耳石之挺挺拔拔如老坡獨立於山林丘壑間愈見其孤標雅致也瑛加之拂拭永為子孫寶玩明年奎章閣鑒書博士柯丹丘敬仲下訪見而奇之再拜題名而去丹丘辭翰鑒博有元之元章也於是甃石為壇字曰拜石後三日而御史白野達兼善來觀嘉柯之逸為作古篆拜石二字於壇又𨽻寒翠以美其所此石之名於是愈重然皆未知所紀之詳至正乙未冬周履道秀才自梁鴻山携贈老坡手帖讀之乃是答忠玉提刑快哉亭飲移者上有賈秋壑私印其辭與紀石甚肖嘗記大全集中有次王忠玉提刑遊虎丘詩有連日與王忠玉諸公逰西湖次韻詩有次劉景文答馬忠玉詩蓋當時有兩忠玉焉然莫知其孰是及考宋史元祐四年坡為翰林學士兼知禮部以論事積當軸者恨故請外拜龍圖閣學士知杭州以避朝謗也瑛想老坡風流曠邁行千里間有名山勝水豈不與友醉酒賦詩以快其意又考諸雜録忠玉乃王規父侄孫先坡在維揚後坡渡江坡答其詩有及君未渡江過我勤秉燭之句是則書所記者王忠玉無疑矣然後知石乃維揚故物帖則王忠玉家寶也吁石之在山不知其幾千萬年因坡之題鑿而出山者又不知其幾百年帖之夀又非石比兵殘火燬展轉流落人手者亦不知其幾百年今一旦二美併來抑神物有所㑹合耶吾玉山有所際遇耶又思丹丘白野不二十年皆仙去坡仙有靈豈不能於風清月白之夜挾二公同逍遙於此壇乎瑛亦豈不能鼓阮酹一尊於此壇乎不因此石烏能永傳敬書此記俾伯盛朱茂材刻於他石使後之覽者知石與帖併拜石之壇有所自云至正丙申正月五日金粟道人顧瑛書於玉山草堂沈存中內翰自號夢溪緣少時夢至一處小山幽嶼花覆如錦山麓下有一溪紺碧澄寒有喬木濃䕃靜蒨可樂每夢如此逮覺求之則未遇也及謫潤州得之宛然夢境因名其溪曰夢溪而著筆談焉六研齊三筆卷二
